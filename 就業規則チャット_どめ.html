<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>就業規則チャット — どめ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Hiragino Sans','Noto Sans JP',sans-serif}
body{display:flex;align-items:center;justify-content:center;background:#dde4f5;min-height:100vh}
.app{display:flex;flex-direction:column;width:420px;height:750px;border-radius:20px;overflow:hidden;background:#f0f4f8;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.hdr{background:#4169e1;color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-av{width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid rgba(255,255,255,.4)}
.hdr-av img,.av img{width:100%;height:100%;object-fit:cover}
.hdr-name{font-size:14px;font-weight:600}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.65);margin-top:1px}
.hdr-dot{width:9px;height:9px;background:#4ade80;border-radius:50%;margin-left:auto;box-shadow:0 0 6px #4ade80}
.msgs{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:10px}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:#bbb;border-radius:2px}
.row{display:flex;align-items:flex-end;gap:6px}
.row.user{flex-direction:row-reverse}
.av{width:30px;height:30px;border-radius:50%;overflow:hidden;flex-shrink:0}
.bubble{padding:10px 14px;border-radius:18px;font-size:13px;line-height:1.75;max-width:74%;white-space:pre-wrap;word-break:break-word}
.row.bot .bubble{background:#fff;color:#1a1a1a;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.09)}
.row.user .bubble{background:#4169e1;color:#fff;border-bottom-right-radius:4px}
.ts{font-size:10px;color:#aaa;margin:0 4px 2px;align-self:flex-end;white-space:nowrap}
.cite{margin-top:4px;margin-left:36px;padding:8px 11px;background:#eef2ff;border-radius:0 12px 12px 12px;border-left:2px solid #4169e1;max-width:76%}
.cite-lbl{font-size:10px;color:#4169e1;font-weight:600;margin-bottom:3px}
.cite-txt{font-size:11.5px;color:#1e3a8a;line-height:1.6}
.cite-src{font-size:10px;color:#6b7fc7;margin-top:2px}
.typing-row{display:flex;align-items:flex-end;gap:6px}
.typing-bub{padding:10px 14px;background:#fff;border-radius:18px;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.09);display:flex;gap:5px;align-items:center}
.dot{width:7px;height:7px;background:#93c5fd;border-radius:50%;animation:bop .9s infinite}
.dot:nth-child(2){animation-delay:.18s}.dot:nth-child(3){animation-delay:.36s}
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.qs{padding:8px 14px;display:flex;gap:5px;flex-wrap:wrap;background:#fff;border-top:1px solid #eee;flex-shrink:0}
.qb{padding:5px 11px;border:1.5px solid #c7d2fe;border-radius:20px;font-size:11px;color:#4169e1;background:#f0f4ff;cursor:pointer;white-space:nowrap;transition:all .12s}
.qb:hover{background:#4169e1;color:#fff;border-color:#4169e1}
.inp-area{padding:10px 12px;border-top:1px solid #eee;background:#fff;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.inp-area textarea{flex:1;resize:none;border:2px solid #4169e1;border-radius:20px;padding:9px 14px;font-size:13px;font-family:inherit;line-height:1.5;height:38px;max-height:90px;overflow-y:auto;background:#f0f4ff;color:#1a1a1a;font-weight:500}
.inp-area textarea::placeholder{color:#7b93d4;font-weight:400}
.inp-area textarea:focus{outline:none;background:#fff;box-shadow:0 0 0 3px rgba(65,105,225,.15)}
.sbtn{width:38px;height:38px;border-radius:50%;background:#4169e1;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.sbtn:hover{opacity:.85;transform:scale(1.05)}
.sbtn svg{width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-av"><img id="hdrImg" alt="どめ"></div>
    <div>
      <div class="hdr-name">どめ（就業規則アシスタント）</div>
      <div class="hdr-sub">しおどめの森 保育園部 ／ 正社員就業規則</div>
    </div>
    <div class="hdr-dot"></div>
  </div>
  <div class="msgs" id="msgs"></div>
  <div class="qs">
    <button class="qb" onclick="ask('年次有給休暇は何日もらえますか？')">有給休暇の日数</button>
    <button class="qb" onclick="ask('試用期間は何ヶ月ですか？')">試用期間</button>
    <button class="qb" onclick="ask('育児休業は取得できますか？')">育児休業</button>
    <button class="qb" onclick="ask('懲戒処分の種類を教えてください')">懲戒処分</button>
    <button class="qb" onclick="ask('自己都合退職の手続きは？')">退職手続き</button>
    <button class="qb" onclick="ask('定年は何歳ですか？')">定年</button>
    <button class="qb" onclick="ask('特別休暇は何日取れますか？')">特別休暇</button>
  </div>
  <div class="inp-area">
    <textarea id="inp" placeholder="&#x1F4AC; 就業規則について質問を入力してください..." rows="1"></textarea>
    <button class="sbtn" onclick="send()" aria-label="送信">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

第10条（人事異動）業務上必要な場合、配置転換・職種変更・出向・役職任免を命じられる。
第12条（出退社）正当な理由なく欠勤・遅刻・早退禁止。始業時刻は仕事を始める時刻。
第13条（出退社の記録）本人が自らタイムカードに記録。他人への依頼・代行禁止。
第14条（欠勤・遅刻・早退）事前に届出・承認が必要。私傷病欠勤時は診断書提出命令あり（費用本人負担）。
第16条（職場保持規律）清潔な服装・態度、酒気帯び勤務禁止、暴行・脅迫禁止、副業禁止（無許可）等。
第17条（就業規律）報告・連絡・相談の三原則。業務上の失敗は隠さず速報。
第18条（機密管理）個人情報・経営情報等を第三者に漏洩禁止。退職後も同様。
第20条（パワハラ禁止）優越的地位を背景とした言動で就業環境を害する行為禁止。
第21条（セクハラ禁止）性的言動で不利益・不快感を与えたり就業環境を害する行為禁止。
第22条（マタハラ等禁止）妊娠・出産・育児・介護等に関する言動で就業環境を害する行為禁止。
第27条（所定労働時間）事務職以外：1ヶ月単位変形労働時間制（毎月16日起算）、1週40時間以内。休日：日曜・祝日・年末年始。事務職：1日8時間、始業9時終業18時、休憩12〜13時。休日：土日・祝日・年末年始・夏期休暇・学園指定日。
第28条（休日振替・代休）業務上必要な場合、事前に日を指定して振替可能。代休日は無給。
第30条（時間外・休日・深夜勤務）業務都合で命令可能。拒否不可。労使協定の範囲内。
第31条（年次有給休暇）採用日から6ヶ月継続勤務・全所定労働日の8割以上出勤で付与。付与日数：6ヶ月→10日、1年6ヶ月→11日、2年6ヶ月→12日、3年6ヶ月→14日、4年6ヶ月→16日、5年6ヶ月→18日、6年6ヶ月以上→20日。発生後1年以内未使用分は翌年度のみ繰越可。10日以上付与者は付与日から1年以内に5日の時季指定取得義務あり。
第32条（有給請求手続）取得希望日の1週間前までに届出必要。
第33条（生理日休暇）生理日就業が著しく困難な女性からの請求で付与（無給）。
第34条（産前産後休暇）産前：6週間以内（多胎14週間）出産予定の女性が請求（無給）。産後：出産後8週間（無給）。
第35条（育児時間）生後1歳未満の子を養育する社員は1日2回・各30分の育児時間付与（無給）。
第37条（育児・介護休業）1歳未満の子の養育または介護が必要な場合に取得可（無給）。
第39条（特別休暇）本人結婚：連続7日（有給）、父母・配偶者・子の死亡：7日（有給）、祖父母・配偶者の父母の死亡：2日（有給）、兄弟姉妹の死亡：3日（有給）、孫・伯父母等の死亡：1日（有給）。請求権は事由発生日から3ヶ月で消滅。
第42条（休職期間）勤続1年未満→1ヶ月以内、1〜3年→3ヶ月以内、3〜5年→6ヶ月以内、5〜10年→1年以内、10年以上→1年6ヶ月以内。
第44条（休職中給与）無給。昇給・賞与算定から休職期間を除外。
第45条（復職）休職事由消滅時、原則休職前の職務に復職。医師の診断書添付必要。期間満了後も復職不可なら退職。
第47条（定年）満63歳。希望者は最大65歳まで1年単位で再雇用。
第49条（自己都合退職）少なくとも3ヶ月前に退職願提出・学園の承認が必要。
第51条（解雇予告）30日前予告または30日分の平均賃金支給。
第52条（解雇制限）業務上の傷病療養中+30日間、産前産後休業中+30日間は解雇不可。
第58条（教育）命令された研修は労働時間とみなし給与支給。自発参加は無給。
第61条（健康診断）年1回の定期健康診断受診義務（費用学園負担・時間は有給扱い）。給食従事者は毎月検便義務。
第67条（懲戒の種類）けん責（始末書・戒め）、減給（1回＝平均賃金1日の半額・総額＝賃金支払期の1割以内）、出勤停止（7営業日以内・期間無給）、降職（役職引下げ）、諭旨解雇（退職勧告）、懲戒解雇（即時解雇）。
第68条（懲戒事由）けん責等：規則違反・無断欠勤・過失損害・虚偽申告・ハラスメント等。諭旨・懲戒解雇：連続14日以上無断欠勤・業務妨害・故意重大過失損害・経歴詐称・刑法犯・重大なハラスメント等。
第71条（損害賠償）違反行為で学園に損害を与えた場合、現状回復または賠償義務あり。退職後も免責なし。`;

const msgsEl = document.getElementById('msgs');
const inpEl = document.getElementById('inp');
let history = [];

window.onload = function() {
  appendBotMsg('こんにちは！就業規則アシスタントの「どめ」です。\n\nしおどめの森 保育園部の正社員就業規則について、何でもお気軽にご質問ください。回答には根拠となる条文もお示しします。', []);
};

inpEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
inpEl.addEventListener('input', () => { inpEl.style.height = '38px'; inpEl.style.height = Math.min(inpEl.scrollHeight, 90) + 'px'; });
function ask(q) { inpEl.value = q; send(); }
function now() { return new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function appendBotMsg(text, citations) {
  const row = document.createElement('div'); row.className = 'row bot';
  const av = document.createElement('div'); av.className = 'av';
  av.innerHTML = '<img src="' + DOME + '" alt="どめ">';
  const bub = document.createElement('div'); bub.className = 'bubble'; bub.textContent = text;
  const ts = document.createElement('div'); ts.className = 'ts'; ts.textContent = now();
  row.appendChild(av); row.appendChild(bub); row.appendChild(ts);
  msgsEl.appendChild(row);
  if (citations && citations.length) {
    citations.forEach(c => {
      const cite = document.createElement('div'); cite.className = 'cite';
      cite.innerHTML = '<div class="cite-lbl">&#x1F4CC; 根拠条文</div><div class="cite-txt">' + esc(c.text) + '</div><div class="cite-src">' + esc(c.source||'') + '</div>';
      msgsEl.appendChild(cite);
    });
  }
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function appendUserMsg(text) {
  const row = document.createElement('div'); row.className = 'row user';
  const bub = document.createElement('div'); bub.className = 'bubble'; bub.textContent = text;
  const ts = document.createElement('div'); ts.className = 'ts'; ts.textContent = now();
  row.appendChild(ts); row.appendChild(bub);
  msgsEl.appendChild(row); msgsEl.scrollTop = msgsEl.scrollHeight;
}

function showTyping() {
  const row = document.createElement('div'); row.className = 'typing-row'; row.id = 'typing';
  const av = document.createElement('div'); av.className = 'av';
  av.innerHTML = '<img src="' + DOME + '" alt="どめ">';
  const bub = document.createElement('div'); bub.className = 'typing-bub';
  bub.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  row.appendChild(av); row.appendChild(bub);
  msgsEl.appendChild(row); msgsEl.scrollTop = msgsEl.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

async function send() {
  const q = inpEl.value.trim(); if (!q) return;
  inpEl.value = ''; inpEl.style.height = '38px';
  appendUserMsg(q); history.push({ role: 'user', content: q }); showTyping();
  const sys = 'あなたは就業規則の専門アシスタントです。以下の就業規則を参照して質問に答えてください。\n\n' + RULES + '\n\n回答ルール：\n1. 根拠条文番号と内容を必ず引用すること\n2. 簡潔に箇条書きでまとめること\n3. 記載がない場合は「本規則には記載がありません」と明記すること\n4. 文体は「です・ます」調で統一すること\n5. 必ず以下のJSONのみで回答（前後にテキスト不可）：\n{"answer":"回答本文（改行は\\nで表現）","citations":[{"text":"第○条（条文名）条文内容","source":"しおどめの森保育園部 正社員就業規則"}]}';
  try {
    const resp = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: sys, messages: history })
    });
    const data = await resp.json(); removeTyping();
    if (data.error) { appendBotMsg('エラーが発生しました：' + data.error.message, []); return; }
    const raw = (data.content||[]).map(b=>b.text||'').join('');
    const clean = raw.replace(/^```json\s*/,'').replace(/\s*```$/,'').trim();
    let parsed; try { parsed = JSON.parse(clean); } catch(e) { parsed = {answer:raw,citations:[]}; }
    const ans = parsed.answer || raw;
    appendBotMsg(ans, parsed.citations||[]); history.push({ role: 'assistant', content: ans });
  } catch(err) {
    removeTyping(); appendBotMsg('エラーが発生しました。\n' + err.message, []);
  }
}
</script>
