function initCardSize() {
  const scroll = document.getElementById('catScroll');
  const grid   = document.getElementById('catGrid');
  const cards  = grid.querySelectorAll('.cat-card');
  const gap    = 10;
  const pad    = 14 * 2;
  const pageW  = scroll.clientWidth - pad;
  if (pageW <= 0) { setTimeout(initCardSize, 50); return; }
  const cardW  = (pageW - gap) / 2;
  cards.forEach(c => { c.style.width = cardW + 'px'; });
  grid.style.gridAutoColumns = cardW + 'px';
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initCardSize);
} else {
  initCardSize();
}

// ◀▶ナビゲーション
const catScroll = document.getElementById('catScroll');
const navPrev = document.getElementById('navPrev');
const navNext = document.getElementById('navNext');
const pageNum  = document.getElementById('pageNum');
const TOTAL_PAGES = 6;
let currentPage = 0;

function updateNav() {
  pageNum.textContent = (currentPage + 1) + ' / ' + TOTAL_PAGES;
  navPrev.classList.toggle('disabled', currentPage === 0);
  navNext.classList.toggle('disabled', currentPage === TOTAL_PAGES - 1);
}

function slideCat(dir) {
  currentPage = Math.max(0, Math.min(TOTAL_PAGES - 1, currentPage + dir));
  const pageW = catScroll.clientWidth;
  catScroll.scrollTo({ left: currentPage * pageW, behavior: 'smooth' });
  updateNav();
}

catScroll.addEventListener('scroll', () => {
  const pageW = catScroll.clientWidth;
  if (pageW > 0) {
    currentPage = Math.round(catScroll.scrollLeft / pageW);
    updateNav();
  }
});

updateNav();

const msgsEl = document.getElementById('msgs');
const inpEl  = document.getElementById('inp');
const bodyEl = document.getElementById('bodyEl');
let history  = [];

window.onload = function() {
  appendBotMsg('こんにちは！相談をタップするか、直接ご質問ください。', []);
};

// 規程ボタンの横スライド
function slideRule(dir) {
  const el = document.getElementById('ruleBtns');
  el.scrollBy({ left: dir * 150, behavior: 'smooth' });
}

// Enterキーは改行のみ、送信はボタンのみ
inpEl.addEventListener('input', () => { inpEl.style.height = '38px'; inpEl.style.height = Math.min(inpEl.scrollHeight, 90) + 'px'; });
function ask(q) { inpEl.value = q; send(); }
function now() { return new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function scrollBottom() { bodyEl.scrollTop = bodyEl.scrollHeight; }
function scrollToEl(el) { el.scrollIntoView({ block: 'start', behavior: 'smooth' }); }

function appendBotMsg(text, citations) {
  const row = document.createElement('div'); row.className = 'row bot';
  const av  = document.createElement('div'); av.className  = 'av';
  av.innerHTML = '<img src="' + CHAR_IMG + '" alt="' + org.botName + '">';
  const bub = document.createElement('div'); bub.className = 'bubble'; bub.textContent = text;
  const ts  = document.createElement('div'); ts.className  = 'ts'; ts.textContent = now();
  row.appendChild(av); row.appendChild(bub); row.appendChild(ts);
  msgsEl.appendChild(row);
  scrollToEl(row);
  if (citations && citations.length) {
    citations.forEach(c => {
      const cite = document.createElement('div'); cite.className = 'cite';
      cite.innerHTML = '<div class="cite-lbl">📌 根拠・参考</div><div class="cite-txt">' + esc(c.text) + '</div><div class="cite-src">' + esc(c.source||'') + '</div>';
      msgsEl.appendChild(cite);
    });
  }
}

function appendUserMsg(text) {
  const row = document.createElement('div'); row.className = 'row user';
  const bub = document.createElement('div'); bub.className = 'bubble'; bub.textContent = text;
  const ts  = document.createElement('div'); ts.className  = 'ts'; ts.textContent = now();
  row.appendChild(ts); row.appendChild(bub);
  msgsEl.appendChild(row); scrollToEl(row);
}

function showTyping() {
  const row = document.createElement('div'); row.className = 'typing-row'; row.id = 'typing';
  const av  = document.createElement('div'); av.className  = 'av';
  av.innerHTML = '<img src="' + CHAR_IMG + '" alt="' + org.botName + '">';
  const bub = document.createElement('div'); bub.className = 'typing-bub';
  bub.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  row.appendChild(av); row.appendChild(bub);
  msgsEl.appendChild(row); scrollBottom();
}
function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

async function send(forcedQuestion, skipDeptCheck) {
  const q = forcedQuestion !== undefined ? forcedQuestion : inpEl.value.trim();
  if (!q) return;
  await kisokuReady;

  if (!skipDeptCheck && garden.departments && isKisokuQuestion(q)) {
    inpEl.value = ''; inpEl.style.height = '38px';
    appendUserMsg(q); history.push({ role: 'user', content: q });
    showDeptChoice(q);
    return;
  }

  inpEl.value = ''; inpEl.style.height = '38px';
  appendUserMsg(q); history.push({ role: 'user', content: q }); showTyping();

  let kisokuText = DYNAMIC_KISOKU !== null ? DYNAMIC_KISOKU : KISOKU;
  let deptLabel = garden.title;
  if (garden.departments) {
    if (selectedDept) {
      kisokuText = await fetchDeptKisoku(selectedDept);
      deptLabel = garden.title + '（' + selectedDept + '）';
    } else {
      kisokuText = '';
    }
  }

  const sys = `あなたは保育園・認定こども園の園長を支援する専門アシスタントです。
以下の知識データベースを参照して、園長の困りごとに対して具体的・実践的に答えてください。

${KNOWLEDGE}

【当園（${deptLabel}）就業規則・給与規程（優先参照）】
${kisokuText}

回答ルール：
1. 園長の立場に立って、今すぐ実践できる具体的な手順・対応を示すこと
2. 根拠となる法令・規則・ガイドライン等があれば必ず引用すること
3. 深刻な問題（虐待・重大事故・刑事事件等）は必ず専門家・行政への相談を促すこと
4. 文体は「です・ます」調で統一すること
5. 必ず以下のJSONのみで回答（前後にテキスト不可）：
{"answer":"回答本文（改行は\\nで表現）","citations":[{"text":"根拠・参考となる内容","source":"参照元（就業規則・労働基準法・内閣府ガイドライン等）"}]}`;

  try {
    const resp = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1500, system: sys, messages: history })
    });
    const data = await resp.json(); removeTyping();
    if (data.error) { appendBotMsg('エラーが発生しました：' + data.error.message, []); return; }
    const raw   = (data.content||[]).map(b=>b.text||'').join('');
    const clean = raw.replace(/^```json\s*/,'').replace(/\s*```$/,'').trim();
    let parsed; try { parsed = JSON.parse(clean); } catch(e) { parsed = {answer:raw,citations:[]}; }
    const ans = parsed.answer || raw;
    appendBotMsg(ans, parsed.citations||[]); history.push({ role: 'assistant', content: ans });
  } catch(err) {
    removeTyping(); appendBotMsg('エラーが発生しました。\n' + err.message, []);
  }
}
</script>
