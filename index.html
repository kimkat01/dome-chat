<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ドメボット</title>
<style>
:root{
  --main-color:#4169e1;
  --main-color-light:#eef2ff;
  --main-color-border:#c7d2fe;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#dde4f5}
body{display:flex;align-items:center;justify-content:center;min-height:100vh}
@media (max-width: 400px) {
  body{align-items:stretch;background:#fff;padding:0}
}

/* ── アプリ外枠：八潮幼稚園ウィジェット風コンパクトサイズ ── */
.app{
  display:flex;flex-direction:column;
  width:min(300px, 95vw);
  height:min(640px, 90vh);
  border-radius:16px;overflow:hidden;
  background:#f0f4f8;
  box-shadow:0 8px 32px rgba(0,0,0,.18)
}
@media (max-width: 400px) {
  .app{
    width:100vw;
    height:100vh;
    height:100dvh;
    border-radius:0;
    box-shadow:none;
  }
}

/* ── ヘッダー ── */
.hdr{background:var(--main-color);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-av{width:52px;height:52px;border-radius:50%;background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.hdr-av img{width:90%;height:90%;object-fit:contain}
.hdr-text{flex:1;min-width:0}
.hdr-title{font-size:10.5px;font-weight:600;color:rgba(255,255,255,.88);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-name{font-size:17px;font-weight:800;color:#fff;letter-spacing:0.04em;margin-top:1px}
.hdr-dot{width:10px;height:10px;background:#4ade80;border-radius:50%;flex-shrink:0;box-shadow:0 0 7px #4ade80}

/* ── スクロール本体 ── */
.body{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-height:0}
.body::-webkit-scrollbar{width:4px}
.body::-webkit-scrollbar-thumb{background:#bbb;border-radius:2px}

/* ── カテゴリセクション ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 6px;flex-shrink:0}
.sec-hdr-left{font-size:13px;font-weight:700;color:#333;display:flex;align-items:center;gap:4px}
.sec-hdr-right{font-size:11px;color:var(--main-color);font-weight:600}

/* 横スクロールコンテナ */
.cat-scroll{
  overflow-x:auto;
  padding:0 0 6px;
  scroll-padding-left:14px;
  scroll-snap-type:x mandatory;
  flex-shrink:0;
}
.cat-scroll::-webkit-scrollbar{display:none}

/* グリッド：2行×2列ページ×6ページ = 12カード */
.cat-grid{
  display:grid;
  grid-template-rows:1fr 1fr;
  grid-auto-flow:column;
  gap:10px;
  width:max-content;
  margin:0 14px;
}

.cat-card{
  width:calc((min(300px, 95vw) - 34px) / 2);
  background:#fff;border-radius:12px;
  padding:10px 8px 9px;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  cursor:pointer;border:1.5px solid #e8edf5;
  transition:all .15s;scroll-snap-align:start;
}
.cat-card:hover,.cat-card:active{background:var(--main-color-light);border-color:var(--main-color)}
.submenu-wrap{background:#fff;border-radius:14px;padding:12px 14px;margin:4px 0;border:1.5px solid #e8edf5;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.submenu-label{font-size:11px;color:var(--main-color);font-weight:700;margin-bottom:8px}
.submenu-btns{display:flex;flex-wrap:wrap;gap:6px}
.submenu-btn{background:var(--main-color-light);border:1.5px solid var(--main-color-border);border-radius:20px;padding:5px 12px;font-size:11.5px;font-weight:600;color:#3451b2;cursor:pointer;transition:all .15s;font-family:inherit}
.submenu-btn:hover,.submenu-btn:active{background:var(--main-color);color:#fff;border-color:var(--main-color)}
.cat-icon{font-size:20px;line-height:1}
.cat-label{font-size:11px;font-weight:600;color:#2d3a5e;text-align:center}

/* ページインジケーター */
.page-dots{display:flex;justify-content:center;align-items:center;gap:10px;padding:4px 0 6px;flex-shrink:0}
.page-dot{display:none}
.nav-arrow{width:28px;height:28px;border-radius:50%;background:var(--main-color-light);border:1.5px solid var(--main-color-border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--main-color);transition:all .15s;user-select:none}
.nav-arrow:active{background:var(--main-color);color:#fff}
.nav-arrow.disabled{opacity:0.35;pointer-events:none}
.page-num{font-size:11px;color:#6b7280;font-weight:600;min-width:32px;text-align:center}

/* ── 規程セクション ── */
.rule-sec{padding:2px 14px 10px;flex-shrink:0}
.rule-hdr{font-size:11.5px;color:#777;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;gap:4px}
.rule-nav{display:flex;gap:4px}
.rule-arrow{width:22px;height:22px;border-radius:50%;background:var(--main-color-light);border:1.5px solid var(--main-color-border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;color:var(--main-color);transition:all .15s;user-select:none}
.rule-arrow:active{background:var(--main-color);color:#fff}
.rule-btns{display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;padding:0 14px 4px;margin:0 -14px}
.rule-btns::-webkit-scrollbar{display:none}
.rule-btn{background:var(--main-color-light);border:1.5px solid var(--main-color-border);border-radius:12px;padding:11px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s;flex-shrink:0;width:136px;scroll-snap-align:start}
.rule-btn:hover{background:var(--main-color);border-color:var(--main-color)}
.rule-btn:hover .rule-btn-title,.rule-btn:hover .rule-btn-sub{color:#fff}
.rule-btn-icon{font-size:17px;flex-shrink:0}
.rule-btn-text{text-align:left}
.rule-btn-title{font-size:13px;font-weight:700;color:var(--main-color)}
.rule-btn-sub{font-size:10px;color:#7b93d4;margin-top:1px}

/* ── チャットエリア ── */
.msgs{flex:1;padding:10px 14px;display:flex;flex-direction:column;gap:10px;min-height:80px}
.row{display:flex;align-items:flex-end;gap:6px}
.row.user{flex-direction:row-reverse}
.av{width:34px;height:34px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#fff}
.av img{width:100%;height:100%;object-fit:contain}
.bubble{padding:9px 13px;border-radius:18px;font-size:13px;line-height:1.75;max-width:78%;white-space:pre-wrap;word-break:break-word}
.row.bot .bubble{background:#fff;color:#1a1a1a;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.09)}
.row.user .bubble{background:var(--main-color);color:#fff;border-bottom-right-radius:4px}
.ts{font-size:10px;color:#aaa;margin:0 4px 2px;align-self:flex-end;white-space:nowrap}
.cite{margin-top:4px;margin-left:32px;padding:7px 10px;background:var(--main-color-light);border-radius:0 12px 12px 12px;border-left:2px solid var(--main-color);max-width:80%}
.cite-lbl{font-size:10px;color:var(--main-color);font-weight:600;margin-bottom:2px}
.cite-txt{font-size:11.5px;color:#1e3a8a;line-height:1.6}
.cite-src{font-size:10px;color:#6b7fc7;margin-top:2px}

/* タイピング */
.typing-row{display:flex;align-items:flex-end;gap:6px}
.typing-bub{padding:9px 13px;background:#fff;border-radius:18px;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.09);display:flex;gap:5px;align-items:center}
.dot{width:7px;height:7px;background:#93c5fd;border-radius:50%;animation:bop .9s infinite}
.dot:nth-child(2){animation-delay:.18s}.dot:nth-child(3){animation-delay:.36s}
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* ── 入力欄 ── */
.inp-area{padding:8px 12px 12px;border-top:1px solid #e5e9f2;background:#fff;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.inp-area textarea{flex:1;resize:none;border:2px solid var(--main-color);border-radius:20px;padding:8px 14px;font-size:13px;font-family:inherit;line-height:1.5;height:38px;max-height:90px;overflow-y:hidden;background:#f0f4ff;color:#1a1a1a;font-weight:500}
.inp-area textarea::placeholder{color:#7b93d4;font-weight:400}
.inp-area textarea:focus{outline:none;background:#fff;box-shadow:0 0 0 3px rgba(65,105,225,.15)}
.sbtn{width:38px;height:38px;border-radius:50%;background:var(--main-color);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.sbtn:hover{opacity:.85;transform:scale(1.05)}
.sbtn svg{width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<div class="app">

  <!-- ヘッダー -->
  <div class="hdr">
    <div class="hdr-av"><img id="hdrImg" alt="どめくん"></div>
    <div class="hdr-text">
      <div class="hdr-title" id="hdrTitle">読み込み中...</div>
      <div class="hdr-name" id="hdrName">ドメボット</div>
    </div>
    <div class="hdr-dot"></div>
  </div>

  <!-- スクロール本体 -->
  <div class="body" id="bodyEl">

    <!-- よく使う相談 -->
    <div class="sec-hdr">
      <div class="sec-hdr-left">⚡ よく使う相談</div>
      <div class="sec-hdr-right">&#xbb; スライドできます</div>
    </div>

    <div class="cat-scroll" id="catScroll">
      <div class="cat-grid" id="catGrid">
        <div class="cat-card" onclick="showSubmenu('保育・教育')"><div class="cat-icon">🌱</div><div class="cat-label">保育・教育</div></div>
        <div class="cat-card" onclick="showSubmenu('事故・安全管理')"><div class="cat-icon">🩹</div><div class="cat-label">事故・安全管理</div></div>
        <div class="cat-card" onclick="showSubmenu('保健衛生・感染症')"><div class="cat-icon">🏥</div><div class="cat-label">保健衛生・感染症</div></div>
        <div class="cat-card" onclick="showSubmenu('給食・食育')"><div class="cat-icon">🍱</div><div class="cat-label">給食・食育</div></div>
        <div class="cat-card" onclick="showSubmenu('労務管理・職員')"><div class="cat-icon">👥</div><div class="cat-label">労務管理・職員</div></div>
        <div class="cat-card" onclick="showSubmenu('保護者対応')"><div class="cat-icon">👨‍👩‍👧</div><div class="cat-label">保護者対応</div></div>
        <div class="cat-card" onclick="showSubmenu('行政・監査・法令')"><div class="cat-icon">📋</div><div class="cat-label">行政・監査・法令</div></div>
        <div class="cat-card" onclick="showSubmenu('経理・財務運営')"><div class="cat-icon">💰</div><div class="cat-label">経理・財務運営</div></div>
        <div class="cat-card" onclick="showSubmenu('施設・設備管理')"><div class="cat-icon">🏢</div><div class="cat-label">施設・設備管理</div></div>
        <div class="cat-card" onclick="showSubmenu('BCP・危機管理')"><div class="cat-icon">🚨</div><div class="cat-label">BCP・危機管理</div></div>
        <div class="cat-card" onclick="showSubmenu('ICT・DX・コドモン')"><div class="cat-icon">💻</div><div class="cat-label">ICT・DX・コドモン</div></div>
        <div class="cat-card" onclick="showSubmenu('組織・コミュニケーション')"><div class="cat-icon">🤝</div><div class="cat-label">組織・コミュニケーション</div></div>
      </div>
    </div>

    <div class="page-dots" id="pageDots">
      <div class="nav-arrow" id="navPrev" onclick="slideCat(-1)">◀</div>
      <div class="page-num" id="pageNum">1 / 6</div>
      <div class="nav-arrow" id="navNext" onclick="slideCat(1)">▶</div>
    </div>

    <!-- 規程から探す -->
    <div class="rule-sec">
      <div class="rule-hdr">
        <span>📋 規程から探す</span>
        <div class="rule-nav">
          <div class="rule-arrow" onclick="slideRule(-1)">◀</div>
          <div class="rule-arrow" onclick="slideRule(1)">▶</div>
        </div>
      </div>
      <div class="rule-btns" id="ruleBtns">
        <button class="rule-btn" onclick="ask('就業規則について教えてください。')">
          <div class="rule-btn-icon">📑</div>
          <div class="rule-btn-text">
            <div class="rule-btn-title">就業規則</div>
            <div class="rule-btn-sub">柴学園規程</div>
          </div>
        </button>
        <button class="rule-btn" onclick="ask('給与規程について教えてください。')">
          <div class="rule-btn-icon">💰</div>
          <div class="rule-btn-text">
            <div class="rule-btn-title">給与規程</div>
            <div class="rule-btn-sub">柴学園規程</div>
          </div>
        </button>
        <button class="rule-btn" onclick="ask('経理規程について教えてください。')">
          <div class="rule-btn-icon">🧾</div>
          <div class="rule-btn-text">
            <div class="rule-btn-title">経理規程</div>
            <div class="rule-btn-sub">柴学園規程</div>
          </div>
        </button>
      </div>
    </div>

    <!-- チャットメッセージ -->
    <div class="msgs" id="msgs"></div>

  </div><!-- /body -->

  <!-- 入力欄 -->
  <div class="inp-area">
    <textarea id="inp" placeholder="質問を入力..." rows="1"></textarea>
    <button class="sbtn" onclick="send()" aria-label="送信">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

</div>

  document.documentElement.style.setProperty('--main-color', org.color);

  document.documentElement.style.setProperty('--main-color-border', org.colorBorder);

  // キャラクター画像／絵文字を反映
  const img = document.getElementById('hdrImg');
  if (img) {

      img.src = org.characterImage;
      img.style.display = '';
    } else if (org.characterEmoji) {
      // 画像が未設定の法人は絵文字で仮対応
      img.style.display = 'none';
      const avEl = img.parentElement;
      if (avEl && !avEl.querySelector('.emoji-fallback')) {
        const span = document.createElement('span');
        span.className = 'emoji-fallback';
        span.style.fontSize = '26px';
        span.textContent = org.characterEmoji;
        avEl.appendChild(span);
      }
    } else {
      img.src = DOME; // デフォルトはどめくん
      img.style.display = '';
    }
  }

  // 規程ボタンのサブラベル（「柴学園規程」固定）を法人名に合わせて更新
  document.querySelectorAll('.rule-btn-sub').forEach(el => {
    el.textContent = org.orgName + '規程';

});

第８条（試用期間）

- 第１項の定める試用期間における勤務態度、勤務成績、能力について、継続した査定が必要であるときは試用期間を延長することがあります。この場合は、１４日前までに本人にこれを通知するものとします。

- 前項による延長期間は２ヶ月を超えないものとします。

- 試用期間において以下各号の事由により本採用する者として適さないと判断したときは直ちに採用を取消すことがあります。

ただし、試用期間が１４日を経過した場合は第４７条の手続きに従うものとします。

	- 正当な理由なく無断欠勤したとき

	- 正当な理由なく上司の指示に従わなかったとき

	- 勤務時間中に業務に専念せず、職場を離れたり、私的な行為を行ったとき

	- 第５条および第７条に規定する提出書類の内容、もしくは面接時に述べた内容が事実と異なることが判明したとき

	- 第７条に規定する提出書類を期日までに提出しないとき

	- 業務遂行に支障となる恐れのある既往症を隠し採用されたとき

	- その他、前各号に準ずる程度の事由があるとき

	- 第４６条または第６４条に該当する事由があるとき

	２）正当な理由がないこと

**第 ２ 節　服務に関する規律**

第１６条（職場保持に関する規律）

職員は、次に掲げる事項を守って、業務に精勤しなければなりません。

	- 常に自己のみならず、他の者の健康に留意し、就業すること。

	- 職場の整理整頓に努め、常に清潔に保つようにすること。

	- 礼儀と礼節をわきまえ、元気のよいあいさつを実践し、明朗・溌剌たる勤務態度で就業すること。

	- 担当職務には常に情熱を持って取り組み、園児や保護者の方々に満足していただく創意と工夫、誠意と努力は決して惜しまないこと。

	- 園児や保護者の方々あっての仕事であることを常に念頭に置き、清潔な服装・態度を持って業務を行うとともに、当園の職員としての品位を保つように努めること。

	- 園児や保護者の方々に対し、学園の教育方針に反するような態度を取らないこと。

	- 学園内外を問わず、学園の名誉または信用を傷つけ、業務上学園に損害を与える行為を行わないこと。

	- 職務上の地位を利用して私利を図り、又は取引先等より不当な金品の贈与又は借用等を受けないこと。

	- 本規則およびこれに付属する諸規程等に定める届出事項について、虚偽の申告をしないこと。また、提出期限を守ること。

	- 過剰な借入金、その他私生活上の非行為により、学園内秩序を乱し、ないしその恐れを発生させないこと。

	- 酒気を帯びての勤務はしないこと。酒気帯び運転及び飲酒運転は、業務中はもとより業務外においてもしてはならず、さらに、他の職員のこれらの行為を見過ごしたり、車を運転することがわかっている者に対して飲酒を勧めたりするなど酒気帯び運転および飲酒運転を助長することは決してしないこと。

	- 学園の許可なく、外部の者を法人に入れないこと。

	- 学園内で、暴行、脅迫、傷害、暴言、またはこれに類する行為を行わないこと。

	- 所定の場所以外で喫煙し、または電熱器等の火気を許可なく使用しないこと。

	- 学園の許可なく、学園内で宗教活動、政治活動、募金活動等、業務に関係の無い活動を行わないこと。

	- 学園の許可なく、学園内で集会、演説または宣伝行為を行わないこと。

	- 学園の許可なく、学園内で業務遂行上とは関係の無い営業活動を行わないこと。

	- 学園の許可なく、在籍のまま他の学園の役員に就任し、または職員として雇用契約を結んだり、あるいは自ら事業を営まないこと。

	- 相手の望まない性的な言動により、他の職員に不利益を与えたり、就業環境を害する等のセクシュアルハラスメント行為を行わないこと。

	- 職権のパワーを背景に、本来の業務の範囲を超えて継続的に、人格と尊厳を侵害する言動を行い、労働環境を悪化させる、あるいは雇用不安を与えるパワーハラスメント行為を行わないこと。

- 他の職員を教唆して、この規則に反するような行為、秩序を乱すような行為を行わないこと。

- 前項の他、本規則に違反するような行為を行わないこと。

	

	

第１７条（就業に関する規律）

	職員は、次に掲げる事項を守って、業務に精勤しなければなりません。

	- 職務遂行にあたっては、報告、連絡、相談の三原則を守ること。

	- 学園が定めた業務分担と諸規則に従い、職務上の指示命令に忠実に従うとともに、正確かつ迅速にその職務を遂行し、常にその効率化を図るよう努力すること。

	- 業務遂行にあたっては、所属長、同僚と協力しあって、チームワークの向上に努めること。

	- 自己の職務上の権限を越えて専断的なことを行わないこと。ただし、緊急やむを得ない場合には、適切な措置を講じ、事後速やかに学園に報告し承認を得ること。

	- 園児や保護者の方々および取引先に対しては誠実な態度であたり、信頼を損なう行動は慎むこと。

	- 勤務時間中は、職務に専念し、みだりに職場を離れたり私事の用務を行わないこと。

	- 業務上の失敗、ミス、クレームは隠さず、事実を速やかに学園に報告すること。

- 前号の機密情報を、許可なく勝手に複写しないこと。

- 前１号の機密情報が入った文書・写真・磁気テープ・ＦＤ・ＣＤ等、これに関する一切の資料ならびにその複写物を、許可なく園外に持ち出さないこと。

- 職員は、在職中はもとより退職後においても、許可を得た場合を除き、前１号の機密情報を、第三者に漏らさないこと。

第１９条（物品の取扱に関する規律）

- 学園の許可なく、職務以外の目的で学園の施設、備品、事務用品、事務機器、電話、車輌、販売商品等を使用しないこと。

- 学園の許可なく、学園の備品等を園外に持ち出さないこと。

職務上の地位や人間関係などの職場内の優越的な関係を背景とした、業務上必要かつ相当な範囲を超えた言動により、他の職員の就業環境を害するようなことをしてはなりません。

性的な言動により、他の職員に不利益や不快感を与えたり、就業環境を害するようなことをしてはなりません。

妊娠・出産等に関する言動及び妊娠・出産・育児・介護等に関する制度又は措置の利用に関する言動により、他の職員の就業環境を害するようなことをしてはなりません。

第２３条（その他あらゆるハラスメントの禁止）

第１９条から前条までに規定するもののほか、性的指向・性自認に関する言動によるものなど職場におけるあらゆるハラスメントにより、他の職員の就業環境を害するようなことをしてはなりません。

| --- | --- | --- | --- | --- | --- | --- | --- |
| 付与 日数 | １０日 | １１日 | １２日 | １４日 | １６日 | １８日 | ２０日 |

	- 学園は、職員の請求した日に休暇を与えることが、事業の正常な運営を妨げると判断したときは、時季を変更することがあります。

	- 請求された有給休暇は、前年度分の繰越分がある場合は、前年度分から消化するものとします。

	- 年次有給休暇の取得日については、所定労働時間に勤務をしたときに支払われる、通常の給与を支給します。

	- 出勤率の計算において、次の場合は全労働日から除外します。

	- 学園の都合により休業した期間

	- 休日労働した日

	- 正当な争議行為により労務の提供が全くなされなかった日

	- 出勤率の計算において、次の場合は出勤したものとして扱います。

	- 業務上の傷病による休業期間

	- 年次有給休暇を取得した日

	- 産前産後の休業期間

	- 育児休業期間

	- 介護休業期間

	- 出勤率の計算において、第２９条に定める生理日の休暇については、全労働日には算入しますが、出勤日には含めず欠勤とします。

	- 労使協定を締結した場合は、５日を超える日数につき、時季を指定して年次有給休暇を与えることがあります。

	- 第１項の年次有給休暇が１０日以上与えられた職員に対しては、第２項の規定にかかわらず、付与日から１年以内に、当該職員の有する年次有給休暇日数のうち５日について、学園が職員の意見を聴取し、その意見を尊重した上で、あらかじめ時季を指定して取得させる。ただし、職員が第２項または第９項の規定による年次有給休暇を取得した場合においては、当該取得した日数分を５日から控除するものとする。

	

第２９条（年次有給休暇の請求手続）

	- 年次有給休暇を取得しようとするときは、取得しようとする日の少なくとも１週間前までに、学園に届出なければなりません。また、年次有給休暇取得日の前日までに上司もしくは関係職員に業務の引継ぎを行い、休暇中に想定される事項等について、支障が発生しないように予め必要な報告、または連絡等をしておかなければなりません。

	- 病気その他やむを得ない事由により欠勤した場合で、事後速やかに本人から申し出があり学園が認めた場合は、当該欠勤日を年次有給休暇に振り替えることがあります。この場合に、学園が指定する医師の診断書の提出を命じることがあります。

第３０条（生理日の休暇）

- 生理日の就業が著しく困難な女性から請求があったときは、生理日の休暇を与えます。

- 前項の休暇は、無給とします。

第３１条（産前産後の休暇）

- ６週間（多胎妊娠の場合は１４週間）以内に出産する予定の女性職員から請求のあったときは、休暇を与えます。

- 前項の休暇を請求する場合は、休業を開始する日の1か月前までに書面により届け出て、開始日までに業務の引継ぎを行わなければなりません。

- 出産した女性職員には、８週間の休暇を与えます。ただし、産後６週間を経過した女性職員から請求があったときは、医師により支障がないと認めた範囲内で業務に就かせることがあります。

- 前項の休暇については無給とします。

第３２条（育児時間）

- 生後１歳に達しない子を養育する職員が請求した場合は、休憩時間のほか１日２回、１回３０分の育児時間を与えます。

- 前項の時間は、無給とします。

	第３３条（母性健康管理のための休暇等）

	- 妊娠中、または出産後１年を経過しない女性職員は、所定労働時間内に、母子健康法に定める保健指導または健康診査（以下「健康診査等」という）を受診するため、通院に必要な時間について通院休暇を取得することができます。

	- 前項の通院休暇を取得できる回数は、次の回数を基本とします。ただし、医師等がこれと異なる指示をしたときは、当該指示された回数の取得を認めます。

	- 妊娠２３週までは、４週間に１回

	- 妊娠２４週から３５週までは､２週間に１回

	- 妊娠３６週から出産するまでは、１週間に１回

	- 産後１年を経過するまでは、医師等の指示された回数

	- 前項の休暇を取得した者について、学園は妊娠週数または出産予定日を確認する必要がある場合には、診断書（費用は本人負担）、出産予定日証明書の提出を求めることがあります。

	- 妊娠中の職員が、医師等から通勤時の混雑を避けるよう指導された場合は、原則として１時間の勤務時間の短縮または時差出勤を請求することができます。

	- 妊娠中の職員が、医師等から休憩時間に関して指導された場合は、あらかじめ学園に申し出ることにより、所定の休憩時間の他に、適宜休憩を取得することができます。

	- 妊産婦である職員が、医師等から妊娠または出産に関する諸症状の発生または発生の恐れがあると指導された場合は、当該指導事項を守ることができるようにするため、学園に申し出ることにより、休憩時間の延長、短時間勤務、作業軽減、休業等の適用を受けることができます。

- 前４～６項の措置については、所定の事項を記入した書面（医療機関等が作成した「母性健康管理指導事項連絡カード」）により予め学園に申し出ることとします。 

- 学園は、医師等の指導の内容等を確認する必要がある場合には、本人に了解を得た上で担当の医師等と連絡をとり、その意見を聞く場合があります。

	- 前各項の措置を受けた場合は無給とします。

第３４条（育児休業・介護休業等）

- 職員は、１歳に満たない子を養育するため必要があるとき、または家族で介護状態にあるものを介護する必要があるときは、育児休業又は介護休業の適用を受けることができます。

- 前項の休業、およびその手続については、別に定める「育児・介護休業等に関する規程」によります。

- 前項の休業は、無給とします。

第３５条（公民権行使の時間）

- 職員が労働時間中に選挙権の行使、その他公民としての権利を行使するため、あらかじめ申し出た場合は、必要な時間を与えます。

- 前項の申し出があった場合に、学園は権利の行使を妨げない範囲で、その時間を変更することがあります。

- 前各項の時間については無給とします。

第３６条（特別休暇）　

- 次のいずれかに該当する場合は、その者の請求により、特別休暇を与えます。

	- 本人が結婚するとき　　　　　　　　　　　　　　　　　　　　　連続７日

	- 父母・配偶者・子が死亡したとき　　　　　　　　　　　　　　　　　７日

	- 祖父母・配偶者の父母が死亡したとき　　　　　　　　　　　　　　　２日

	- 兄弟姉妹が死亡したとき　　　　　　　　　　　　　　　　　　　　　３日

	- 孫・伯父・伯母・配偶者の祖父母・兄弟が死亡したと　　　　　　　　１日

	- その他前各号に準じ、法人が必要と認めたとき　　　　　必要と認めた期間

- 前１号および２号については、特別休暇内に休日を含みます。

- 特別休暇を請求しようとする者は、忌引休暇を除き、少なくとも２週間前に学園に届出なければなりません。

- 園長は、特別休暇を与えることにより、正常な業務に支障のある場合には、請求の時季の変更を求めることができます。

- 特別休暇期間中の労働日にあたる日は、有給とします。

- 特別休暇の請求権は、次に示す日から３ヶ月を経過した場合に、消滅するものとします。

	- 結婚　　　結婚式を挙げた日、または入籍日

	- 出産　　　出産日

	- 忌引　　　死亡日

第３７条（休暇の制限）

職員は、休職期間および出勤停止をされた期間は、休暇を取ることはできません。

第 ６ 章  休　職

第３８条（休職の事由）

- 職員が次のいずれかに該当すると学園が判断したときは、休職を命じます。

	- 精神、または身体上の疾患により、通常の労務提供ができず、その回復に一定の期間を要するとき

	- 学園の業務の都合により、必要のあるとき

	- 前各号のほか、特別な事情により休職させることが適当と学園が認めたとき

	- 前項１号により休職するときは、医師による診断書を提出しなければなりません。その際、学園が必要と判断したときは、学園の指定する医師の診断書を提出するものとします。また、診断書にかかる費用については、本人負担とします。

	

第３９条（休職の期間）

- 休職期間は、次のとおりとします。

	- 前条１項１号

	勤続１年未満の者　　　　　　・・・・1か月以内

	勤続１年以上３年未満の者　　・・・・３ヶ月以内

	勤続３年以上５年未満の者　　・・・・６ヶ月以内

	勤続５年以上１０年未満の者　・・・・１年以内

	勤続１０年以上の者　　　　　・・・・１年６ヶ月以内

	- 前条１項２号および３号・・・・・・・学園が必要と認めた期間

	- 休職期間の決定の基礎となる勤続期間の算定においては、休職期間は除くものとします。

	

	

第４０条（休職期間中の報告）

職員は、少なくとも月１回以上、文書によりその状況を学園に報告しなければなりません。報告がない場合、休職期間の短縮または取り消す場合があります。

第４１条（休職期間中の給与）

- 休職期間中は給与を支給しません。ただし、出向休職による場合や、学園が特別な事由があると認めた場合は、この限りではありません。

- 社会保険料の本人負担分、その他職員が負担すべき項目がある場合は、毎月末日までに、学園の指定する口座に振込むことにより支払うものとします。支払がない場合は、休職期間の短縮または休職を取り消す事があります。

- 昇給、賞与については、算定対象期間から休職期間を除いて算定します。また、昇給については、復職後に昇給後の給与を適用するものとします。

第４２条（復職）

	- 休職期間満了日までに休職事由が消滅したときは、原則として休職前の職務に復職させます。ただし事情により従前の職務に復職させることができない場合は、他の職務に配置することがあります。復職後の配置について、職員は正当な理由なくこれを拒むことはできません。

	- 復職を希望する場合、休職期間が３ヶ月未満の者は、満了日の１週間前まで、休職期間が３ヶ月以上の者は、満了日の1か月前までに復職が可能である具体的状況を記載した「復職願」を提出して学園に復職を願い出なければなりません。

	- 前項の「復職願」を提出する場合は、治癒した旨の医師の診断書を添付しなければならず、それにより健康状態が回復し始業時刻から終業時刻までの勤務が可能であると、学園が判断したときに限り復職することができます。

	- 前項の診断書が提出された場合でも、学園の指定する医師への受診を命ずることがあります。職員が正当な理由なくこれを拒否した場合、前項の診断書を休職事由が消滅したか否かの判断材料として採用しないことがあります。

	- 休職期間が満了しても休職事由が継続し復職できない職員は、休職期間満了日をもって退職となります。

	- 休職事由が消滅し、出社できる状態になっているにもかかわらず、正当な理由なく学園が復職日に指定した日に出社しなかった職員は、復職日として学園が指定した日をもって退職となります。

	

第４３条（再休職）

自己の都合及び業務外の傷病による欠勤をした職員が、復職後６ヶ月以内に同一又は類似の事由により再び欠勤ないし、通常の労務を提供できない状況に至ったときは、復職を取り消し直ちに休職させ、以前の休職期間と欠勤期間および新たな休職期間を通算して、一つの休職期間とします。

第 ７ 章  定年・退職・解雇

第４４条（定年）

- 職員の定年は満６３歳とし、６３歳に達した日の翌日の属する月の給与締切日をもって退職とします。

	- 前項による定年到達者が引き続き勤務を希望した場合で、解雇事由又は退職事由に該当しない者については、定年退職日の翌日から６５歳の誕生日以後、最初の賃金締切日までの期間を上限として再雇用します。

	- 再雇用後は給与の減額等、労働条件を見直し、新しい労働条件は雇用契約書により個別に契約するものとします。

	- 再雇用は原則として１年単位の契約とし、労働条件については１年ごとに見直すものとします。

第４５条（退職事由）

職員が次のいずれかに該当するときは退職とします。

	- 自己の都合により退職を願い出て、学園の承認があったとき

	- 休職期間が満了した時点で、なお休職事由が継続し、復職できないとき

	- 休職をしていた者が、学園が指定した復職日に正当な理由なく復職しなかったとき

	- 死亡したとき

	- 定年に達したとき

	- 職員の行方が不明となり、３０日を経過したとき

第４６条（自己都合退職）

	- 職員が自己の都合により退職しようとするときは、少なくとも３ヶ月前までに退職願を提出し、学園の承認を得なければなりません。

	- 退職願を提出した者は、学園の承認があるまでは従前の業務に服さなければなりません。

第４７条（解雇事由）

職員が次のいずれかに該当する場合は解雇とします。

	- 勤務態度、勤務成績が不良で、改善の見込みがないと認められるとき

	- 職務遂行能力、または能率が著しく劣り、改善の見込みがなく、他の職務への配置転換に適さないと認められるとき

	- 精神又は身体の障害もしくは虚弱、老衰、疾病などにより勤務に耐えられないと認めたとき

	- 事業の運営上のやむを得ない事情、天災事変その他これに準ずるやむを得ない事情により、事業の継続が困難になったとき

		- 事業の運営上のやむを得ない事情、天災事変その他これに準ずるやむを得ない事情により、事業の縮小、閉鎖、設備変更等を行う必要が生じ、他の職務に配置転換させることが困難になったとき

	- 試用期間中または試用期間満了時までに職員として不適格であると認められたとき

	- 特定の地位、職種または一定の能力を条件として採用された者で、その能力および適格性が欠けると認められたとき

	- 雇用契約期間中に自己都合により退職を申し出た場合において、学園の指示する所定の引継ぎ業務に従事しないとき

		- 第６４条に定める諭旨解雇・懲戒解雇事由に該当する事実があると認められたき

		- その他前各号に準ずると認められるとき

		

第４８条（解雇予告）

- 前条の規定により職員を解雇するときは、次に掲げる場合を除き、３０日前に予告をするか、または３０日分の平均賃金を支給して行います。

	- 本人の責めに帰すべき事由により解雇する場合で、行政官庁の認定を受けたとき

	- 天災事変その他やむ得ない事由により事業の継続が不可能となったことにより解雇する場合で、行政官庁の認定を受けたとき

	- 試用期間中であって、採用後１４日以内に解雇するとき

- 前項の予告日数は、予告手当を支払った日数分だけ短縮します。

第４９条（解雇制限）

- 職員が次のいずれかに該当するときは解雇しません。ただし、１）の場合において、療養開始から３年を経過しても傷病が治っておらず、打切補償を支払ったときはこの限りではありません、

	- 業務上負傷し、または疾病にかかり療養のために休業する期間およびその後３０日間

	- 産前産後で休業する期間およびその後３０日間

- 天災事変その他やむを得ない事由のために事業の継続が困難になった場合で、行政官庁の認定を受けたときは、前項の規定は適用しません。

第５０条（業務引継ぎ）

- 退職または解雇された職員は、最終出勤日までに学園の指定する者に対し、必要な業務の引き継ぎを完了させなければなりません。

- 引継ぎは所定の書面で学園に対して行うものとし、学園の引継ぎ完了サインをもらって完了とします。

第５１条（貸与金品の返納・返還）

	- 退職または解雇された職員は、貸与品、健康保険証、その他学園から支給された物品および学園で行った業務の成果物、またはその中間成果物を速やかに返還または引き渡し、学園に対する債務を退職日までに精算しなければなりません。

	- 退職または解雇された職員は、業務上の書類、ファイル、名刺、USBデータ等の記録媒体等、それらの写しも含め、全て返納しなければなりません。

第５２条（退職後の責任）

	職員は、退職または解雇された後も、在職中に行った職務および行為について責任を負うとともに、在職中に知り得た業務上の機密を他に漏らしてはなりません。

	

第５３条（退職時の証明）

	- 学園は、退職または解雇された者が、退職証明書の交付を請求したときは、速やかにこれを交付します。

	- 前項の証明事項は、使用期間、業務の種類、学園における地位、給与および退職・解雇の理由とし、本人から請求のあった事項のみを証明します。

	- 職員が解雇された日から退職の日まで、解雇の事由の証明を請求したときは、速やかにこれを交付します。

	

	

第 ８ 章  給与・賞与

第５４条（給与・賞与に関する規程）

給与、賞与に関しては、別に定める「給与規程」によります。

第 ９ 章  教　育

第５５条（教育）

	- 学園は、職員の技能知識教養を向上させるために、必要に応じて教育研修を行い、または外部の教育に参加させることがあります。職員は積極的にこれに参加しなければならず、正当な理由なく拒否することはできません。

	- 学園より研修会へ参加を命令された者については、研修会参加時間を労働時間とみなし、所定労働時間に勤務をしたときに支払われる、通常の給与を支給します。

	- 学園は、指名された者以外も研修会に参加することを推奨します。ただし、この場合の参加時間は労働時間とはみなさず、給与は支払いません。

	

第 １０ 章  安全衛生

第５６条（安全衛生の基本）

学園および職員は、労働災害防止のために安全衛生に関する法令および法人規則で定められた事項を守り、相互に協力して災害の未然防止に努めるものとします。

第５７条（安全のための遵守事項）

- 学園は、職員の安全衛生および健康保持に関して、法令に従い必要な措置をとるものとします。

- 職員は、危険防止および保健衛生のため、次の事項を遵守しなければなりません。

	- 常に職場の整理整頓に努めること

	- 通路、非常用出入り口および消火設備のある箇所に物品をおかないこと

	- 有害物等の取扱は、所定の方法により慎重に行うこと

	- 危険防止のため使用または着用を命じられた帽子・作業服等は着用すること

	- 作業開始と終了時には、機械器具の点検を行い、または作業中は定められた作業手順、方法を厳守すること

	- 定められた場所以外で、許可なく火気を使用、または喫煙しないこと

	- その他、前各号に準ずる安全衛生に関する事項を順守すること

	- 学園は、職員を採用したときおよび職員の職務内容を変更したときは、当該職員が従事する業務に必要な安全衛生教育を行います。

	- 職員は、前項の安全衛生教育を受けなければなりません。

	

	

第５８条（健康診断）

	- 職員は年１回、学園の指定する医師による定期健康診断を受診しなければなりません。

	- 定期健康診断に掛かる費用については、学園が負担します。

	- 定期健康診断に要する時間は労働時間とみなし、所定労働時間に勤務をしたときに支払われる、通常の給与を支給します。

	- 定期健康診断の結果、必要がある場合は医師の診断に従って就業を一定期間禁止し、または就業場所の転換、業務の転換、労働時間の短縮その他健康保護に必要な処置を命じることがあります。

	- 定期健康診断の結果、「要再検査」となった場合に、再検査に要した費用は個人負担とし、検査に要した時間についての賃金の支払いはありません。

	- 職員は前各項に定める定期健康診断を、正当な理由なく拒否してはなりません。

	- 給食従事者は雇い入れの際と配置換えの際および毎月、検便を受けなければなりません。

	

第５９条（就業制限）

- 職員が次のいずれかに該当する場合は、学園の指定する医師の意見を聞いたうえで就業を禁止します。

	- 法定伝染病患者およびその保菌者

	- 心臓、腎臓、肺等の疾病で、労働により病勢が著しく増悪する恐れのある者

	- 精神の疾患および麻薬、アルコール等の依存症者で、就業に支障をきたす恐れのある者

	- 医師の診断により、就業が不適当と認められた者

	- その他、前号に準ずる疾病で、厚生労働大臣が定めるものにかかった者

- 前項の期間中は無給とします。

第 １１ 章  災害補償

第６０条（災害補償）

	- 職員が業務上の災害により負傷し、疾病にかかり、もしくは障害を負い、または死亡した場合は、労働基準法および労働者災害補償保険法の定めるところにより災害補償を行います。

	- 職員が通勤により災害を被った場合は、労働者災害補償保険法の定めるところにより災害補償を行います。

	- 補償を受けるべき職員が、同一の事由により自動車損害賠償責任保険法によって保険給付を受ける場合には、この給付額に相当するものは補償しません。

第６１条（災害補償の例外）

職員による故意または重大な過失によって、負傷または疾病にかかった場合、あるいは労働者災害補償保険法から不支給の決定がなされたときは、学園も災害補償を行ないません。

第６２条（損害賠償との相殺）

学園は、職員から民事上の損害賠償を受けた場合で、当該事故を理由にすでに学園から見舞金その他の支給がなされた場合は、その額を民事上の損害額から控除します。

第 １２ 章  表彰・懲戒

**第 １ 節　表　彰**

第６３条（表彰）

- 職員が次のいずれに該当する場合は、その都度審査のうえ表彰します。

	- 品行方正、技術優秀、業務熱心で他の模範と認められる場合

	- 業務上、特に有益な発明、改良または工夫、考案のあった場合

	- 社会的貢献があり、学園の名誉を高めたとき

	- 災害を未然に防止し、または災害の際、特に功労のあった場合

	- 前各号に準ずる程度に善行または功労があると認められる場合

- 前項の表彰は、賞状のほか賞品または賞金を授与してこれを行います。

**第 ２ ****節　懲　****戒**

第６４条（懲戒の種類）

職員が、本規則および付随する諸規程に違反した場合は、次に定める種類に応じて懲戒処分を行います。ただし、情状酌量の余地があるか、改悛の情が顕著であるときは、懲戒の程度を軽減し、または免除することがあります。

	- けん責       

	始末書を提出させ、将来を戒めます。

	- 減給        

	始末書を提出させ、給与を減額します。減額の額は、１回の額が平均賃金の１日の半額、総額が１賃金支払期の賃金総額の１割の範囲内とします。

	- 出勤停止      

	始末書を提出させ、７営業日以内において出勤を停止し、その期間の給与は支払いません。

	- 降職  

	始末書を提出させ、役職を引き下げ、もしくは役職を解きます。

	- 諭旨解雇　    

懲戒解雇事由に該当する場合で、本人に反省が認められるときは、退職願の提出を勧告し、諭旨解雇とします。ただし、勧告に応じないときは懲戒解雇とします。

	- 懲戒解雇　　　

	原則として予告期間を設けることなく、即時解雇します。この場合に、労働基準監督署長の解雇予告除外認定を受けたときは、解雇予告手当も支給しません。

	

第６５条（懲戒事由と適用）

	- けん責、減給、出勤停止または降職

	職員が、次のいずれかに該当するときは、その程度に応じ、けん責、減給、出勤停止または降職に処します。

	- 就業規則、その他の諸規程、通達の定めに違反したとき

	- 正当な理由なく無断欠勤をしたとき

	- 正当な理由なく欠勤、遅刻、早退またはみだりに任務を離れる等したとき

	- 過失により学園に損害を与えたとき

	- 虚偽の申告、届出を行ったとき

	- 職務上の指揮命令に従わず、職場秩序を乱したとき

	- 素行不良で職場秩序または風紀を乱したとき

	- 学園内で、暴行、脅迫、傷害、またはこれに類する行為をしたとき

	- 学園に属するパソコン、電話、携帯電話、ファクシミリ、インターネット、電子メールその他の備品を無断で私的に使用したとき

	- 過失により学園の建物、施設、備品等を破損、使用不能の状態等にしたとき

	- ハードディスク、USBデータ等の記録媒体を破損、使用不能の状態等にしたとき

	- 学園および職員、または関係取引先を誹謗もしくは中傷し、または虚偽の風説を流布し、もしくは宣伝し、学園業務に支障を与えたとき

	- 学園および関係取引先の秘密およびその他の情報を漏らし、または漏らそうとしたとき

	- 第２０条、第２１条、第２２条、第２３条に違反したとき

	- この規則およびこれに付属する諸規程等に違反したとき

	- その他、前各号に準ずる程度の不都合な行為があったとき

	- 諭旨解雇、懲戒解雇事由

職員が、次のいずれかに該当するときは、その程度に応じ、諭旨解雇、または懲戒解雇とします。

	- 原則として、正当な理由なく連続１４日以上の無断欠勤をし、出勤の督促に応じないとき

	- 正当な理由なく、しばしば遅刻、早退または欠勤を繰り返し、再三の注意を受けても改めないとき

	- 業務上の指揮命令に従わず、業務の正常な運営を妨害したとき

	- 故意または重大な過失により、学園に損害を与えたとき

	- 雇入れの際に、採用条件の重要な要素となる経歴を偽ったとき

	- 職場の安全および健康に危険または有害な行為をしたとき

	- 学園内外における盗み、横領、脅迫、傷害等、刑法犯該当する行為があったとき

	- 学園の許可を得ることなく、在籍のまま他の事業の経営に参加したり、または労務に服し、もしくは事業を営んだとき

	- 第２０条、第２１条、第２２条、第２３条に違反し、その情状が悪質と認められるとき

	- 前項の規定に該当し、処分を受けたにもかかわらず、なお改善の見込みがないとき

	- 前項の規定に違反し、その事案が重大なとき

	- この規則およびこれに付属する諸規程等に違反し、その事案が重大なとき

	- その他、前各号に準ずる重大な行為があったとき

 

第６６条（管理監督者責任）

職員が懲戒を受けた場合、状況により管理職である者に対しても管理監督責任としての処分を行います。ただし、当該管理職者がその防止に必要な措置を講じ、または講じることができなかったやむを得ない事情があるときは、この限りではありません。

第６７条（教唆、ほう助）

他人をそそのかし、またはその行為を助けて第６４条各号に定める懲戒に該当する行為をなさしめた職員は、行為者に準じた処分を行います。

第６８条（損害賠償事由）

職員が、違反行為等により学園に損害を与えた場合、学園は損害を現状に回復させるか、または回復に必要な費用の全部もしくは一部を賠償させることがあります。なお、当該損害賠償の責任は、退職後も免れることはできません。

パートタイム職員　就業規則

学校法人柴学園

しおどめ保育園八潮茜町

令和8年4月1日　改定

前文

この規則は、学校法人柴学園(以下「学園」という）の目的を達成するため、学園とパートタイム職員とが相互信頼の上に立ち、パートタイム職員の福祉の向上と学園の発展を目的として制定するものです。パートタイム職員は、学園の方針を尊重してこの規則を遵守し、業務に専念して学園の発展のために努めなければなりません。

第 １ 章  総　則

第１条（目的）

- この就業規則（以下「規則」という）は、パートタイム職員の服務規律、労働条件、その他の就業に関する事項を定めたものです。

- この規則およびこれに付属する諸規程等に定めのない事項については、社会通念、公序良俗および労働基準法その他の法令に反しない範囲で、学園が決定します。

第２条（適用範囲）

		この規則は、雇用契約書により、期間を定めて雇用され、職務等について正規職員と異なる役割を担う者として雇用された者に適用します。

		

第３条（規則遵守の義務）

パートタイム職員は、この規則のほか諸規程等および業務上の命令を遵守し、風紀秩序の維持ならびに能率の向上に努め、互いに人格を重んじ、誠実に服務しなければなりません。

第４条（就業規則の変更）

この就業規則に定める労働条件および服務規律等については、業務上の必要性より、職員過半数の代表者の意見を聴いて、変更することがあります。

第 ２ 章  採用・異動

第５条（選考）

学園は、履歴書を提出し、入職を希望する者の中から選考に合格し所定の手続きを経た者を、パートタイム職員として採用します。

第６条（労働条件の明示）

学園は、パートタイム職員の採用に際して、給与、労働時間、その他の労働条件が明らかとなる書面を交付し明示します。

第７条（採用時の提出書類）

- パートタイム職員として採用された者は、入職日より８日以内に、次の書類を提出しなければなりません。ただし、学園が指示した場合は、その一部を省略できます。

	- 雇用契約書

	- 入職誓約書

	- 身元保証書

	- 学園が指定した資格・免許の写し

	- 情報の取扱いに関する誓約書

	- 通勤手当申請書

	- 給与口座振込依頼書

	- 給与所得者の扶養控除申告書

	- 住民票記載事項証明書

			- 基礎年金番号通知書（保険加入する者でかつ交付を受けている者に限る）

	- 雇用保険被保険者証（保険加入する者でかつ加入履歴のある者に限る）

		- 源泉徴収票（入職前に給与所得のあった者に限る）

	- その他、学園が提出を求めた書類

- 前項の提出書類を、正当な理由がなく期限内に提出しなかった場合は、採用を取り消すことがあります。

- 前項の提出書類の記載内容に変更が生じたときは、速やかに書面で届け出なければなりません。なお、届出の遅滞によるパートタイム職員の被る不利益については、学園はその責を負いません。

第８条（労働契約の期間等）

- 学園は、労働契約の締結に当たって期間の定めをする場合には、１年以内の期間で各人別に決定し、個別の雇用契約書において定めます。

- 前項の場合において、学園は必要と認める場合は、契約の更新を行う場合があります。

- 更新の有無および更新の基準については、各人別に決定し、個別の雇用契約書において定めます。

- 更新が有る者の更新の有無については、原則として満了の３０日前までに通知するものとします。

第９条（試用期間）

- 新たに採用された者については、採用の日から４ヶ月間を超えない範囲内で各人別に試用期間を設定することがあります。ただし、学園が認めた者については、試用期間を短縮し、または省略することがあります。

- 試用期間を経過した者であって、勤務態度、勤務成績、能力、業務に対する適性、健康状態その他の評価が本採用する者として支障がないと認められた場合は、その者を本採用します。

- 第１項の定める試用期間における勤務態度、勤務成績、能力について、継続した査定が必要であるときは試用期間を延長することがあります。この場合は、１４日前までに本人にこれを通知するものとします。

- 前項による延長期間は２ヶ月を超えないものとします。

- 試用期間において以下各号の事由により本採用する者として適さないと判断したときは直ちに採用を取消すことがあります。

ただし、試用期間が１４日を経過した場合は第６章の手続きに従うものとします。

	- 正当な理由なく数回にわたり遅刻したとき

	- 正当な理由なく無断欠勤したとき

	- 正当な理由なく上司の指示に従わなかったとき

	- 勤務時間中に業務に専念せず、職場を離れたり、私的な行為を行ったとき

	- 学園の経営方針および運営上、勤務態度、能力、技術が適さないと学園が判断したとき

	- 第５条および第７条により提出した書類の内容、もしくは面接時に述べた内容が事実と異なることが判明したとき

	- 第７条に規定する提出書類を期日までに提出しないとき

	- 業務遂行に支障となる恐れのある既往症を隠し採用されたとき

	- その他、前各号に準ずる程度の事由があるとき

	- 第２９条または第６０条に該当する事由があるとき

第１０条（異動）

- 業務上必要がある場合は、個別の労働契約に定める勤務地以外における勤務、または職務の異動を命ずることがあります。

- 前項の労働を命ぜられたパートタイム職員は、正当な理由がなければこれを拒むことができません。

第 ３ 章  服務規律

第１１条（服務の基本）

パートタイム職員は、この規則およびその他の諸規程等を遵守し、業務上の指揮命令に従い、自己の業務に専念し、作業能率の向上に努め、互いに協力して職場の秩序を維持しなければなりません。

**第 １ 節　出退****社****に関する規律**

第１２条（出退社）

	- 正当な理由なく、欠勤、遅刻、早退をしてはなりません。

	- 始業時刻とは仕事を始める時刻であり、出社時刻ではありません。また、終業時刻とは仕事を終える時刻であり、退社時刻ではありません。

	- 勤務終了後は、業務上必要がある場合、または学園が許可した場合を除き、学園にとどまってはなりません。

	

第１３条（出退社の記録）

	- 出退社の際は、本人が自らタイムカードへの記録により、出退社の記録を行わなければなりません。

	- タイムカードの記録を他人に依頼をしたり、他人の依頼を引き受けてはなりません。

第１４条（欠勤・遅刻・早退・私用外出）

	- 欠勤、遅刻、早退、私用外出を行う場合は、その時間と事由を事前に学園に届出て承認を受けなければなりません。ただし、病気その他やむを得ない理由で、事前に届け出ることができなかった場合は、事後速やかに届出なければなりません。

	- 私傷病により欠勤する場合、学園が指定する医師の診断書の提出を命じる場合があります。その際、診断書にかかる費用については、本人負担とします。

	- 次に該当する欠勤については無断欠勤として取扱います。

	１）学園の許可を得てないこと

	２）正当な理由がないこと

	３）本条に定められた手続を怠っていること

	- 欠勤、外出、早退、出張、またはその他の不就業不在等をしようとするときは、自己の不在のために業務に支障をきたさないよう、報告、申し送り等、必要な措置を講じなければなりません。

**第 ２ 節　服務に関する規律**

第１５条（職場保持に関する規律）

パートタイム職員は、次に掲げる事項を守って、業務に精勤しなければなりません。

	- 常に自己のみならず、他の者の健康に留意し、就業すること。

	- 職場の整理整頓に努め、常に清潔に保つようにすること。

	- 礼儀と礼節をわきまえ、元気のよいあいさつを実践し、明朗・溌剌たる勤務態度で就業すること。

	- 担当職務には常に情熱を持って取り組み、園児や保護者の方々に満足していただく創意と工夫、誠意と努力は決して惜しまないこと。

	- 園児や保護者の方々あっての仕事であることを常に念頭に置き、清潔な服装・態度を持って業務を行うとともに、当園の職員としての品位を保つように努めること。

	- 園児や保護者の方々に対し、学園の教育方針に反するような態度を取らないこと。

	- 学園内外を問わず、学園の名誉または信用を傷つけ、業務上学園に損害を与える行為を行わないこと。

	- 職務上の地位を利用して私利を図り、又は取引先等より不当な金品の贈与又は借用等を受けないこと。

	- 本規則およびこれに付属する諸規程等に定める届出事項について、虚偽の申告をしないこと。また、提出期限を守ること。

	- 過剰な借入金、その他私生活上の非行為により、学園内秩序を乱し、ないしその恐れを発生させないこと。

	- 酒気を帯びての勤務はしないこと。酒気帯び運転及び飲酒運転は、業務中はもとより業務外においてもしてはならず、さらに、他の従業員のこれらの行為を見過ごしたり、車を運転することがわかっている者に対して飲酒を勧めたりするなど酒気帯び運転および飲酒運転を助長することは決してしないこと。

	- 学園の許可なく、外部の者を法人に入れないこと。

	- 学園内で、暴行、脅迫、傷害、暴言、またはこれに類する行為を行わないこと。

	- 所定の場所以外で喫煙し、または電熱器等の火気を許可なく使用しないこと。

	- 学園の許可なく、学園内で宗教活動、政治活動、募金活動等、業務に関係の無い活動を行わないこと。

	- 学園の許可なく、学園内で集会、演説または宣伝行為を行わないこと。

	- 学園の許可なく、学園内で業務遂行上とは関係の無い営業活動を行わないこと。

	- 学園の許可なく、在籍のまま他の学園の役員に就任し、または職員として雇用契約を結んだり、あるいは自ら事業を営まないこと。

	- 相手の望まない性的な言動により、他の職員に不利益を与えたり、就業環境を害する等のセクシュアルハラスメント行為を行わないこと。

	- 職権のパワーを背景に、本来の業務の範囲を超えて継続的に、人格と尊厳を侵害する言動を行い、労働環境を悪化させる、あるいは雇用不安を与えるパワーハラスメント行為を行わないこと。

- 他の職員を教唆して、この規則に反するような行為、秩序を乱すような行為を行わないこと。

- 前項の他、本規則に違反するような行為を行わないこと。

	

第１６条（就業に関する規律）

	パートタイム職員は、次に掲げる事項を守って、業務に精勤しなければなりません。

	- 職務遂行にあたっては、報告、連絡、相談の三原則を守ること

	- 学園が定めた業務分担と諸規則に従い、職務上の指示命令に忠実に従うとともに、正確かつ迅速にその職務を遂行し、常にその効率化を図るよう努力すること

	- 業務遂行にあたっては、所属長、同僚と協力しあって、チームワークの向上に努めること

	- 自己の職務上の権限を越えて専断的なことを行わないこと。ただし、緊急やむを得ない場合には、適切な措置を講じ、事後速やかに学園に報告し承認を得ること

	- 園児や保護者の方々および取引先に対しては誠実な態度であたり、信頼を損なう行動は慎むこと。

	- 勤務時間中は、職務に専念し、みだりに職場を離れたり私事の用務を行わないこと

	- 業務上の失敗、ミス、クレームは隠さず、事実を速やかに学園に報告すること

	

	

第１７条（機密事項の管理に関する規律）

- パートタイム職員は、次の各号に掲げる事項を遵守しなければなりません。

- 学園の事業上の秘密、ノウハウ、技術情報等の機密情報の他、業務上知り得た個人情報、経営情報、人事情報、経理情報、管理情報、プライバシーおよびスキャンダル情報、園児や保護者の方々の情報等のあらゆる情報は学園の機密情報であり、これらを第三者に漏洩、開示、提供しないこと。

- 前号の機密情報を、許可なく勝手に複写しないこと。

- 前１号の機密情報が入った文書・写真・磁気テープ・ＦＤ・ＣＤ等、これに関する一切の資料ならびにその複写物を、許可なく園外に持ち出さないこと。

- 職員は、在職中はもとより退職後においても、許可を得た場合を除き、前１号の機密情報を、第三者に漏らさないこと。

	- 前各号に違反した場合は、損害賠償請求を行うことがあります。

第１８条（物品の取扱に関する規律）

	パートタイム職員は、次に掲げる事項を守って、業務に精勤しなければなりません。

	- 学園の施設、備品、機械器具等を大切に取扱うこと。またそれらを損傷、紛失したときは直ちに学園に報告すること。

- 学園の許可なく、職務以外の目的で学園の施設、備品、事務用品、事務機器、電話、車輌、販売商品等を使用しないこと。

- 学園の許可なく、学園の備品等を社外に持ち出さないこと。

**第 ３ 節　その他の規律**

第１９条（所持品検査命令）

	- パートタイム職員は、学園に日常携帯品以外の私品を持ち込んではなりません。

	- パートタイム職員が、前項以外の私品を持込み、もしくは学園の物品を事業所外に持ち出す恐れがある場合、学園はパートタイム職員に対し、所持品の点検を求めることがあります。パートタイム職員は、この点検を正当な理由なくして拒否してはなりません。

	

第２０条（パソコンの利用）

	- パートタイム職員は、学園が貸与した電子端末（以下「パソコン」という。）を業務遂行に必要な範囲で使用するものとし、私的に利用してはなりません。

	- 学園は、必要と認める場合には、パートタイム職員に貸与したパソコン内に蓄積されたデータ等を、閲覧することができます。

	

第２１条（携帯電話の利用）

- パートタイム職員は、勤務時間中に学園の許可なく、個人の携帯電話を私的に利用してはなりません。

- 勤務時間中に個人の携帯電話を利用する場合は、学園の許可を得なければなりません。

第 ４ 章  勤　務

**第 １ 節　所定労働時間・休憩****および****休日の原則**

第２２条（所定労働時間・休憩時間および休日）

	- 始業・終業の時刻、休憩時間および休日は、各人別に決定し、個別の雇用契約書において定めます。

	- 学園は業務の都合により、所定労働時間、始業・終業の時刻および休憩時間を変更することがあります。

	

第２３条（休日の振替および代休）

- 学園は、業務上の必要がある場合は、原則として事前に振替える日を指定してパートタイム職員に通知し、前条の休日を他の日に振替えることがあります。

- 前項の休日に勤務を行ったときは、休日勤務には該当しないので、休日勤務手当は支給しません。

- 業務上の必要により前条の休日に勤務した場合は、代休を命ずることがあります。代休日については、給与を支給しません。

**第 ２ 節　時間外・休日および深夜****勤務**

第２４条（時間外・休日および深夜勤務）

- 学園は、業務の都合により、時間外・休日・深夜勤務をさせることがあります。パートタイム職員は、正当な理由なく拒否してはなりません。

- 前項の時間外・休日・深夜勤務とは、学園の命令あるいは学園に申請し承認された場合のみを対象とします。

- 時間外・休日・深夜勤務は、労働基準監督署に届け出た協定の範囲内で命じるものとします。

第 ６ 章  退職・雇い止め、および解雇

第２６条（退職事由）

パートタイム職員が次のいずれかに該当するときは退職とします。

	- 自己の都合により退職を願い出て、学園の承認があったとき

	- 死亡したとき

	- 雇用期間の定めの有る者が、その期間が満了し、更新が行なわれないとき

	- パートタイム職員の行方が不明となり、３０日を経過したとき

	

第２７条（自己都合退職）

	- パートタイム職員が自己の都合により退職しようとするときは、少なくとも３ヶ月前までに退職願を提出し、学園の承認を得なければなりません。

	- 退職願を提出した者は、学園の承認があるまでは従前の業務に服さなければなりません。

	

第２８条（雇止め）

雇用契約書に、契約を更新する場合がある旨を明示していた場合には、その契約の更新の有無について、少なくとも契約が満了する３０日前までに予告するものとします。

第２９条（解雇事由）

パートタイム職員が次のいずれかに該当する場合は解雇とします。

	- 勤務態度、勤務成績が不良で、改善の見込みがないと認められるとき

	- 職務遂行能力、または能率が著しく劣り、改善の見込みがなく、他の職務への配置転換に適さないと認められるとき

	- 精神又は身体の障害もしくは虚弱、老衰、疾病などにより勤務に耐えられないと認めたとき

	- 事業の運営上のやむを得ない事情、天災事変その他これに準ずるやむを得ない事情により、事業の継続が困難になったとき

		- 事業の運営上のやむを得ない事情、天災事変その他これに準ずるやむを得ない事情により、事業の縮小、閉鎖、設備変更等を行う必要が生じ、他の職務に配置転換させることが困難になったとき

	- 試用期間中または試用期間満了時までにパートタイム職員として不適格であると認められたとき

	- 雇用契約期間中に自己都合により退職を申し出た場合において、学園の指示する所定の引継ぎ業務に従事しないとき

		- 第６０条に定める諭旨解雇・懲戒解雇事由に該当する事実があると認められたき

		- その他前各号に準ずると認められるとき

		

第３０条（解雇予告）

- 前条の規定によりパートタイム職員を解雇するときは、次に掲げる場合を除き、３０日前に予告をするか、または３０日分の平均賃金を支給して行います。

	- 本人の責めに帰すべき事由により解雇する場合で、行政官庁の認定を受けたとき

	- 天災事変その他やむ得ない事由により事業の継続が不可能となったことにより解雇する場合で、行政官庁の認定を受けたとき

	- 試用期間中であって、採用後１４日以内に解雇するとき

- 前項の予告日数は、予告手当を支払った日数分だけ短縮します。

第３１条（解雇制限）

- 職員が次のいずれかに該当するときは解雇しません。ただし、１）の場合において、療養開始から３年を経過しても傷病が治っておらず、打切補償を支払ったときはこの限りではありません、

	- 業務上負傷し、または疾病にかかり療養のために休業する期間およびその後３０日間

	- 産前産後で休業する期間およびその後３０日間

- 天災事変その他やむを得ない事由のために事業の継続が困難になった場合で、行政官庁の認定を受けたときは、前項の規定は適用しません。

第３２条（業務引継ぎ）

- 退職または解雇されたパートタイム職員は、最終出勤日までに学園の指定する者に対し、必要な業務の引き継ぎを完了させなければなりません。

- 引継ぎは所定の書面で学園に対して行うものとし、学園の引継ぎ完了サインをもらって完了とします。

第３３条（貸与金品の返納・返還）

	- 退職または解雇されたパートタイム職員は、貸与品、健康保険証、その他学園から支給された物品および学園で行った業務の成果物、またはその中間成果物を速やかに返還または引き渡し、学園に対する債務を退職日までに精算しなければなりません。

	- 退職または解雇されたパートタイム職員は、業務上の書類、ファイル、名刺、USBデータ等の記録媒体等、それらの写しも含め、全て返納しなければなりません。

第３４条（退職後の責任）

	パートタイム職員は、退職または解雇された後も、在職中に行った職務および行為について責任を負うとともに、在職中に知り得た業務上の機密を他に漏らしてはなりません。

	

第３５条（退職時の証明）

	- 学園は、退職または解雇された者が、退職証明書の交付を請求したときは、速やかにこれを交付します。

	- 前項の証明事項は、使用期間、業務の種類、学園における地位、給与および退職・解雇の理由とし、本人から請求のあった事項のみを証明します。

	- パートタイム職員が解雇された日から退職の日まで、解雇の事由の証明を請求したときは、速やかにこれを交付します。

第 ７ 章  給与・賞与

第３６条（給与構成）

パートタイム職員の給与構成は次のとおりとし、個別の雇用契約書によります。

- 基本給

- 手当

- 通勤手当

- 処遇改善手当

- キャリアアップ手当

- 処処遇改善地域手当

- 時間外手当

- 時間外勤務手当

- 休日勤務手当

- 深夜勤務手当

第３７条（支払形態）

給与は時間給制または日給月給制とし、欠勤、遅刻、早退、私用外出等によって就労しない日および時間については支給しません。

第３８条（計算期間および支払日）

給与の計算期間は、前月１６日より当月１５日までとし、支払日は当月２５日とします。ただし、支払日が休日にあたる場合は、その前に繰り上げて支払います。

第３９条（支払方法）

	給与は、原則として職員同意の上、学園が指定した銀行の本人名義の預金口座へ振り込むことによって支払うものとします。

	

第４０条（給与からの控除項目）

学園は、次に掲げるものを、毎月の給与から控除します。

		- 所得税等、法令で定められた保険料

		- 学園と職員代表との労使協定により定めたもの

第４１条（基本給）

基本給は時間給制または日給月給制とし、職務の内容・技能・職務遂行能力・経験等に勘案して各人ごとに、個別の雇用契約書において定めます。

	第４２条（通勤手当）

	- 通勤手当は、学園までの距離が２km以上の者に対し、次の金額を２０で除し、

	1か月実出勤日数を乗じた金額を支給します。

	- 距離は、自宅から学園までの直線距離により算出します。

	

								- 電車、バス等の公共交通機関を利用して通勤する者

学園が認める最短順路により計算した1か月定期相当額

			- 学園の許可を得てマイカー通勤をする者

片道　２km～１０km未満・・・　　　３，３６０円

片道１０km～１５km未満・・・　　　５，６８０円

片道１５km～２５km未満・・・・　１０，３２０円

	

	- 1か月あたりの通勤手当の上限額は４５，０００円とし、これを超過する部分は、学園が特に必要と認めた場合に限り支給することがあります。

	

第４３条（処遇改善手当）

- 処遇改善手当は、パートタイム職員の職務内容、経験および本人の能力を勘案して支給します。

- 手当の額は、個別の給与辞令書によって明示するものとします。

- 手当は、処遇改善等加算（賃金改善分）を充当するものとします。

- 処遇改善等加算（賃金改善分）について減額があった場合や、在籍児童数の

減少・加算単価の変更等により加算総額が変動する場合には、労使合意のもと、手当額を減額して支給する場合があります。

- 処遇改善等加算の制度改廃により、支給方法を変更または廃止する場合があります。

第４４条（キャリアアップ手当）

- キャリアアップ手当は、経験・技能を有し、研修修了要件を満たし、職務、職位及び職責を示した要件定義に従って学園の任命を受けたパート職員に対し、支給します。

- キャリアアップ手当の額は、個別の雇用契約書によって明示するものとします。

		- キャリアアップ手当は、処遇改善等加算（質の向上分）を充当するものとします。

- 処遇改善等加算（質の向上分）について減額があった場合や、在籍児童数の減少・加算単価の変更等により加算総額が変動する場合には、労使合意のもと、手当額を減額して支給する場合があります。

- 処遇改善等加算の制度改廃により、支給方法を変更または廃止する場合があります。

第４５条（処遇改善地域手当）

- 処処遇改善地域手当は、園長、主任保育士、保育士、看護師、准看護師で所定労働時間が１日６時間以上、所定労働日数が月２０日以上の者に対し、経験年数に応じ月額で、次の手当を支給します。

３年以下　　　  ：月額３０，０００円

４年から１０年　：月額４０，０００円

１１年以上　    ：月額５０，０００円

- 経験年数は「八潮市民間保育所等運営補助金交付要綱」に記載するとおりとします。

- 処処遇改善地域手当は八潮市民間保育所等運営補助金交付要綱の改廃により、支給方法を変更または廃止する場合があります。

第４６条（手当の届出）

- 通勤手当は届出制とし、支給事由が生じた場合、または支給事由が消滅した場合は、その旨学園に届け出なければなりません。

- 支給事由に該当した場合でも、本人からの届出が無い場合は、支給しません。

- 支給事由に該当した場合でも、届出を忘れたことによる遡りの支給はしません。

第４７条（手当受給にかかる不正行為の懲戒）

通勤手当を受けるために虚偽の届出をし、または届出を怠ったことにより受給した場合は、すでに支給した手当相当額を返還させ、就業規則の定めにより懲戒処分を行うことがあります。

	第４８条（時間外手当）

	- 法定労働時間内の時間外労働については、次の計算式により手当を支給します。

		- 法定内時間外手当・・・１時間当りの給与×時間外勤務時間数×1.00

	- 法定労働時間を超え、または深夜（２２時から翌朝５時まで）・法定休日に労働した場合は、次の計算式により手当を支給します。

		- 法定外時間外手当・・・・・１時間当りの給与×時間外勤務時間数×1.25

		- 深夜勤務手当　・・・・・・１時間当りの給与×深夜勤務時間数×0.25

	- 休日勤務手当　・・・・・・１時間当りの給与×休日勤務時間数×1.35

	

第４９条（給与の改定）

		給与の改定は、契約期間の途中では行いません。契約を更新した場合に、各人の勤務成績、勤務態度、職務遂行能力等を考慮し、給与の改定（昇給・降給）を行うことがあります。

		

第５０条（賞与・退職金）

- 賞与は、パートタイム職員として入職後６か月以上経過し、かつ支給日に在籍する者に対し、学園の業績および各人の勤務成績に応じて支給します。

- 支給月は７月と１２月と３月とします。学園の業績の著しい低下やその他やむを得ない事由がある場合には、支給時期を延期し、または支給しないことがあります。

- 評価対象期間中に出勤停止以上の懲戒処分を受けた者については、賞与を

支給しません。

- ３月の賞与は処遇改善等加算の残余額及び人事院勧告対応分がある場合のみ

支給します。

- ７月及び１２月の賞与は処遇改善等加算（賃金改善分）を充当するものとします。

- パートタイム職員に、退職金は支給しません。

第５１条（不正受給の返還）

パートタイム職員が、不正な申請や記録等により、給与の支払いを受けた場合は、その額を直ちに返還させます。また、就業規則の定めにより懲戒処分を行うことがあります。

第 ８ 章  安全衛生

第５２条（安全衛生の基本）

学園およびパートタイム職員は、労働災害防止のために安全衛生に関する法令および法人規則で定められた事項を守り、相互に協力して災害の未然防止に努めるものとします。

第５３条（安全のための遵守事項）

- 学園は、パートタイム職員の安全衛生および健康保持に関して、法令に従い必要な措置をとるものとします。

- パートタイム職員は、危険防止および保健衛生のため、次の事項を遵守しなければなりません。

	- 常に職場の整理整頓に努めること

	- 通路、非常用出入り口および消火設備のある箇所に物品をおかないこと

	- 有害物等の取扱は、所定の方法により慎重に行うこと

	- 危険防止のため使用または着用を命じられた帽子・作業服等は着用すること

	- 作業開始と終了時には、機械器具の点検を行い、または作業中は定められた作業手順、方法を厳守すること

	- 定められた場所以外で、許可なく火気を使用、または喫煙しないこと

	- その他、前各号に準ずる安全衛生に関する事項を順守すること

	- 学園は、パートタイム職員を採用したときおよびパートタイム職員の職務内容を変更したときは、当該パートタイム職員が従事する業務に必要な安全衛生教育を行います。

	- パートタイム職員は、前項の安全衛生教育を受けなければなりません。

	

第５４条（健康診断）

	- パートタイム職員のうち、契約期間の定めの無い者、または契約の更新により引き続き１年以上使用され、または使用することが予定されている者であって、１週間の所定労働時間が２０時間以上の者については、毎年定期に健康診断を行います。

	- 定期健康診断に掛かる費用については、学園が負担します。

	- 定期健康診断に要する時間は労働時間とみなし、所定労働時間に勤務をしたときに支払われる、通常の給与を支給します。

	- 定期健康診断の結果、必要がある場合は医師の診断に従って就業を一定期間禁止し、または就業場所の転換、業務の転換、労働時間の短縮その他健康保護に必要な処置を命じることがあります。

	- 定期健康診断の結果、「要再検査」となった場合に、再検査に要した費用は個人負担とし、検査に要した時間についての賃金の支払いはありません。

	- 職員は前各項に定める定期健康診断を、正当な理由なく拒否してはなりません。

	- 給食従事者は雇い入れの際と配置換えの際および毎月、検便検査を受けなければなりません。

	

第５５条（就業制限）

- パートタイム職員が次のいずれかに該当する場合は、学園の指定する医師の意見を聞いたうえで就業を禁止します。

	- 法定伝染病患者およびその保菌者

	- 心臓、腎臓、肺等の疾病で、労働により病勢が著しく増悪する恐れのある者

	- 精神の疾患および麻薬、アルコール等の依存症者で、就業に支障をきたす恐れのある者

	- 医師の診断により、就業が不適当と認められた者

	- その他、前号に準ずる疾病で、厚生労働大臣が定めるものにかかった者

- 前項の期間中は無給とします。

第 ９ 章  災害補償

第５６条（災害補償）

	- パートタイム職員が業務上の災害により負傷し、疾病にかかり、もしくは障害を負い、または死亡した場合は、労働基準法および労働者災害補償保険法の定めるところにより災害補償を行います。

	- パートタイム職員が通勤により災害を被った場合は、労働者災害補償保険法の定めるところにより災害補償を行います。

	- 補償を受けるべきパートタイム職員が、同一の事由により自動車損害賠償責任保険法によって保険給付を受ける場合には、この給付額に相当するものは補償しません。

	

第５７条（災害補償の例外）

パートタイム職員による故意または重大な過失によって、負傷または疾病にかかった場合、その過失等について労働者災害補償保険法から不支給の決定がなされたときは、学園も災害補償を行ないません。

第５８条（損害賠償との相殺）

学園は、パートタイム職員から民事上の損害賠償を受けた場合で、当該事故を理由にすでに学園から見舞金その他の支給がなされた場合は、その額を民事上の損害額から控除します。

第 １０ 章  無期労働契約への転換

第５９条（無期労働契約への転換）

	- 複数回の雇用契約により、有期契約の期間が継続５年以上となることが決まったパートタイム職員で、無期雇用契約への転換を希望する場合、次回更新時の雇用契約より無期雇用のパートタイム職員として継続雇用します。その際の労働条件は、有期契約で雇用していた時の内容を引き続き適用します。ただし、無期労働契約へ転換したパートタイム社に係る定年は、満６０歳とし、６０歳に達した日の翌日の属する月の給与締切日をもって退職とします。

		- 前項による定年到達者が引き続き勤務を希望した場合で、解雇事由又は退職事由に該当しない者については、定年退職日の翌日から６５歳の誕生日以後、最初の賃金締切日までの期間を上限として再雇用します。

		- 再雇用後は給与の減額等、労働条件を見直し、新しい労働条件は雇用契約書により個別に契約するものとします。

		- 再雇用は原則として１年単位の契約とし、労働条件については１年ごとに見直すものとします。

		

第６０条（無期労働契約への転換者の休職制度）

- 無期転されたパートタイム職員が、次のいずれかに該当すると学園が判断したときは、休職を命じます。

	- 精神、または身体上の疾患により、通常の労務提供ができず、その回復に一定の期間を要するとき

	- 学園の業務の都合により、必要のあるとき

	- 前各号のほか、特別な事情により休職させることが適当と学園が認めたとき

	- 休職制度の内容は、正規職員就業規則に規定する休職制度を準用します。

第 １１ 章  懲戒

第６１条（懲戒の種類）

パートタイム職員が、本規則および付随する諸規程等に違反した場合は、次に定める種類に応じて懲戒処分を行います。ただし、情状酌量の余地があるか、改悛の情が顕著であるときは、懲戒の程度を軽減し、または免除することがあります。

	- けん責       

	始末書を提出させ、将来を戒めます。

	- 減給        

	始末書を提出させ、給与を減額します。減額の額は、１回の額が平均賃金の１日の半額、総額が１賃金支払期の賃金総額の１割の範囲内とします。

	- 出勤停止      

	始末書を提出させ、７営業日以内において出勤を停止し、その期間の給与は支払いません。

	- 諭旨解雇　    

懲戒解雇事由に該当する場合で、本人に反省が認められるときは、退職願の提出を勧告し、諭旨解雇とします。ただし、勧告に応じないときは懲戒解雇とします。

	- 懲戒解雇　　　

	原則として予告期間を設けることなく、即時解雇します。この場合に、労働基準監督署長の解雇予告除外認定を受けたときは、解雇予告手当も支給しません。

	

第６２条（懲戒事由と適用）

	- けん責、減給または出勤停止

	パートタイム職員が、次のいずれかに該当するときは、その程度に応じ、けん責、減給、出勤停止に処します。

	- 就業規則、その他の諸規程等、通達の定めに違反したとき

	- 正当な理由なく無断欠勤をしたとき

	- 正当な理由なく欠勤、遅刻、早退またはみだりに任務を離れる等したとき

	- 過失により学園に損害を与えたとき

	- 虚偽の申告、届出を行ったとき

	- 職務上の指揮命令に従わず、職場秩序を乱したとき

	- 素行不良で職場秩序または風紀を乱したとき

	- 学園内で、暴行、脅迫、傷害、またはこれに類する行為をしたとき

	- 学園に属するパソコン、電話、携帯電話、ファクシミリ、インターネット、電子メールその他の備品を無断で私的に使用したとき

	- 過失により学園の建物、施設、備品等を破損、使用不能の状態等にしたとき

	- ハードディスク、USBデータ等の記録媒体を破損、使用不能の状態等にしたとき

	- 学園および職員、または関係取引先を誹謗もしくは中傷し、または虚偽の風説を流布し、もしくは宣伝し、学園業務に支障を与えたとき

	- 学園および関係取引先の秘密およびその他の情報を漏らし、または漏らそうとしたとき

	- この規則およびこれに付属する諸規程等に違反したとき

	- その他、前各号に準ずる程度の不都合な行為があったとき

	

	- 諭旨解雇、懲戒解雇事由

パートタイム職員が、次のいずれかに該当するときは、その程度に応じ、諭旨解雇、または懲戒解雇とします。

	- 原則として、正当な理由なく連続１４日以上の無断欠勤をし、出勤の督促に応じないとき

	- 正当な理由なく、しばしば遅刻、早退または欠勤を繰り返し、再三の注意を受けても改めないとき

	- 業務上の指揮命令に従わず、業務の正常な運営を妨害したとき

	- 故意または重大な過失により、学園に損害を与えたとき

	- 雇入れの際に、採用条件の重要な要素となる経歴を偽ったとき

	- 職場の安全および健康に危険または有害な行為をしたとき

	- 学園内外における盗み、横領、脅迫、傷害等、刑法犯該当する行為があったとき

	- 学園の許可を得ることなく、在籍のまま他の事業の経営に参加したり、または労務に服し、もしくは事業を営んだとき

	- 前項の規定に該当し、処分を受けたにもかかわらず、なお改善の見込みがないとき

	- 前項の規定に違反し、その事案が重大なとき

	- この規則およびこれに付属する諸規程等に違反し、その事案が重大なとき

	- その他、前各号に準ずる重大な行為があったとき

	

 第６３条（教唆、ほう助）

他人をそそのかし、またはその行為を助けて第６０条各号に定める懲戒に該当する行為をなさしめたパートタイム職員は、行為者に準じた処分を行います。

第６４条（損害賠償事由）

パートタイム職員が、違反行為等により学園に損害を与えた場合、学園は損害を現状に回復させるか、または回復に必要な費用の全部もしくは一部を賠償させることがあります。なお、当該損害賠償の責任は、退職後も免れることはできません。

学校法人柴学園

しおどめ保育園八潮茜町

令和8年4月1日　改定

第１条（目的）

		この規程は、学校法人柴学園正規職員就業規則第５３条に定めるところにより、職員の給与および賞与について定めます。

		

第２条（適用範囲）

		この規程は、学校法人柴学園正規職員就業規則第２条に定める職員について適用し、その他の職員については別に定めます。

第３条（給与の決定）

給与は、学園の支払い能力と経営状況のほか、各職員の学園への貢献度、目標の達成度、課題の克服度、職務内容、能力、職責、勤務成績、勤務態度、年齢、経験等を考慮して決定します。

第４条（支払形態）

給与は日給月給制とします。

第５条（給与構成）

給与構成は、次のとおりとします。

		- 基本給　　　

	- 手当

		- 管理職手当

		- 通勤手当

		- 処遇改善手当

		- キャリアアップ手当

		- 処遇改善地域手当

	- 割増給与

	- 時間外労働割増給与

	- 休日労働割増給与

	- 深夜労働割増給与

第６条（計算期間および支払日）

給与の計算期間は、前月１６日より当月１５日までとし、支払日は当月２５日とし

ます。ただし、支払日が休日にあたる場合は、その前に繰り上げて支払います。

第７条（支払方法）

	給与は、原則として職員同意の上、学園が指定した銀行の本人名義の預金口座へ振り込むことによって支払うものとします。

	

第８条（給与からの控除項目）

学園は、次に掲げるものを、職員の毎月の給与から控除します。

		- 所得税、社会保険料等、法令で定められた保険料

		- 学園と職員代表との労使協定により定めたもの

	

	第９条（基本給）	

- 基本給は、各人の学園への貢献度、目標の達成度、課題の克服度、職務内容、

能力、職責、勤務成績、勤務態度、年齢、経験等を総合的に勘案し、給与表を

基に支給額を決定します。

- 前項の給与表の金額には国家公務員の給与改定に伴う公定価格の人件費改定

（以下「公定価格の人件費改定」という）分を含めるものとし、公定価格に

おける人件費改定が行われた場合は給与表を変更する場合があります。

第１０条（管理職手当）

- 管理職手当は、主任より上位の役職を有する者に対し、各自の職責に応じて

支給します。

- 管理職手当の額は、個別の給与辞令書によって明示するものとします。

- 職員が、管理職手当の支給対象となる職務から離れたときは、管理職手当の支給を停止します。

- 管理職手当の一部に処遇改善等加算（賃金改善分）を含めることとします。

第１１条（通勤手当）

	- 通勤手当は、学園までの距離が２km以上の者に対し、次のとおり支給します。

	- 距離は、自宅から学園までの直線距離により算出します。

	

								- 電車、バス等の公共交通機関を利用して通勤する者

学園が認める最短順路により計算した1か月定期相当額

			- 学園の許可を得てマイカー通勤をする者

片道　２km～１０km未満・・・　　　３，３６０円

片道１０km～１５km未満・・・　　　５，６８０円

片道１５km～２５km未満・・・・　１０，３２０円

	

	- 1か月あたりの通勤手当の上限額は４５，０００円とし、これを超過する部分は、学園が特に必要と認めた場合に限り支給することがあります。

	

第１２条（処遇改善手当）

- 処遇改善手当は、職員の職務内容、経験および本人の能力を勘案して支給します。

２	処遇改善手当の額は、個別の給与辞令書によって明示するものとします。

３	処遇改善手当は処遇改善等加算（賃金改善分）を充当するものとします。

４	処遇改善等加算（賃金改善分）について減額があった場合や、在籍児童数の

減少・加算単価の変更等により加算総額が変動する場合には、労使合意のもと、

手当額を減額して支給する場合があります。

５	処遇改善等加算の制度改廃により、支給方法を変更または廃止する

場合があります。

第１３条（キャリアアップ手当）

- キャリアアップ手当は、経験・技能を有し、研修修了要件を満たし、職務、職位及び職責を示した要件定義に従って学園の任命を受けた職員に対し、支給します。

- キャリアアップ手当の額は、個別の辞令書によって明示するものとします。

- 手当は、処遇改善等加算（質の向上分）を充当するものとします。

- 処遇改善等加算（質の向上分）について減額があった場合や、在籍児童数の減少・加算単価の変更等により加算総額が変動する場合には、労使合意のもと、

手当額を減額して支給する場合があります。

- 処遇改善等加算の制度改廃により、支給方法を変更または廃止する場合があります。

第１４条（処遇改善地域手当）

- 処処遇改善地域手当は、園長、主任保育士、保育士、看護師、准看護師に対し、経験年数に応じ月額で、次の手当を支給します。

３年以下　　　：月額３０，０００円

４年から１０年：月額４０，０００円

１１年以上　　：月額５０，０００円

- 経験年数は「八潮市民間保育所等運営補助金交付要綱」に記載するとおりとします。

- 処遇改善地域手当は八潮市民間保育所等運営補助金交付要綱の改廃により、支給　方法を変更または廃止する場合があります。

第１５条（手当の届出）

- 通勤手当は届出制とし、支給事由が生じた場合、または支給事由が消滅した場合は、その旨学園に届け出なければなりません。

- 支給事由に該当した場合でも、本人からの届出が無い場合は、支給しません。

- 支給事由に該当した場合でも、届出を忘れたことによる遡りの支給はしません。

第１６条（手当受給にかかる不正行為の懲戒）

通勤手当を受けるために虚偽の届出をし、または届出を怠ったことにより受給した場合は、すでに支給した手当相当額を返還させ、就業規則の定めにより懲戒処分を行うことがあります。

第１７条（時間外手当の額）

	- 職員が所定労働時間を超え、または深夜（２２時から翌朝５時まで）・法定休日に労働した場合は、次の計算式により手当を支給します。

			- 時間外勤務手当・・・１時間当りの給与×時間外勤務時間数×1.25

			- 深夜勤務手当　・・・１時間当りの給与×深夜勤務時間数  ×0.25

			- 休日勤務手当　・・・１時間当りの給与×休日勤務時間数  ×1.35

		- 時間外勤務および休日勤務が深夜に及んだ場合は深夜勤務手当を加算します。

	- 前項の「１時間あたりの給与」は次の計算式により求めます。

１時間あたりの給与＝（基本給＋通勤手当を除く手当）÷1ヶ月の平均所定労働時間

第１８条（欠勤・遅刻等の取扱い）

- 欠勤、遅刻、早退、私用外出などにより所定の就業時間の全部または一部を休業した場合においては、次の計算式より算出した額を減額します。

減額金額＝1時間当たりの給与×不就労時間数

	- 前項の「１時間あたりの給与」は次の計算式により求めます。

		１時間あたりの給与＝（基本給＋通勤手当を除く手当）÷1ヶ月の平均所定労働時間

		ただし、給与計算期間の全部を休業した場合は、給与月額のすべてを支給しない　ものとします。

第１９条（途中入職・退職者等の取扱い）

- 給与計算期間の途中で採用、あるいは退職・解雇された者については、次の計算式　　により算出した給与を支払います。

	支給額＝（基本給＋全ての手当）÷当該月の暦日数×当該月の在籍日数

第２０条（休暇・休業における給与の取扱い）

	- 年次有給休暇の期間は、所定労働時間労働したときに支払われる通常の給与を支給します。

	- 産前産後の休業期間、母性健康管理のための休暇、育児・介護休業法に基づく育　児休業および介護休業の期間、子の看護休暇の期間、育児時間、生理日の休暇の期間は無給とします。

	- 休職期間中は給与を支給しません。ただし、出向休職による場合や、学園が特別な事由があると認めた場合は、この限りではありません。

	

第２１条（業務上傷病による休業中の給与）

	職員が業務上の傷病により休業した場合は、通常の給与は支給せず、労働基準法の規定に基づき、休業初日より３日間は１日につき平均賃金の１００分の６０の休業補償を支給します。ただし、休業が４日以上に及ぶ場合は、労働者災害補償保険法の給付を受けるものとします。

	

第２２条（休業手当）

	学園の責めに帰すべき事由により休業した場合は、休業手当を支給します。この休業手当の額は、１日につき平均賃金の１００分の６０とします。

	

第２３条（給与の改定）

	- 給与改定（昇給・降給）は、在職１年以上の者を対象に、原則として毎年４月に行います。ただし、学園の業績の低下、その他やむを得ない事由がある場合は、改定の時期を変更したり、あるいは改定を行わないことがあります。また、特別の必要のある場合は、臨時に給与の改定を行うことがあります。

	- 給与の改定は、職員の職務能力の伸長度、業績の評価、勤務態度、行動評価等を

	考慮し、各人別に行います。

	　　　

第２４条（賞与の範囲および支給時期）

	- 賞与は、正規職員として入社後６か月以上経過し、かつ支給日に在籍する者に対し、学園の業績および各人の勤務成績に応じて支給します。

	- 支給月は７月と１２月と3月とします。学園の業績の著しい低下やその他やむを得ない事由がある場合には、支給時期を延期し、または支給しないことがあります。

			- 評価対象期間中に出勤停止以上の懲戒処分を受けた者については、賞与を支給

			しません。

			４	３月の賞与は処遇改善等加算の残余額及び人事院勧告対応分がある場合のみ

			支給します。

			

第２５条（不正受給の返還）

職員が、不正な申請や記録などにより、給与および賞与の支払いを受けた場合は、その額を直ちに返還させます。また、就業規則の定めにより懲戒処分を行うことがあります。

第２６条（給与規程の改定）

学園は、関係諸法令の改正、学園の経営状況および業績等の変化により、必要があるときは、この規程の改定を行います。

附　則

	- この規則は、平成２９年５月１６日より施行します。

	- この規則は、平成３０年４月  １日より改定します。

	- この規則は、平成３１年４月１日より改定します。

	- この規則は、令和５年４月１６日より改定します。

	- この規則は、令和　６年３月１６日より改定します。

- この規則は、令和　８年４月　１日より改定します。

	- この規則および各規程の改廃にあたっての責任者は、理事長とします。

	- この規則および各規程の解釈適用について、懐疑または紛議が生じた場合の解釈の決定および紛議の解決は、理事長が責任者としてこれを決定することとします。

■ 経理規程（学校法人柴学園）令和7年4月1日施行
━━━━━━━━━━━━━━━━━━━━
学 校 法 人 柴 学 園 経 理 規 程
第１章 総 則
（目的）
第１条 この規程は、学校法人柴学園の経理に関する基準を定め、経理の公正を確保す
ることを目的とする。
（経理の基準）
第２条 この法人の経理に関しては、関係法令及び寄附行為等に定めのあるものの外、こ
の規程の定めるところによる。
（会計処理の原則）
第３条 会計処理は、学校法人会計基準に基づき真実の内容を表示して、正確かつ迅速に
行わなければならない。
（会計年度）
第４条 会計年度は、毎年４月１日に始まり翌年３月３１日に終るものとする。
（経理責任者）
第５条 この法人に経理責任者及び経理担当者を置く。
２ 経理責任者及び経理担当者は、理事長が任命する。
３ 経理責任者は経理に関する事務を掌理し、経理担当者は経理に関する事務に従事する。
第２章 勘定科目及び帳簿組織
（勘定科目）
第６条 勘定科目は、別表１のとおりとする。
（会計帳簿）
第７条 会計帳簿は、次に掲げるものを備えておかなければならない。
一 主要簿
（一）会計伝票
（二）資金収支元帳
（三）総勘定元帳
二 補助簿
（一）現金出納帳
（二）預金出納帳
（三）固定資産台帳
（四）借入金台帳
（五）入園受入準備金台帳
（六）保育料（納付金）台帳
（七）給与支給明細書
（会計帳簿等の保存期間）
第８条 会計帳簿及びその事業に関する重要な資料は、会計年度の終了後１０年間保存し
なければならない。
ただし、税に関するものについては税法等で定める保存期間又は１０年間のいずれか長
い期間とする。
第３章 金銭会計
（会計処理）
第９条 取引はすべて会計伝票によって処理し、会計帳簿に記載するものとする。
２ 会計伝票は、証拠書類を添付して会計責任者の承認を受けなければならない。
（収入の扱い）
第１０条 金銭を収納したときは、口座振替による収納の場合を除き、領収書を発行しな
ければならない。
２ 収納した現金は、経理責任者が特に認めた場合のほか速やかに金融機関に預け入れる
ものとし、これを直接支払いに充ててはならない。
（支出の扱い）
第１１条 金銭の支払いは、次の各号に掲げる場合を除き、小切手の振出し又は銀行口座へ
の口座振込みによって行うものとする。
一 １件３万円を超えない常用雑貨の現金支払い。
二 慣習上現金をもって支払うこととされている支払い
三 口座振替による支払い
２ 小口の現金支払いに充てるため、１０万円を限度として現金を経理責任者の手元に保
管することができる。
３ 金銭の支払いに際しては、領収書を徴取しなければならない。ただし、領収書の徴取
が困難な場合は、支払い証明書をもってこれに代えることができる。
（金銭の確認）
第１２条 経理責任者は、現金の受払のあった日の現金出納修了後、現金の手元有高を現金
出納帳の残高と、毎月末日、銀行預金等の預金通帳等の残高を預金出納帳の残高と照合し
なければならない。
２ 経理責任者は、金銭に過不足を生じたときは、速やかに原因を調査の上理事長に報告
し、必要な指示を受けなければならない。
第４章 契 約
（契約の方法）
第１３条 売買、貸借、請負その他の契約をする場合は、指名競争入札によるものとする。
ただし、指名競争入札によることが困難若しくは不利であると認められる場合又は予定
価額が１００万円未満の場合は、随意契約によることができる。
（契約書の作成）
第１４条 契約をする場合は契約書を作成するものとし、契約書には、契約の目的、契約
金額、履行期限、契約保証金その他必要と認められる事項を記載しなければならない。
２ 前項の規定にかかわらず、契約金額が５０万円未満の契約をする場合は、不動産の売
買、貸借等の契約及び業務の委託契約を除き、契約書の作成を省略することができる。
（見積書の徴取）
第１５条 随意契約を行う場合においては、１０万円未満の契約をするときを除き、契約の
相手方から見積書を徴さなければならない。
第５章 固定資産会計
（固定資産の範囲及び分類）
第１６条 固定資産は、次に掲げるものをいう。
一 有形固定資産
土地、建物、構築物、機器備品、図書、車輌、建設仮勘定
二 特定資産
第２号基本金引当特定資産、第３号基本金引当特定資産、退職給与引当特定資産、
減価償却引当特定資産、施設設備引当特定資産、その他の特定資産
三 その他の固定資産
借地権、電話加入権、施設利用権、ソフトウェア、有価証券、預託金
２ 機器備品及び図書の分類の基準は、それぞれ次の各号に定めるところによる。
一 機器備品 耐用年数が１年以上で、１個又は１組の価額が１０万円以上のもの及び
少額重要資産とする。
二 図書 図書室等に備え、長期間にわたり保存、使用するものとする。
（減価償却）
第１７条 有形固定資産は、土地、図書及び建設仮勘定を除き減価償却を行うものとする。
２ その他の固定資産は、その性質により減価償却を行うものとする。
３ 減価償却は、次の各号に定めるところにより行うものとする。
一 方法 定額法とする。
二 耐用年数 別表２のとおりとする。
三 残存価額 零とする。
四 備忘価額 耐用年数経過後で現に使用中の減価償却資産の備忘価額は１円とする。
ただし、総合償却資産の備忘価額は零とする。
五 計算手続
（一）個別償却を原則とする。
（二）機器備品で1個又は1組の価額が１０万円未満のものについては、総合償却によ
ることができる。
第６章 予算及び決算
（予算の原則）
第１８条 予算は、法人及び幼稚園の管理運営、教育研究その他幼稚園の目的を遂行する
ために必要な事業について明確な方針に基づき編成されなければならない。

let selectedDept = null;       // 今回確認済みの部門名
let deptKisokuCache = {};      // 部門ごとのfetch結果キャッシュ
let pendingQuestion = null;    // 部門確認中に保留している元の質問

function isKisokuQuestion(q) {
  return /就業規則|給与規程|給与規則|労働条件|休暇|有給|残業|賞与|退職金|懲戒|育児休業|介護休業|経理規程/.test(q);
}

async function fetchDeptKisoku(deptName) {
  if (deptKisokuCache[deptName]) return deptKisokuCache[deptName];
  const url = garden.departments[deptName];
  try {
    const r = await fetch(url);
    const text = r.ok ? await r.text() : '';
    deptKisokuCache[deptName] = text;
    return text;
  } catch (e) {
    console.warn('部門規程読み込み失敗:', deptName, e);
    return '';
  }
}

function showDeptChoice(originalQuestion) {
  pendingQuestion = originalQuestion;
  const msgsEl2 = document.getElementById('msgs');
  const wrap = document.createElement('div');
  wrap.className = 'submenu-wrap';
  const label = document.createElement('div');
  label.className = 'submenu-label';
  label.textContent = 'どちらに該当しますか？';
  wrap.appendChild(label);
  const btns = document.createElement('div');
  btns.className = 'submenu-btns';
  Object.keys(garden.departments).forEach(deptName => {
    const btn = document.createElement('button');
    btn.className = 'submenu-btn';
    btn.textContent = deptName;
    btn.onclick = async () => {
      wrap.remove();
      selectedDept = deptName;
      const q = pendingQuestion;
      pendingQuestion = null;
      await send(q, true);
    };
    btns.appendChild(btn);
  });
  wrap.appendChild(btns);
  msgsEl2.appendChild(wrap);
  scrollToEl(wrap);
}

53\u30fb\u904e\u5ea6\u306a\u5834\u5408\u306f\u300c\u3054\u8981\u671b\u306b\u306f\u304a\u5fdc\u3048\u3067\u304d\u307e\u305b\u3093\u300d\u3068\u6bc5\u7136\u3068\u4f1d\u3048\u308b\u3002\n\u30fb\u8105\u8feb\u30fb\u66b4\u529b\u7684\u8a00\u52d5\u304c\u3042\u308c\u3070\u8b66\u5bdf\u3078\u306e\u76f8\u8ac7\u3082\u691c\u8a0e\u3059\u308b\u3002\n\u30fb\u6cd5\u4eba\u306e\u4e0a\u4f4d\u8005\uff08\u7406\u4e8b\u9577\u7b49\uff09\u306b\u901f\u3084\u304b\u306b\u5831\u544a\u30fb\u76f8\u8ac7\u3059\u308b\u3002\n\n\u3010\u4e8b\u6545\u767a\u751f\u6642\u306e\u4fdd\u8b77\u8005\u5bfe\u5fdc\u3011\n1. \u5b50\u3069\u3082\u306e\u5b89\u5168\u78ba\u4fdd\u3092\u6700\u512a\u5148\u306b\u3059\u308b\u3002\n2. \u901f\u3084\u304b\u306b\u4fdd\u8b77\u8005\u306b\u9023\u7d61\u3059\u308b\uff08\u8efd\u5fae\u306a\u5834\u5408\u3082\u5f53\u65e5\u4e2d\u306b\u5831\u544a\uff09\u3002\n3. \u4e8b\u5b9f\u3092\u6b63\u76f4\u306b\u4f1d\u3048\u308b\u3002\u96a0\u853d\u30fb\u904e\u5c0f\u5831\u544a\u306f\u4fe1\u983c\u3092\u5927\u304d\u304f\u640d\u306a\u3046\u3002\n4. \u8b1d\u7f6a\u3068\u4eca\u5f8c\u306e\u5bfe\u5fdc\u7b56\u3092\u4f1d\u3048\u308b\u3002\n5. \u4e8b\u6545\u5831\u544a\u66f8\u3092\u4f5c\u6210\u3057\u3001\u884c\u653f\u3078\u306e\u5831\u544a\u8981\u5426\u3092\u78ba\u8a8d\u3059\u308b\u3002\n\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\u25a0 2. \u4e8b\u6545\u30fb\u5b89\u5168\u7ba1\u7406\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\u3010\u5712\u5185\u4e8b\u6545\u767a\u751f\u6642\u306e\u5bfe\u5fdc\u30d5\u30ed\u30fc\u3011\n1. \u8ca0\u50b7\u3057\u305f\u5b50\u3069\u3082\u306e\u5fdc\u6025\u51e6\u7f6e\u30fb\u6551\u6025\u5bfe\u5fdc\uff08\u5fc5\u8981\u306b\u5fdc\u3058\u3066119\u756a\uff09\u3002\n2. \u4fdd\u8b77\u8005\u3078\u306e\u9023\u7d61\uff08\u901f\u3084\u304b\u306b\u30fb\u76f4\u63a5\u96fb\u8a71\u3067\uff09\u3002\n3. \u4e8b\u6545\u767a\u751f\u72b6\u6cc1\u306e\u8a18\u9332\uff08\u3044\u3064\u30fb\u3069\u3053\u3067\u30fb\u8ab0\u304c\u30fb\u4f55\u3092\u3057\u3066\u30fb\u3069\u3046\u306a\u3063\u305f\u304b\uff09\u3002\n4. \u8077\u54e1\u9593\u3067\u72b6\u6cc1\u5171\u6709\u30fb\u518d\u767a\u9632\u6b62\u7b56\u306e\u691c\u8a0e\u3002\n5. \u884c\u653f\uff08\u5e02\u533a\u753a\u6751\uff09\u3078\u306e\u5831\u544a\uff08\u91cd\u5927\u4e8b\u6545\u306f\u901f\u5831\u304c\u5fc5\u8981\uff09\u3002\n6. \u4e8b\u6545\u5831\u544a\u66f8\u306e\u4f5c\u6210\u30fb\u4fdd\u7ba1\u3002\n\n\u3010\u91cd\u5927\u4e8b\u6545\u306e\u5b9a\u7fa9\uff08\u5185\u95a3\u5e9c\u30ac\u30a4\u30c9\u30e9\u30a4\u30f3\uff09\u3011\n\u30fb\u6b7b\u4ea1\u4e8b\u6545\n\u30fb\u610f\u8b58\u4e0d\u660e\u30fb\u9aa8\u6298\u30fb\u982d\u90e8\u5916\u50b7\u7b49\u3067\u5165\u9662\u3092\u8981\u3059\u308b\u3082\u306e\n\u30fb\u8a8d\u53ef\u5916\u65bd\u8a2d\u3067\u306f\u8efd\u5fae\u306a\u4e8b\u6545\u3082\u5831\u544a\u304c\u5fc5\u8981\u306a\u5834\u5408\u3042\u308a\n\n\u3010\u30d2\u30e4\u30ea\u30cf\u30c3\u30c8\u7ba1\u7406\u3011\n\u30fb\u4e8b\u6545\u306b\u81f3\u3089\u306a\u304b\u3063\u305f\u300c\u30d2\u30e4\u30ea\u30cf\u30c3\u30c8\u300d\u3082\u8a18\u9332\u30fb\u5171\u6709\u3059\u308b\u3053\u3068\u304c\u91cd\u8981\u3002\n\u30fb\u67081\u56de\u4ee5\u4e0a\u306e\u8077\u54e1\u4f1a\u8b70\u3067\u30d2\u30e4\u30ea\u30cf\u30c3\u30c8\u4e8b\u4f8b\u3092\u632f\u308a\u8fd4\u308b\u3002\n\u30fb\u8a18\u9332\u306e\u7a4d\u307f\u4e0a\u3052\u304c\u91cd\u5927\u4e8b\u6545\u9632\u6b62\u306b\u3064\u306a\u304c\u308b\u3002\n\n\u3010\u4e0d\u5be9\u8005\u5bfe\u5fdc\u3011\n1. \u4e0d\u5be9\u8005\u3092\u767a\u898b\u3057\u305f\u3089\u4e00\u4eba\u3067\u5bfe\u5fdc\u305b\u305a\u8907\u6570\u306e\u8077\u54e1\u3067\u5bfe\u5fdc\u3059\u308b\u3002\n2. \u5b50\u3069\u3082\u3092\u5b89\u5168\u306a\u5834\u6240\u306b\u8a98\u5c0e\u30fb\u4fdd\u8b77\u3059\u308b\u3002\n3. \u8b66\u5bdf\uff08110\u756a\uff09\u306b\u901a\u5831\u3059\u308b\u3002\n4. \u4fdd\u8b77\u8005\u30fb\u884c\u653f\u306b\u5831\u544a\u3059\u308b\u3002\n5. \u8fd1\u96a3\u65bd\u8a2d\u306b\u3082\u60c5\u5831\u5171\u6709\u3059\u308b\u3002\n\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\u25a0 3. \u8077\u54e1\u52b4\u52d9\u7ba1\u7406\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\u3010\u7a81\u7136\u306e\u9000\u8077\u7533\u3057\u51fa\u3078\u306e\u5bfe\u5fdc\u3011\n\u30fb\u5c31\u696d\u898f\u5247\u3067\u306f3\u30f6\u6708\u524d\u306e\u5c4a\u51fa\u304c\u5fc5\u8981\uff08\u6c11\u6cd5\u3067\u306f2\u9031\u9593\u524d\u304c\u539f\u5247\uff09\u3002\n\u30fb\u611f\u60c5\u7684\u306b\u306a\u3089\u305a\u3001\u307e\u305a\u7406\u7531\u3092\u4e01\u5be7\u306b\u805e\u304f\u3002\n\u30fb\u5f15\u304d\u7559\u3081\u304c\u96e3\u3057\u3044\u5834\u5408\u306f\u5186\u6e80\u306a\u5f15\u304d\u7d99\u304e\u3092\u512a\u5148\u3059\u308b\u3002\n\u30fb\u696d\u52d9\u306e\u5f15\u304d\u7d99\u304e\u8a08\u753b\u3092\u7acb\u3066\u308b\u3002\n\u30fb\u9000\u8077\u5f8c\u306e\u5b88\u79d8\u7fa9\u52d9\u30fb\u7af6\u696d\u907f\u6b62\u306b\u3064\u3044\u3066\u78ba\u8a8d\u3059\u308b\u3002\n\n\u3010\u8077\u54e1\u306e\u7121\u65ad\u6b20\u52e4\u3078\u306e\u5bfe\u5fdc\u3011\n\u30fb\u5f53\u65e5\u9023\u7d61\u304c\u306a\u3044\u5834\u5408\u306f\u901f\u3084\u304b\u306b\u96fb\u8a71\u30fb\u30e1\u30fc\u30eb\u3067\u9023\u7d61\u3092\u8a66\u307f\u308b\u3002\n\u30fb3\u65e5\u4ee5\u4e0a\u9023\u7d61\u304c\u53d6\u308c\u306a\u3044\u5834\u5408\u306f\u7dca\u6025\u9023\u7d61\u5148\uff08\u5bb6\u65cf\u7b49\uff09\u306b\u9023\u7d61\u3059\u308b\u3002\n\u30fb\u5c31\u696d\u898f\u5247\u306b\u57fa\u3065\u304d\u3001\u7121\u65ad\u6b20\u52e4\u304c\u7d9a\u304f\u5834\u5408\u306f\u6587\u66f8\u3067\u51fa\u52e4\u7763\u4fc3\u3092\u884c\u3046\u3002\n\u30fb14\u65e5\u4ee5\u4e0a\u306e\u7121\u65ad\u6b20\u52e4\u306f\u61f2\u6212\u89e3\u96c7\u4e8b\u7531\u306b\u8a72\u5f53\u3059\u308b\u53ef\u80fd\u6027\u304c\u3042\u308b\u3002\n\n\u3010\u8077\u54e1\u306e\u30e1\u30f3\u30bf\u30eb\u30d8\u30eb\u30b9\u4e0d\u8abf\u3011\n\u30fb\u9045\u523b\u30fb\u65e9\u9000\u30fb\u6b20\u52e4\u304c\u5897\u3048\u305f\u3001\u8868\u60c5\u304c\u6697\u3044\u3001\u30df\u30b9\u304c\u5897\u3048\u305f\u7b49\u306e\u30b5\u30a4\u30f3\u306b\u6c17\u3065\u304f\u3002\n\u30fb\u4e00\u5bfe\u4e00\u3067\u4e01\u5be7\u306b\u8a71\u3092\u805e\u304f\u6a5f\u4f1a\u3092\u8a2d\u3051\u308b\u3002\n\u30fb\u5fc5\u8981\u306b\u5fdc\u3058\u3066\u7523\u696d\u533b\u30fb\u5c02\u9580\u5bb6\u3078\u306e\u76f8\u8ac7\u3092\u52e7\u3081\u308b\u3002\n\u30fb\u4f11\u8077\u5236\u5ea6\u306e\u6d3b\u7528\u3092\u691c\u8a0e\u3059\u308b\u3002\n\u30fb\u672c\u4eba\u306e\u30d7\u30e9\u30a4\u30d0\u30b7\u30fc\u3092\u5b88\u308a\u3001\u8077\u5834\u5168\u4f53\u3067\u652f\u63f4\u3059\u308b\u59ff\u52e2\u3092\u793a\u3059\u3002\n\n\u3010\u8077\u54e1\u9593\u30c8\u30e9\u30d6\u30eb\u30fb\u30cf\u30e9\u30b9\u30e1\u30f3\u30c8\u5bfe\u5fdc\u3011\n1. \u76f8\u8ac7\u3092\u53d7\u3051\u305f\u3089\u3001\u307e\u305a\u76f8\u8ac7\u8005\u306e\u8a71\u3092\u50be\u8074\u3059\u308b\u3002\n2. \u76f8\u8ac7\u5185\u5bb9\u3092\u8a18\u9332\u3059\u308b\uff08\u65e5\u6642\u30fb\u5834\u6240\u30fb\u8a00\u52d5\u306e\u5185\u5bb9\uff09\u3002\n3. \u884c\u70ba\u8005\u30fb\u95a2\u4fc2\u8005\u304b\u3089\u3082\u500b\u5225\u306b\u4e8b\u5b9f\u78ba\u8a8d\u3092\u884c\u3046\u3002\n4. \u5fc5\u8981\u306b\u5fdc\u3058\u3066\u914d\u7f6e\u63db\u3048\u3084\u696d\u52d9\u5206\u96e2\u7b49\u306e\u66ab\u5b9a\u63aa\u7f6e\u3092\u53d6\u308b\u3002\n5. \u6cd5\u4eba\u4e0a\u4f4d\u8005\u30fb\u9867\u554f\u793e\u52b4\u58eb\u7b49\u306b\u5831\u544a\u30fb\u76f8\u8ac7\u3059\u308b\u3002\n6. \u30cf\u30e9\u30b9\u30e1\u30f3\u30c8\u304c\u8a8d\u5b9a\u3055\u308c\u305f\u5834\u5408\u306f\u5c31\u696d\u898f\u5247\u306b\u57fa\u3065\u304d\u61f2\u6212\u51e6\u5206\u3092\u691c\u8a0e\u3059\u308b\u3002\n7. \u76f8\u8ac7\u8005\u306b\u5bfe\u3057\u3066\u4e0d\u5229\u76ca\u306a\u53d6\u308a\u6271\u3044\u3092\u3057\u3066\u306f\u306a\u3089\u306a\u3044\uff08\u5831\u5fa9\u7981\u6b62\uff09\u3002\n\n\u3010\u52e4\u6020\u7ba1\u7406\u306e\u57fa\u672c\u3011\n\u30fb\u30bf\u30a4\u30e0\u30ab\u30fc\u30c9\u3084\u52e4\u6020\u30b7\u30b9\u30c6\u30e0\u3067\u6b63\u78ba\u306b\u8a18\u9332\u3059\u308b\u3002\n\u30fb\u6b8b\u696d\u306f\u4e8b\u524d\u7533\u8acb\u30fb\u627f\u8a8d\u5236\u3068\u3059\u308b\u3002\n\u30fb\u30b5\u30fc\u30d3\u30b9\u6b8b\u696d\u306f\u52b4\u50cd\u57fa\u6e96\u6cd5\u9055\u53cd\u306b\u306a\u308b\u305f\u3081\u6ce8\u610f\u3059\u308b\u3002\n\u30fb\u6709\u7d66\u4f11\u6687\u306e\u5e745\u65e5\u53d6\u5f97\u7fa9\u52d9\uff08\u6cd5\u5b9a\uff09\u3092\u9075\u5b88\u3059\u308b\u3002\n\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\u25a0 4. \u611f\u67d3\u75c7\u5bfe\u5fdc\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\u3010\u611f\u67d3\u75c7\u767a\u751f\u6642\u306e\u5bfe\u5fdc\u624b\u9806\u3011\n1. \u611f\u67d3\u304c\u7591\u308f\u308c\u308b\u5b50\u3069\u3082\u30fb\u8077\u54e1\u3092\u65e9\u671f\u306b\u628a\u63e1\u3059\u308b\u3002\n2. \u533b\u5e2b\u306e\u8a3a\u65ad\u3092\u53d7\u3051\u308b\u3088\u3046\u4fc3\u3059\u3002\n3. \u51fa\u5e2d\u505c\u6b62\u30fb\u767b\u5712\u81ea\u7c9b\u306e\u57fa\u6e96\u3092\u4fdd\u8b77\u8005\u306b\u6848\u5185\u3059\u308b\u3002\n4. \u65bd\u8a2d\u5185\u306e\u6d88\u6bd2\u30fb\u63db\u6c17\u3092\u5fb9\u5e95\u3059\u308b\u3002\n5. \u5e02\u533a\u753a\u6751\u30fb\u4fdd\u5065\u6240\u306b\u5831\u544a\u3059\u308b\uff08\u611f\u67d3\u75c7\u306e\u7a2e\u985e\u306b\u3088\u308b\uff09\u3002\n6. \u4fdd\u8b77\u8005\u5168\u4f53\u306b\u767a\u751f\u72b6\u6cc1\u3092\u5468\u77e5\u3059\u308b\uff08\u500b\u4eba\u60c5\u5831\u306b\u914d\u616e\uff09\u3002\n\n\u3010\u4e3b\u306a\u611f\u67d3\u75c7\u3068\u767b\u5712\u505c\u6b62\u671f\u9593\u306e\u76ee\u5b89\u3011\n\u30fb\u30a4\u30f3\u30d5\u30eb\u30a8\u30f3\u30b6\uff1a\u767a\u75c7\u5f8c5\u65e5\u304b\u3064\u89e3\u71b1\u5f8c2\u65e5\uff08\u5e7c\u5150\u306f3\u65e5\uff09\n\u30fb\u30ce\u30ed\u30a6\u30a4\u30eb\u30b9\uff1a\u75c7\u72b6\u6d88\u5931\u5f8c24\u301c48\u6642\u9593\n\u30fbRS\u30a6\u30a4\u30eb\u30b9\uff1a\u533b\u5e2b\u304c\u767b\u5712\u53ef\u80fd\u3068\u5224\u65ad\u3059\u308b\u307e\u3067\n\u30fb\u624b\u8db3\u53e3\u75c5\u30fb\u30d8\u30eb\u30d1\u30f3\u30ae\u30fc\u30ca\uff1a\u533b\u5e2b\u304c\u767b\u5712\u53ef\u80fd\u3068\u5224\u65ad\u3059\u308b\u307e\u3067\n\u30fb\u6c34\u75d8\uff08\u307f\u305a\u307c\u3046\u305d\u3046\uff09\uff1a\u3059\u3079\u3066\u306e\u767a\u75b9\u304c\u75c2\u76ae\u5316\u3059\u308b\u307e\u3067\n\u30fb\u9ebb\u75b9\uff08\u306f\u3057\u304b\uff09\uff1a\u89e3\u71b1\u5f8c3\u65e5\n\u30fb\u6d41\u884c\u6027\u8033\u4e0b\u817a\u708e\uff08\u304a\u305f\u3075\u304f\uff09\uff1a\u8033\u4e0b\u817a\u816b\u8139\u5f8c5\u65e5\u304b\u3064\u5168\u8eab\u72b6\u614b\u826f\u597d\n\u203b\u5177\u4f53\u7684\u306a\u5224\u65ad\u306f\u5fc5\u305a\u533b\u5e2b\u30fb\u4fdd\u5065\u6240\u306e\u6307\u793a\u306b\u5f93\u3046\u3053\u3068\n\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\u25a0 5. \u65bd\u8a2d\u904b\u55b6\u30fb\u6cd5\u4ee4\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\u3010\u884c\u653f\u3078\u306e\u5831\u544a\u7fa9\u52d9\u3011\n\u30fb\u91cd\u5927\u4e8b\u6545\uff08\u6b7b\u4ea1\u30fb\u91cd\u50b7\uff09\uff1a\u901f\u5831\uff0824\u6642\u9593\u4ee5\u5185\uff09\u2192\u8a73\u5831\u306e\u63d0\u51fa\u304c\u5fc5\u8981\n\u30fb\u611f\u67d3\u75c7\u96c6\u56e3\u767a\u751f\uff1a\u4fdd\u5065\u6240\u30fb\u5e02\u533a\u753a\u6751\u3078\u306e\u5831\u544a\n\u30fb\u8650\u5f85\u7591\u3044\uff1a\u5150\u7ae5\u76f8\u8ac7\u6240\u30fb\u5e02\u533a\u753a\u6751\u3078\u306e\u901a\u544a\u7fa9\u52d9\uff08\u5150\u7ae5\u798f\u7949\u6cd5\u7b2c25\u6761\uff09\n\u30fb\u7b2c\u4e09\u8005\u8a55\u4fa1\uff1a\u90fd\u9053\u5e9c\u770c\u306e\u6307\u5b9a\u3059\u308b\u6a5f\u95a2\u306b\u3088\u308b\u8a55\u4fa1\uff08\u5b9a\u671f\u7684\u53d7\u5be9\u63a8\u5968\uff09\n\n\u3010\u8650\u5f85\u5bfe\u5fdc\u3011\n\u30fb\u8650\u5f85\u3092\u767a\u898b\u307e\u305f\u306f\u7591\u3063\u305f\u5834\u5408\u306f\u3001\u901a\u544a\u3059\u308b\u3053\u3068\u304c\u6cd5\u5f8b\u4e0a\u306e\u7fa9\u52d9\uff08\u5b88\u79d8\u7fa9\u52d9\u3088\u308a\u512a\u5148\uff09\u3002\n\u30fb\u901a\u544a\u306f\u300c\u78ba\u8a3c\u304c\u306a\u304f\u3066\u3082\u300d\u300c\u7591\u3044\u304c\u3042\u308c\u3070\u300d\u884c\u3046\u3002\n\u30fb\u901a\u544a\u5148\uff1a\u5150\u7ae5\u76f8\u8ac7\u6240\uff08189\uff09\u307e\u305f\u306f\u5e02\u533a\u753a\u6751\u306e\u62c5\u5f53\u7a93\u53e3\u3002\n\u30fb\u901a\u544a\u5f8c\u306f\u884c\u653f\u306e\u6307\u793a\u306b\u5f93\u3044\u3001\u5712\u3068\u3057\u3066\u8a18\u9332\u3092\u4fdd\u7ba1\u3059\u308b\u3002\n\u30fb\u4fdd\u8b77\u8005\u3078\u306e\u60c5\u5831\u6f0f\u6d29\u306f\u884c\u308f\u306a\u3044\u3002\n\n\u3010\u82e6\u60c5\u89e3\u6c7a\u306e\u4ed5\u7d44\u307f\u3011\n\u30fb\u82e6\u60c5\u53d7\u4ed8\u62c5\u5f53\u8005\u30fb\u82e6\u60c5\u89e3\u6c7a\u8cac\u4efb\u8005\uff08\u65bd\u8a2d\u9577\uff09\u30fb\u7b2c\u4e09\u8005\u59d4\u54e1\u3092\u8a2d\u7f6e\u3059\u308b\u7fa9\u52d9\u304c\u3042\u308b\u3002\n\u30fb\u82e6\u60c5\u5185\u5bb9\u30fb\u5bfe\u5fdc\u7d4c\u904e\u30fb\u7d50\u679c\u3092\u8a18\u9332\u30fb\u4fdd\u7ba1\u3059\u308b\u3002\n\u30fb\u89e3\u6c7a\u3057\u306a\u3044\u5834\u5408\u306f\u90fd\u9053\u5e9c\u770c\u306e\u904b\u55b6\u9069\u6b63\u5316\u59d4\u54e1\u4f1a\u3078\u306e\u7533\u3057\u7acb\u3066\u304c\u53ef\u80fd\u3002\n\n\u3010\u52b4\u50cd\u57fa\u6e96\u6cd5\u306e\u4e3b\u306a\u30dd\u30a4\u30f3\u30c8\u3011\n\u30fb1\u65e58\u6642\u9593\u30fb1\u903140\u6642\u9593\u3092\u8d85\u3048\u308b\u52b4\u50cd\u306f\u6642\u9593\u5916\u52b4\u50cd\uff08\u6b8b\u696d\u4ee3\u304c\u5fc5\u8981\uff09\u3002\n\u30fb\u4f11\u61a9\uff1a6\u6642\u9593\u8d85\u306745\u5206\u30018\u6642\u9593\u8d85\u30671\u6642\u9593\u4ee5\u4e0a\u3002\n\u30fb\u4f11\u65e5\uff1a\u90311\u65e5\u4ee5\u4e0a\uff08\u6cd5\u5b9a\u4f11\u65e5\uff09\u3002\n\u30fb\u6642\u9593\u5916\u30fb\u4f11\u65e5\u30fb\u6df1\u591c\u52b4\u50cd\u306b\u306f\u5272\u5897\u8cc3\u91d1\u304c\u5fc5\u8981\uff0825\u301c50%\u5272\u5897\uff09\u3002\n\u30fb\u89e3\u96c7\u306f30\u65e5\u524d\u4e88\u544a\u307e\u305f\u306f30\u65e5\u5206\u306e\u5e73\u5747\u8cc3\u91d1\u306e\u652f\u6255\u3044\u304c\u5fc5\u8981\u3002\n\u30fb\u4e0d\u5f53\u89e3\u96c7\u306f\u7121\u52b9\u306b\u306a\u308b\u5834\u5408\u304c\u3042\u308b\u3002\n\n\u3010\u80b2\u5150\u30fb\u4ecb\u8b77\u4f11\u696d\u6cd5\u306e\u4e3b\u306a\u30dd\u30a4\u30f3\u30c8\u3011\n\u30fb\u80b2\u5150\u4f11\u696d\uff1a\u5b50\u304c1\u6b73\uff08\u6700\u95772\u6b73\uff09\u306b\u306a\u308b\u307e\u3067\u53d6\u5f97\u53ef\u80fd\u3002\u7537\u5973\u554f\u308f\u305a\u3002\n\u30fb\u7523\u5f8c\u30d1\u30d1\u80b2\u4f11\uff08\u51fa\u751f\u6642\u80b2\u5150\u4f11\u696d\uff09\uff1a\u5b50\u306e\u51fa\u751f\u5f8c8\u9031\u9593\u4ee5\u5185\u306b4\u9031\u9593\u307e\u3067\u53d6\u5f97\u53ef\u80fd\u3002\n\u30fb\u80b2\u5150\u77ed\u6642\u9593\u52e4\u52d9\uff1a3\u6b73\u672a\u6e80\u306e\u5b50\u3092\u6301\u3064\u793e\u54e1\u306f1\u65e56\u6642\u9593\u52e4\u52d9\u3092\u9078\u629e\u53ef\u80fd\u3002\n\u30fb\u4ecb\u8b77\u4f11\u696d\uff1a\u8981\u4ecb\u8b77\u72b6\u614b\u306e\u5bb6\u65cf1\u4eba\u306b\u3064\u304d\u901a\u7b9793\u65e5\u307e\u3067\u53d6\u5f97\u53ef\u80fd\u3002\n\u30fb\u53d6\u5f97\u3092\u7406\u7531\u3068\u3057\u305f\u4e0d\u5229\u76ca\u53d6\u308a\u6271\u3044\u7981\u6b62\u3002\n\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\u25a0 6. \u5712\u9577\u306e\u3088\u304f\u3042\u308b\u56f0\u308a\u3054\u3068Q&A\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\nQ: \u8077\u54e1\u304c\u300c\u660e\u65e5\u304b\u3089\u6765\u3089\u308c\u306a\u3044\u300d\u3068\u7a81\u7136\u8a00\u3063\u3066\u304d\u305f\u3002\u3069\u3046\u3059\u308c\u3070\u3088\u3044\u304b\uff1f\nA: \u307e\u305a\u51b7\u9759\u306b\u8a71\u3092\u805e\u304d\u3001\u7406\u7531\u3092\u78ba\u8a8d\u3059\u308b\u3002\u8eab\u4f53\u30fb\u7cbe\u795e\u7684\u306a\u7406\u7531\u3067\u3042\u308c\u3070\u4f11\u8077\u5236\u5ea6\u3092\u6848\u5185\u3059\u308b\u3002\u9000\u8077\u306e\u610f\u601d\u304c\u56fa\u3044\u5834\u5408\u306f\u3001\u5c31\u696d\u898f\u5247\u3067\u306f3\u30f6\u6708\u524d\u306e\u7533\u3057\u51fa\u304c\u5fc5\u8981\u3060\u304c\u3001\u5f15\u304d\u7d99\u304e\u671f\u9593\u3092\u8a71\u3057\u5408\u3044\u3067\u6c7a\u3081\u308b\u3002\u696d\u52d9\u306b\u652f\u969c\u304c\u51fa\u306a\u3044\u3088\u3046\u3001\u5373\u65e5\u5bfe\u5fdc\u306e\u4ee3\u66ff\u8981\u54e1\u78ba\u4fdd\u3092\u512a\u5148\u3059\u308b\u3002\n\nQ: \u4fdd\u8b77\u8005\u304b\u3089\u300c\u5148\u751f\u304c\u5b50\u3069\u3082\u306b\u66b4\u8a00\u3092\u5410\u3044\u305f\u300d\u3068\u30af\u30ec\u30fc\u30e0\u304c\u6765\u305f\u3002\nA: \u307e\u305a\u4fdd\u8b77\u8005\u306e\u8a71\u3092\u50be\u8074\u3057\u8b1d\u610f\u3092\u793a\u3059\u3002\u5f53\u8a72\u8077\u54e1\u30fb\u76ee\u6483\u3057\u305f\u4ed6\u306e\u8077\u54e1\u304b\u3089\u500b\u5225\u306b\u4e8b\u5b9f\u78ba\u8a8d\u3092\u884c\u3046\u3002\u4e8b\u5b9f\u3067\u3042\u308c\u3070\u901f\u3084\u304b\u306b\u8b1d\u7f6a\u3057\u3001\u518d\u767a\u9632\u6b62\u7b56\u3092\u4f1d\u3048\u308b\u3002\u8650\u5f85\u306b\u8a72\u5f53\u3059\u308b\u53ef\u80fd\u6027\u304c\u3042\u308c\u3070\u884c\u653f\u3078\u306e\u5831\u544a\u7fa9\u52d9\u304c\u751f\u3058\u308b\u3002\u96a0\u853d\u306f\u7d76\u5bfe\u306b\u3057\u306a\u3044\u3002\n\nQ: \u8077\u54e1\u540c\u58eb\u306e\u4ef2\u304c\u60aa\u304f\u3001\u8077\u5834\u306e\u96f0\u56f2\u6c17\u304c\u60aa\u3044\u3002\nA: \u500b\u5225\u306b\u8a71\u3092\u805e\u304d\u3001\u53cc\u65b9\u306e\u8a00\u3044\u5206\u3092\u628a\u63e1\u3059\u308b\u3002\u611f\u60c5\u7684\u306a\u5bfe\u7acb\u306e\u5834\u5408\u306f\u30b7\u30d5\u30c8\u3084\u62c5\u5f53\u30af\u30e9\u30b9\u3092\u8abf\u6574\u3057\u3066\u7269\u7406\u7684\u306a\u8ddd\u96e2\u3092\u7f6e\u304f\u3002\u5b9a\u671f\u7684\u306a\u8077\u54e1\u4f1a\u8b70\u30fb\u9762\u8ac7\u3067\u610f\u898b\u3092\u8a00\u3048\u308b\u5834\u3092\u4f5c\u308b\u3002\u30cf\u30e9\u30b9\u30e1\u30f3\u30c8\u306b\u8a72\u5f53\u3059\u308b\u5834\u5408\u306f\u5c31\u696d\u898f\u5247\u306b\u57fa\u3065\u304d\u5bfe\u5fdc\u3059\u308b\u3002\n\nQ: \u5b50\u3069\u3082\u306b\u602a\u6211\u3092\u3055\u305b\u3066\u3057\u307e\u3063\u305f\u3002\u4fdd\u8b77\u8005\u306b\u3069\u3046\u8aac\u660e\u3059\u308c\u3070\u3088\u3044\u304b\uff1f\nA: \u96fb\u8a71\u3067\u306f\u306a\u304f\u76f4\u63a5\u4f1a\u3063\u3066\u8aac\u660e\u3059\u308b\u3053\u3068\u304c\u539f\u5247\u3002\u4e8b\u5b9f\u3092\u6b63\u76f4\u306b\u4f1d\u3048\u3001\u96a0\u853d\u30fb\u904e\u5c0f\u5831\u544a\u306f\u3057\u306a\u3044\u3002\u300c\u7533\u3057\u8a33\u3054\u3056\u3044\u307e\u305b\u3093\u300d\u3068\u8b1d\u7f6a\u3057\u3001\u6cbb\u7642\u8cbb\u306e\u8ca0\u62c5\u306b\u3064\u3044\u3066\u3082\u8aa0\u5b9f\u306b\u5bfe\u5fdc\u3059\u308b\u3002\u518d\u767a\u9632\u6b62\u7b56\u3092\u5177\u4f53\u7684\u306b\u4f1d\u3048\u308b\u3002\u91cd\u50b7\u306e\u5834\u5408\u306f\u884c\u653f\u3078\u306e\u5831\u544a\u304c\u5fc5\u8981\u3002\n\nQ: \u4fdd\u80b2\u58eb\u304c\u598a\u5a20\u3092\u5831\u544a\u3057\u3066\u304d\u305f\u3002\u3069\u3046\u5bfe\u5fdc\u3059\u308c\u3070\u3088\u3044\u304b\uff1f\nA: \u307e\u305a\u304a\u3081\u3067\u3068\u3046\u3068\u4f1d\u3048\u3001\u4f53\u8abf\u3092\u7b2c\u4e00\u306b\u8003\u3048\u305f\u52e4\u52d9\u8abf\u6574\u3092\u884c\u3046\u3002\u7523\u524d6\u9031\u524d\u304b\u3089\u7523\u4f11\u53d6\u5f97\u53ef\u80fd\u3067\u3042\u308b\u3053\u3068\u3092\u6848\u5185\u3059\u308b\u3002\u91cd\u3044\u7269\u306e\u6301\u3061\u904b\u3073\u3084\u611f\u67d3\u30ea\u30b9\u30af\u306e\u9ad8\u3044\u696d\u52d9\u304b\u3089\u5916\u3059\u7b49\u306e\u914d\u616e\u7fa9\u52d9\u304c\u3042\u308b\u3002\u80b2\u5150\u4f11\u696d\u306b\u3064\u3044\u3066\u3082\u60c5\u5831\u63d0\u4f9b\u3059\u308b\u3002\n\nQ: \u9577\u671f\u4f11\u6687\u660e\u3051\u306b\u8077\u54e1\u304c\u51fa\u52e4\u3057\u3066\u3053\u306a\u3044\u3002\nA: \u5f53\u65e5\u4e2d\u306b\u96fb\u8a71\u30fb\u30e1\u30fc\u30eb\u3067\u9023\u7d61\u3092\u8a66\u307f\u308b\u3002\u7e4b\u304c\u3089\u306a\u3044\u5834\u5408\u306f\u7dca\u6025\u9023\u7d61\u5148\u306b\u9023\u7d61\u3059\u308b\u30023\u65e5\u4ee5\u4e0a\u9023\u7d61\u304c\u53d6\u308c\u306a\u3044\u5834\u5408\u306f\u6587\u66f8\uff08\u5185\u5bb9\u8a3c\u660e\uff09\u3067\u51fa\u52e4\u7763\u4fc3\u3092\u691c\u8a0e\u3059\u308b\u3002\u30e1\u30f3\u30bf\u30eb\u30d8\u30eb\u30b9\u306e\u554f\u984c\u304c\u7591\u308f\u308c\u308b\u5834\u5408\u306f\u7523\u696d\u533b\u30fb\u5c02\u9580\u5bb6\u3078\u306e\u76f8\u8ac7\u3092\u4fc3\u3059\u3002\n\nQ: \u4fdd\u8b77\u8005\u304b\u3089\u300cSNS\u306b\u5712\u306e\u60aa\u53e3\u3092\u66f8\u304b\u308c\u305f\u300d\u3068\u8a00\u308f\u308c\u305f\u3002\nA: \u4e8b\u5b9f\u78ba\u8a8d\u3092\u884c\u3044\u3001\u554f\u984c\u306e\u3042\u308b\u6295\u7a3f\u3067\u3042\u308c\u3070\u524a\u9664\u4f9d\u983c\u30fb\u6cd5\u7684\u5bfe\u5fdc\u3092\u691c\u8a0e\u3059\u308b\u3002\u5712\u5074\u306b\u975e\u304c\u3042\u308b\u5834\u5408\u306f\u8aa0\u5b9f\u306b\u5bfe\u5fdc\u3057\u6539\u5584\u3092\u7d04\u675f\u3059\u308b\u3002\u98a8\u8a55\u88ab\u5bb3\u304c\u5e83\u304c\u308b\u524d\u306b\u6b63\u78ba\u306a\u60c5\u5831\u767a\u4fe1\u3092\u5fc3\u304c\u3051\u308b\u3002\n\nQ: \u88dc\u52a9\u91d1\u306e\u7533\u8acb\u671f\u9650\u304c\u8feb\u3063\u3066\u3044\u308b\u304c\u66f8\u985e\u304c\u63c3\u308f\u306a\u3044\u3002\nA: \u6240\u7ba1\u306e\u5e02\u533a\u753a\u6751\u30fb\u90fd\u9053\u5e9c\u770c\u306b\u76f8\u8ac7\u3057\u3001\u671f\u9650\u5ef6\u9577\u306e\u53ef\u5426\u3092\u78ba\u8a8d\u3059\u308b\u3002\u5fc5\u8981\u66f8\u985e\u306e\u30ea\u30b9\u30c8\u3092\u518d\u78ba\u8a8d\u3057\u3001\u512a\u5148\u9806\u4f4d\u3092\u3064\u3051\u3066\u5bfe\u5fdc\u3059\u308b\u3002\u9867\u554f\u306e\u793e\u52b4\u58eb\u30fb\u884c\u653f\u66f8\u58eb\u306b\u76f8\u8ac7\u3059\u308b\u3053\u3068\u3082\u6709\u52b9\u3002\n\nQ: \u8077\u54e1\u304c\u300c\u6709\u7d66\u3092\u5168\u90e8\u307e\u3068\u3081\u3066\u53d6\u308a\u305f\u3044\u300d\u3068\u8a00\u3063\u3066\u304d\u305f\u3002\nA: \u6709\u7d66\u4f11\u6687\u306f\u52b4\u50cd\u8005\u306e\u6a29\u5229\u3067\u3042\u308a\u3001\u539f\u5247\u3068\u3057\u3066\u62d2\u5426\u3067\u304d\u306a\u3044\u3002\u305f\u3060\u3057\u300c\u4e8b\u696d\u306e\u6b63\u5e38\u306a\u904b\u55b6\u3092\u59a8\u3052\u308b\u5834\u5408\u300d\u306f\u6642\u5b63\u5909\u66f4\u6a29\u3092\u884c\u4f7f\u3067\u304d\u308b\u3002\u4ee3\u66ff\u8981\u54e1\u306e\u78ba\u4fdd\u3084\u5f15\u304d\u7d99\u304e\u3092\u6761\u4ef6\u306b\u8abf\u6574\u3092\u4f9d\u983c\u3059\u308b\u3002\u5e745\u65e5\u306e\u6642\u5b63\u6307\u5b9a\u53d6\u5f97\u7fa9\u52d9\u3082\u5ff5\u982d\u306b\u7f6e\u304f\u3002\n\nQ: \u8077\u54e1\u304c\u300c\u30d1\u30ef\u30cf\u30e9\u3092\u53d7\u3051\u305f\u300d\u3068\u76f8\u8ac7\u3057\u3066\u304d\u305f\u3002\nA: \u307e\u305a\u76f8\u8ac7\u8005\u306e\u8a71\u3092\u50be\u8074\u3057\u3001\u8a18\u9332\u3059\u308b\u3002\u76f8\u8ac7\u8005\u3092\u5b64\u7acb\u3055\u305b\u305a\u3001\u79d8\u5bc6\u3092\u5b88\u308b\u65e8\u3092\u4f1d\u3048\u308b\u3002\u884c\u70ba\u8005\u304b\u3089\u500b\u5225\u306b\u4e8b\u5b9f\u78ba\u8a8d\u3092\u884c\u3046\u3002\u4e8b\u5b9f\u78ba\u8a8d\u5f8c\u3001\u5c31\u696d\u898f\u5247\u306b\u57fa\u3065\u304f\u5bfe\u5fdc\u3092\u691c\u8a0e\u3059\u308b\u3002\u76f8\u8ac7\u8005\u304c\u4e0d\u5229\u76ca\u3092\u53d7\u3051\u306a\u3044\u3088\u3046\u914d\u616e\u3059\u308b\u3002\u5916\u90e8\u306e\u76f8\u8ac7\u7a93\u53e3\uff08\u793e\u52b4\u58eb\u30fb\u52b4\u50cd\u5c40\uff09\u306e\u6d3b\u7528\u3082\u691c\u8a0e\u3059\u308b\u3002\n"
