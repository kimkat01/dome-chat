<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>園長アシスタント — どめ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Hiragino Sans','Noto Sans JP',sans-serif}
body{display:flex;align-items:center;justify-content:center;background:#dde4f5;min-height:100vh}
.app{display:flex;flex-direction:column;width:440px;height:780px;border-radius:20px;overflow:hidden;background:#f0f4f8;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.hdr{background:#4169e1;color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-av{width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid rgba(255,255,255,.4)}
.hdr-av img,.av img{width:100%;height:100%;object-fit:cover}
.hdr-title{font-size:15px;font-weight:700;letter-spacing:0.03em}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.65);margin-top:1px}
.hdr-dot{width:9px;height:9px;background:#4ade80;border-radius:50%;margin-left:auto;box-shadow:0 0 6px #4ade80;flex-shrink:0}
.msgs{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:10px}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:#bbb;border-radius:2px}
.row{display:flex;align-items:flex-end;gap:6px}
.row.user{flex-direction:row-reverse}
.av{width:30px;height:30px;border-radius:50%;overflow:hidden;flex-shrink:0}
.bubble{padding:10px 14px;border-radius:18px;font-size:13px;line-height:1.75;max-width:76%;white-space:pre-wrap;word-break:break-word}
.row.bot .bubble{background:#fff;color:#1a1a1a;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.09)}
.row.user .bubble{background:#4169e1;color:#fff;border-bottom-right-radius:4px}
.ts{font-size:10px;color:#aaa;margin:0 4px 2px;align-self:flex-end;white-space:nowrap}
.cite{margin-top:4px;margin-left:36px;padding:8px 11px;background:#eef2ff;border-radius:0 12px 12px 12px;border-left:2px solid #4169e1;max-width:78%}
.cite-lbl{font-size:10px;color:#4169e1;font-weight:600;margin-bottom:3px}
.cite-txt{font-size:11.5px;color:#1e3a8a;line-height:1.6}
.cite-src{font-size:10px;color:#6b7fc7;margin-top:2px}
.typing-row{display:flex;align-items:flex-end;gap:6px}
.typing-bub{padding:10px 14px;background:#fff;border-radius:18px;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.09);display:flex;gap:5px;align-items:center}
.dot{width:7px;height:7px;background:#93c5fd;border-radius:50%;animation:bop .9s infinite}
.dot:nth-child(2){animation-delay:.18s}.dot:nth-child(3){animation-delay:.36s}
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.cats{padding:8px 14px;display:flex;gap:5px;flex-wrap:wrap;background:#fff;border-top:1px solid #eee;flex-shrink:0}
.cat{padding:5px 11px;border:1.5px solid #c7d2fe;border-radius:20px;font-size:11px;color:#4169e1;background:#f0f4ff;cursor:pointer;white-space:nowrap;transition:all .12s}
.cat:hover{background:#4169e1;color:#fff;border-color:#4169e1}
.inp-area{padding:10px 12px;border-top:1px solid #eee;background:#fff;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.inp-area textarea{flex:1;resize:none;border:2px solid #4169e1;border-radius:20px;padding:9px 14px;font-size:13px;font-family:inherit;line-height:1.5;height:38px;max-height:90px;overflow-y:auto;background:#f0f4ff;color:#1a1a1a;font-weight:500}
.inp-area textarea::placeholder{color:#7b93d4;font-weight:400}
.inp-area textarea:focus{outline:none;background:#fff;box-shadow:0 0 0 3px rgba(65,105,225,.15)}
.sbtn{width:38px;height:38px;border-radius:50%;background:#4169e1;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.sbtn:hover{opacity:.85;transform:scale(1.05)}
.sbtn svg{width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-av"><img id="hdrImg" alt="どめ"></div>
    <div>
      <div class="hdr-title">園長アシスタント</div>
      <div class="hdr-sub">どめ｜保護者対応・労務・安全・法令など何でもご相談ください</div>
    </div>
    <div class="hdr-dot"></div>
  </div>
  <div class="msgs" id="msgs"></div>
  <div class="cats">
    <button class="cat" onclick="ask('保護者からクレームが来ました。対応の手順を教えてください。')">💬 保護者クレーム</button>
    <button class="cat" onclick="ask('職員が突然辞めたいと言ってきました。どう対応すればよいですか？')">👤 職員の退職</button>
    <button class="cat" onclick="ask('園内で子どもが怪我をしました。対応手順を教えてください。')">🩹 子どもの事故</button>
    <button class="cat" onclick="ask('感染症が園内で発生しました。どう対応すればよいですか？')">🦠 感染症対応</button>
    <button class="cat" onclick="ask('職員からパワハラの相談を受けました。どう対応すればよいですか？')">⚠️ ハラスメント</button>
    <button class="cat" onclick="ask('育児休業の取得申し出がありました。手続きを教えてください。')">👶 育児休業</button>
    <button class="cat" onclick="ask('不審者が園に来た場合の対応手順を教えてください。')">🚨 不審者対応</button>
    <button class="cat" onclick="ask('虐待が疑われる子どもがいます。どう対応すればよいですか？')">🆘 虐待対応</button>
  </div>
  <div class="inp-area">
    <textarea id="inp" placeholder="💬 困ったことを何でも質問してください..." rows="1"></textarea>
    <button class="sbtn" onclick="send()" aria-label="送信">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

u5834\u5408\u306f\u300c\u3054\u8981\u671b\u306b\u306f\u304a\u5fdc\u3048\u3067\u304d\u307e\u305b\u3093\u300d\u3068\u6bc5\u7136\u3068\u4f1d\u3048\u308b\u3002\n\u30fb\u8105\u8feb\u30fb\u66b4\u529b\u7684\u8a00\u52d5\u304c\u3042\u308c\u3070\u8b66\u5bdf\u3078\u306e\u76f8\u8ac7\u3082\u691c\u8a0e\u3059\u308b\u3002\n\u30fb\u6cd5\u4eba\u306e\u4e0a\u4f4d\u8005\uff08\u7406\u4e8b\u9577\u7b49\uff09\u306b\u901f\u3084\u304b\u306b\u5831\u544a\u30fb\u76f8\u8ac7\u3059\u308b\u3002\n\n\u3010\u4e8b\u6545\u767a\u751f\u6642\u306e\u4fdd\u8b77\u8005\u5bfe\u5fdc\u3011\n1. \u5b50\u3069\u3082\u306e\u5b89\u5168\u78ba\u4fdd\u3092\u6700\u512a\u5148\u306b\u3059\u308b\u3002\n2. \u901f\u3084\u304b\u306b\u4fdd\u8b77\u8005\u306b\u9023\u7d61\u3059\u308b\uff08\u8efd\u5fae\u306a\u5834\u5408\u3082\u5f53\u65e5\u4e2d\u306b\u5831\u544a\uff09\u3002\n3. \u4e8b\u5b9f\u3092\u6b63\u76f4\u306b\u4f1d\u3048\u308b\u3002\u96a0\u853d\u30fb\u904e\u5c0f\u5831\u544a\u306f\u4fe1\u983c\u3092\u5927\u304d\u304f\u640d\u306a\u3046\u3002\n4. \u8b1d\u7f6a\u3068\u4eca\u5f8c\u306e\u5bfe\u5fdc\u7b56\u3092\u4f1d\u3048\u308b\u3002\n5. \u4e8b\u6545\u5831\u544a\u66f8\u3092\u4f5c\u6210\u3057\u3001\u884c\u653f\u3078\u306e\u5831\u544a\u8981\u5426\u3092\u78ba\u8a8d\u3059\u308b\u3002\n\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\u25a0 3. \u4e8b\u6545\u30fb\u5b89\u5168\u7ba1\u7406\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\u3010\u5712\u5185\u4e8b\u6545\u767a\u751f\u6642\u306e\u5bfe\u5fdc\u30d5\u30ed\u30fc\u3011\n1. \u8ca0\u50b7\u3057\u305f\u5b50\u3069\u3082\u306e\u5fdc\u6025\u51e6\u7f6e\u30fb\u6551\u6025\u5bfe\u5fdc\uff08\u5fc5\u8981\u306b\u5fdc\u3058\u3066119\u756a\uff09\u3002\n2. \u4fdd\u8b77\u8005\u3078\u306e\u9023\u7d61\uff08\u901f\u3084\u304b\u306b\u30fb\u76f4\u63a5\u96fb\u8a71\u3067\uff09\u3002\n3. \u4e8b\u6545\u767a\u751f\u72b6\u6cc1\u306e\u8a18\u9332\uff08\u3044\u3064\u30fb\u3069\u3053\u3067\u30fb\u8ab0\u304c\u30fb\u4f55\u3092\u3057\u3066\u30fb\u3069\u3046\u306a\u3063\u305f\u304b\uff09\u3002\n4. \u8077\u54e1\u9593\u3067\u72b6\u6cc1\u5171\u6709\u30fb\u518d\u767a\u9632\u6b62\u7b56\u306e\u691c\u8a0e\u3002\n5. \u884c\u653f\uff08\u5e02\u533a\u753a\u6751\uff09\u3078\u306e\u5831\u544a\uff08\u91cd\u5927\u4e8b\u6545\u306f\u901f\u5831\u304c\u5fc5\u8981\uff09\u3002\n6. \u4e8b\u6545\u5831\u544a\u66f8\u306e\u4f5c\u6210\u30fb\u4fdd\u7ba1\u3002\n\n\u3010\u91cd\u5927\u4e8b\u6545\u306e\u5b9a\u7fa9\uff08\u5185\u95a3\u5e9c\u30ac\u30a4\u30c9\u30e9\u30a4\u30f3\uff09\u3011\n\u30fb\u6b7b\u4ea1\u4e8b\u6545\n\u30fb\u610f\u8b58\u4e0d\u660e\u30fb\u9aa8\u6298\u30fb\u982d\u90e8\u5916\u50b7\u7b49\u3067\u5165\u9662\u3092\u8981\u3059\u308b\u3082\u306e\n\u30fb\u8a8d\u53ef\u5916\u65bd\u8a2d\u3067\u306f\u8efd\u5fae\u306a\u4e8b\u6545\u3082\u5831\u544a\u304c\u5fc5\u8981\u306a\u5834\u5408\u3042\u308a\n\n\u3010\u30d2\u30e4\u30ea\u30cf\u30c3\u30c8\u7ba1\u7406\u3011\n\u30fb\u4e8b\u6545\u306b\u81f3\u3089\u306a\u304b\u3063\u305f\u300c\u30d2\u30e4\u30ea\u30cf\u30c3\u30c8\u300d\u3082\u8a18\u9332\u30fb\u5171\u6709\u3059\u308b\u3053\u3068\u304c\u91cd\u8981\u3002\n\u30fb\u67081\u56de\u4ee5\u4e0a\u306e\u8077\u54e1\u4f1a\u8b70\u3067\u30d2\u30e4\u30ea\u30cf\u30c3\u30c8\u4e8b\u4f8b\u3092\u632f\u308a\u8fd4\u308b\u3002\n\u30fb\u8a18\u9332\u306e\u7a4d\u307f\u4e0a\u3052\u304c\u91cd\u5927\u4e8b\u6545\u9632\u6b62\u306b\u3064\u306a\u304c\u308b\u3002\n\n\u3010\u4e0d\u5be9\u8005\u5bfe\u5fdc\u3011\n1. \u4e0d\u5be9\u8005\u3092\u767a\u898b\u3057\u305f\u3089\u4e00\u4eba\u3067\u5bfe\u5fdc\u305b\u305a\u8907\u6570\u306e\u8077\u54e1\u3067\u5bfe\u5fdc\u3059\u308b\u3002\n2. \u5b50\u3069\u3082\u3092\u5b89\u5168\u306a\u5834\u6240\u306b\u8a98\u5c0e\u30fb\u4fdd\u8b77\u3059\u308b\u3002\n3. \u8b66\u5bdf\uff08110\u756a\uff09\u306b\u901a\u5831\u3059\u308b\u3002\n4. \u4fdd\u8b77\u8005\u30fb\u884c\u653f\u306b\u5831\u544a\u3059\u308b\u3002\n5. \u8fd1\u96a3\u65bd\u8a2d\u306b\u3082\u60c5\u5831\u5171\u6709\u3059\u308b\u3002\n\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\u25a0 4. \u8077\u54e1\u52b4\u52d9\u7ba1\u7406\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\u3010\u7a81\u7136\u306e\u9000\u8077\u7533\u3057\u51fa\u3078\u306e\u5bfe\u5fdc\u3011\n\u30fb\u5c31\u696d\u898f\u5247\u3067\u306f3\u30f6\u6708\u524d\u306e\u5c4a\u51fa\u304c\u5fc5\u8981\uff08\u6c11\u6cd5\u3067\u306f2\u9031\u9593\u524d\u304c\u539f\u5247\uff09\u3002\n\u30fb\u611f\u60c5\u7684\u306b\u306a\u3089\u305a\u3001\u307e\u305a\u7406\u7531\u3092\u4e01\u5be7\u306b\u805e\u304f\u3002\n\u30fb\u5f15\u304d\u7559\u3081\u304c\u96e3\u3057\u3044\u5834\u5408\u306f\u5186\u6e80\u306a\u5f15\u304d\u7d99\u304e\u3092\u512a\u5148\u3059\u308b\u3002\n\u30fb\u696d\u52d9\u306e\u5f15\u304d\u7d99\u304e\u8a08\u753b\u3092\u7acb\u3066\u308b\u3002\n\u30fb\u9000\u8077\u5f8c\u306e\u5b88\u79d8\u7fa9\u52d9\u30fb\u7af6\u696d\u907f\u6b62\u306b\u3064\u3044\u3066\u78ba\u8a8d\u3059\u308b\u3002\n\n\u3010\u8077\u54e1\u306e\u7121\u65ad\u6b20\u52e4\u3078\u306e\u5bfe\u5fdc\u3011\n\u30fb\u5f53\u65e5\u9023\u7d61\u304c\u306a\u3044\u5834\u5408\u306f\u901f\u3084\u304b\u306b\u96fb\u8a71\u30fb\u30e1\u30fc\u30eb\u3067\u9023\u7d61\u3092\u8a66\u307f\u308b\u3002\n\u30fb3\u65e5\u4ee5\u4e0a\u9023\u7d61\u304c\u53d6\u308c\u306a\u3044\u5834\u5408\u306f\u7dca\u6025\u9023\u7d61\u5148\uff08\u5bb6\u65cf\u7b49\uff09\u306b\u9023\u7d61\u3059\u308b\u3002\n\u30fb\u5c31\u696d\u898f\u5247\u306b\u57fa\u3065\u304d\u3001\u7121\u65ad\u6b20\u52e4\u304c\u7d9a\u304f\u5834\u5408\u306f\u6587\u66f8\u3067\u51fa\u52e4\u7763\u4fc3\u3092\u884c\u3046\u3002\n\u30fb14\u65e5\u4ee5\u4e0a\u306e\u7121\u65ad\u6b20\u52e4\u306f\u61f2\u6212\u89e3\u96c7\u4e8b\u7531\u306b\u8a72\u5f53\u3059\u308b\u53ef\u80fd\u6027\u304c\u3042\u308b\u3002\n\n\u3010\u8077\u54e1\u306e\u30e1\u30f3\u30bf\u30eb\u30d8\u30eb\u30b9\u4e0d\u8abf\u3011\n\u30fb\u9045\u523b\u30fb\u65e9\u9000\u30fb\u6b20\u52e4\u304c\u5897\u3048\u305f\u3001\u8868\u60c5\u304c\u6697\u3044\u3001\u30df\u30b9\u304c\u5897\u3048\u305f\u7b49\u306e\u30b5\u30a4\u30f3\u306b\u6c17\u3065\u304f\u3002\n\u30fb\u4e00\u5bfe\u4e00\u3067\u4e01\u5be7\u306b\u8a71\u3092\u805e\u304f\u6a5f\u4f1a\u3092\u8a2d\u3051\u308b\u3002\n\u30fb\u5fc5\u8981\u306b\u5fdc\u3058\u3066\u7523\u696d\u533b\u30fb\u5c02\u9580\u5bb6\u3078\u306e\u76f8\u8ac7\u3092\u52e7\u3081\u308b\u3002\n\u30fb\u4f11\u8077\u5236\u5ea6\u306e\u6d3b\u7528\u3092\u691c\u8a0e\u3059\u308b\u3002\n\u30fb\u672c\u4eba\u306e\u30d7\u30e9\u30a4\u30d0\u30b7\u30fc\u3092\u5b88\u308a\u3001\u8077\u5834\u5168\u4f53\u3067\u652f\u63f4\u3059\u308b\u59ff\u52e2\u3092\u793a\u3059\u3002\n\n\u3010\u8077\u54e1\u9593\u30c8\u30e9\u30d6\u30eb\u30fb\u30cf\u30e9\u30b9\u30e1\u30f3\u30c8\u5bfe\u5fdc\u3011\n1. \u76f8\u8ac7\u3092\u53d7\u3051\u305f\u3089\u3001\u307e\u305a\u76f8\u8ac7\u8005\u306e\u8a71\u3092\u50be\u8074\u3059\u308b\u3002\n2. \u76f8\u8ac7\u5185\u5bb9\u3092\u8a18\u9332\u3059\u308b\uff08\u65e5\u6642\u30fb\u5834\u6240\u30fb\u8a00\u52d5\u306e\u5185\u5bb9\uff09\u3002\n3. \u884c\u70ba\u8005\u30fb\u95a2\u4fc2\u8005\u304b\u3089\u3082\u500b\u5225\u306b\u4e8b\u5b9f\u78ba\u8a8d\u3092\u884c\u3046\u3002\n4. \u5fc5\u8981\u306b\u5fdc\u3058\u3066\u914d\u7f6e\u63db\u3048\u3084\u696d\u52d9\u5206\u96e2\u7b49\u306e\u66ab\u5b9a\u63aa\u7f6e\u3092\u53d6\u308b\u3002\n5. \u6cd5\u4eba\u4e0a\u4f4d\u8005\u30fb\u9867\u554f\u793e\u52b4\u58eb\u7b49\u306b\u5831\u544a\u30fb\u76f8\u8ac7\u3059\u308b\u3002\n6. \u30cf\u30e9\u30b9\u30e1\u30f3\u30c8\u304c\u8a8d\u5b9a\u3055\u308c\u305f\u5834\u5408\u306f\u5c31\u696d\u898f\u5247\u306b\u57fa\u3065\u304d\u61f2\u6212\u51e6\u5206\u3092\u691c\u8a0e\u3059\u308b\u3002\n7. \u76f8\u8ac7\u8005\u306b\u5bfe\u3057\u3066\u4e0d\u5229\u76ca\u306a\u53d6\u308a\u6271\u3044\u3092\u3057\u3066\u306f\u306a\u3089\u306a\u3044\uff08\u5831\u5fa9\u7981\u6b62\uff09\u3002\n\n\u3010\u52e4\u6020\u7ba1\u7406\u306e\u57fa\u672c\u3011\n\u30fb\u30bf\u30a4\u30e0\u30ab\u30fc\u30c9\u3084\u52e4\u6020\u30b7\u30b9\u30c6\u30e0\u3067\u6b63\u78ba\u306b\u8a18\u9332\u3059\u308b\u3002\n\u30fb\u6b8b\u696d\u306f\u4e8b\u524d\u7533\u8acb\u30fb\u627f\u8a8d\u5236\u3068\u3059\u308b\u3002\n\u30fb\u30b5\u30fc\u30d3\u30b9\u6b8b\u696d\u306f\u52b4\u50cd\u57fa\u6e96\u6cd5\u9055\u53cd\u306b\u306a\u308b\u305f\u3081\u6ce8\u610f\u3059\u308b\u3002\n\u30fb\u6709\u7d66\u4f11\u6687\u306e\u5e745\u65e5\u53d6\u5f97\u7fa9\u52d9\uff08\u6cd5\u5b9a\uff09\u3092\u9075\u5b88\u3059\u308b\u3002\n\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\u25a0 5. \u611f\u67d3\u75c7\u5bfe\u5fdc\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\u3010\u611f\u67d3\u75c7\u767a\u751f\u6642\u306e\u5bfe\u5fdc\u624b\u9806\u3011\n1. \u611f\u67d3\u304c\u7591\u308f\u308c\u308b\u5b50\u3069\u3082\u30fb\u8077\u54e1\u3092\u65e9\u671f\u306b\u628a\u63e1\u3059\u308b\u3002\n2. \u533b\u5e2b\u306e\u8a3a\u65ad\u3092\u53d7\u3051\u308b\u3088\u3046\u4fc3\u3059\u3002\n3. \u51fa\u5e2d\u505c\u6b62\u30fb\u767b\u5712\u81ea\u7c9b\u306e\u57fa\u6e96\u3092\u4fdd\u8b77\u8005\u306b\u6848\u5185\u3059\u308b\u3002\n4. \u65bd\u8a2d\u5185\u306e\u6d88\u6bd2\u30fb\u63db\u6c17\u3092\u5fb9\u5e95\u3059\u308b\u3002\n5. \u5e02\u533a\u753a\u6751\u30fb\u4fdd\u5065\u6240\u306b\u5831\u544a\u3059\u308b\uff08\u611f\u67d3\u75c7\u306e\u7a2e\u985e\u306b\u3088\u308b\uff09\u3002\n6. \u4fdd\u8b77\u8005\u5168\u4f53\u306b\u767a\u751f\u72b6\u6cc1\u3092\u5468\u77e5\u3059\u308b\uff08\u500b\u4eba\u60c5\u5831\u306b\u914d\u616e\uff09\u3002\n\n\u3010\u4e3b\u306a\u611f\u67d3\u75c7\u3068\u767b\u5712\u505c\u6b62\u671f\u9593\u306e\u76ee\u5b89\u3011\n\u30fb\u30a4\u30f3\u30d5\u30eb\u30a8\u30f3\u30b6\uff1a\u767a\u75c7\u5f8c5\u65e5\u304b\u3064\u89e3\u71b1\u5f8c2\u65e5\uff08\u5e7c\u5150\u306f3\u65e5\uff09\n\u30fb\u30ce\u30ed\u30a6\u30a4\u30eb\u30b9\uff1a\u75c7\u72b6\u6d88\u5931\u5f8c24\u301c48\u6642\u9593\n\u30fbRS\u30a6\u30a4\u30eb\u30b9\uff1a\u533b\u5e2b\u304c\u767b\u5712\u53ef\u80fd\u3068\u5224\u65ad\u3059\u308b\u307e\u3067\n\u30fb\u624b\u8db3\u53e3\u75c5\u30fb\u30d8\u30eb\u30d1\u30f3\u30ae\u30fc\u30ca\uff1a\u533b\u5e2b\u304c\u767b\u5712\u53ef\u80fd\u3068\u5224\u65ad\u3059\u308b\u307e\u3067\n\u30fb\u6c34\u75d8\uff08\u307f\u305a\u307c\u3046\u305d\u3046\uff09\uff1a\u3059\u3079\u3066\u306e\u767a\u75b9\u304c\u75c2\u76ae\u5316\u3059\u308b\u307e\u3067\n\u30fb\u9ebb\u75b9\uff08\u306f\u3057\u304b\uff09\uff1a\u89e3\u71b1\u5f8c3\u65e5\n\u30fb\u6d41\u884c\u6027\u8033\u4e0b\u817a\u708e\uff08\u304a\u305f\u3075\u304f\uff09\uff1a\u8033\u4e0b\u817a\u816b\u8139\u5f8c5\u65e5\u304b\u3064\u5168\u8eab\u72b6\u614b\u826f\u597d\n\u203b\u5177\u4f53\u7684\u306a\u5224\u65ad\u306f\u5fc5\u305a\u533b\u5e2b\u30fb\u4fdd\u5065\u6240\u306e\u6307\u793a\u306b\u5f93\u3046\u3053\u3068\n\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\u25a0 6. \u65bd\u8a2d\u904b\u55b6\u30fb\u6cd5\u4ee4\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\u3010\u884c\u653f\u3078\u306e\u5831\u544a\u7fa9\u52d9\u3011\n\u30fb\u91cd\u5927\u4e8b\u6545\uff08\u6b7b\u4ea1\u30fb\u91cd\u50b7\uff09\uff1a\u901f\u5831\uff0824\u6642\u9593\u4ee5\u5185\uff09\u2192\u8a73\u5831\u306e\u63d0\u51fa\u304c\u5fc5\u8981\n\u30fb\u611f\u67d3\u75c7\u96c6\u56e3\u767a\u751f\uff1a\u4fdd\u5065\u6240\u30fb\u5e02\u533a\u753a\u6751\u3078\u306e\u5831\u544a\n\u30fb\u8650\u5f85\u7591\u3044\uff1a\u5150\u7ae5\u76f8\u8ac7\u6240\u30fb\u5e02\u533a\u753a\u6751\u3078\u306e\u901a\u544a\u7fa9\u52d9\uff08\u5150\u7ae5\u798f\u7949\u6cd5\u7b2c25\u6761\uff09\n\u30fb\u7b2c\u4e09\u8005\u8a55\u4fa1\uff1a\u90fd\u9053\u5e9c\u770c\u306e\u6307\u5b9a\u3059\u308b\u6a5f\u95a2\u306b\u3088\u308b\u8a55\u4fa1\uff08\u5b9a\u671f\u7684\u53d7\u5be9\u63a8\u5968\uff09\n\n\u3010\u8650\u5f85\u5bfe\u5fdc\u3011\n\u30fb\u8650\u5f85\u3092\u767a\u898b\u307e\u305f\u306f\u7591\u3063\u305f\u5834\u5408\u306f\u3001\u901a\u544a\u3059\u308b\u3053\u3068\u304c\u6cd5\u5f8b\u4e0a\u306e\u7fa9\u52d9\uff08\u5b88\u79d8\u7fa9\u52d9\u3088\u308a\u512a\u5148\uff09\u3002\n\u30fb\u901a\u544a\u306f\u300c\u78ba\u8a3c\u304c\u306a\u304f\u3066\u3082\u300d\u300c\u7591\u3044\u304c\u3042\u308c\u3070\u300d\u884c\u3046\u3002\n\u30fb\u901a\u544a\u5148\uff1a\u5150\u7ae5\u76f8\u8ac7\u6240\uff08189\uff09\u307e\u305f\u306f\u5e02\u533a\u753a\u6751\u306e\u62c5\u5f53\u7a93\u53e3\u3002\n\u30fb\u901a\u544a\u5f8c\u306f\u884c\u653f\u306e\u6307\u793a\u306b\u5f93\u3044\u3001\u5712\u3068\u3057\u3066\u8a18\u9332\u3092\u4fdd\u7ba1\u3059\u308b\u3002\n\u30fb\u4fdd\u8b77\u8005\u3078\u306e\u60c5\u5831\u6f0f\u6d29\u306f\u884c\u308f\u306a\u3044\u3002\n\n\u3010\u82e6\u60c5\u89e3\u6c7a\u306e\u4ed5\u7d44\u307f\u3011\n\u30fb\u82e6\u60c5\u53d7\u4ed8\u62c5\u5f53\u8005\u30fb\u82e6\u60c5\u89e3\u6c7a\u8cac\u4efb\u8005\uff08\u65bd\u8a2d\u9577\uff09\u30fb\u7b2c\u4e09\u8005\u59d4\u54e1\u3092\u8a2d\u7f6e\u3059\u308b\u7fa9\u52d9\u304c\u3042\u308b\u3002\n\u30fb\u82e6\u60c5\u5185\u5bb9\u30fb\u5bfe\u5fdc\u7d4c\u904e\u30fb\u7d50\u679c\u3092\u8a18\u9332\u30fb\u4fdd\u7ba1\u3059\u308b\u3002\n\u30fb\u89e3\u6c7a\u3057\u306a\u3044\u5834\u5408\u306f\u90fd\u9053\u5e9c\u770c\u306e\u904b\u55b6\u9069\u6b63\u5316\u59d4\u54e1\u4f1a\u3078\u306e\u7533\u3057\u7acb\u3066\u304c\u53ef\u80fd\u3002\n\n\u3010\u52b4\u50cd\u57fa\u6e96\u6cd5\u306e\u4e3b\u306a\u30dd\u30a4\u30f3\u30c8\u3011\n\u30fb1\u65e58\u6642\u9593\u30fb1\u903140\u6642\u9593\u3092\u8d85\u3048\u308b\u52b4\u50cd\u306f\u6642\u9593\u5916\u52b4\u50cd\uff08\u6b8b\u696d\u4ee3\u304c\u5fc5\u8981\uff09\u3002\n\u30fb\u4f11\u61a9\uff1a6\u6642\u9593\u8d85\u306745\u5206\u30018\u6642\u9593\u8d85\u30671\u6642\u9593\u4ee5\u4e0a\u3002\n\u30fb\u4f11\u65e5\uff1a\u90311\u65e5\u4ee5\u4e0a\uff08\u6cd5\u5b9a\u4f11\u65e5\uff09\u3002\n\u30fb\u6642\u9593\u5916\u30fb\u4f11\u65e5\u30fb\u6df1\u591c\u52b4\u50cd\u306b\u306f\u5272\u5897\u8cc3\u91d1\u304c\u5fc5\u8981\uff0825\u301c50%\u5272\u5897\uff09\u3002\n\u30fb\u89e3\u96c7\u306f30\u65e5\u524d\u4e88\u544a\u307e\u305f\u306f30\u65e5\u5206\u306e\u5e73\u5747\u8cc3\u91d1\u306e\u652f\u6255\u3044\u304c\u5fc5\u8981\u3002\n\u30fb\u4e0d\u5f53\u89e3\u96c7\u306f\u7121\u52b9\u306b\u306a\u308b\u5834\u5408\u304c\u3042\u308b\u3002\n\n\u3010\u80b2\u5150\u30fb\u4ecb\u8b77\u4f11\u696d\u6cd5\u306e\u4e3b\u306a\u30dd\u30a4\u30f3\u30c8\u3011\n\u30fb\u80b2\u5150\u4f11\u696d\uff1a\u5b50\u304c1\u6b73\uff08\u6700\u95772\u6b73\uff09\u306b\u306a\u308b\u307e\u3067\u53d6\u5f97\u53ef\u80fd\u3002\u7537\u5973\u554f\u308f\u305a\u3002\n\u30fb\u7523\u5f8c\u30d1\u30d1\u80b2\u4f11\uff08\u51fa\u751f\u6642\u80b2\u5150\u4f11\u696d\uff09\uff1a\u5b50\u306e\u51fa\u751f\u5f8c8\u9031\u9593\u4ee5\u5185\u306b4\u9031\u9593\u307e\u3067\u53d6\u5f97\u53ef\u80fd\u3002\n\u30fb\u80b2\u5150\u77ed\u6642\u9593\u52e4\u52d9\uff1a3\u6b73\u672a\u6e80\u306e\u5b50\u3092\u6301\u3064\u793e\u54e1\u306f1\u65e56\u6642\u9593\u52e4\u52d9\u3092\u9078\u629e\u53ef\u80fd\u3002\n\u30fb\u4ecb\u8b77\u4f11\u696d\uff1a\u8981\u4ecb\u8b77\u72b6\u614b\u306e\u5bb6\u65cf1\u4eba\u306b\u3064\u304d\u901a\u7b9793\u65e5\u307e\u3067\u53d6\u5f97\u53ef\u80fd\u3002\n\u30fb\u53d6\u5f97\u3092\u7406\u7531\u3068\u3057\u305f\u4e0d\u5229\u76ca\u53d6\u308a\u6271\u3044\u7981\u6b62\u3002\n\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\u25a0 7. \u5712\u9577\u306e\u3088\u304f\u3042\u308b\u56f0\u308a\u3054\u3068Q&A\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\nQ: \u8077\u54e1\u304c\u300c\u660e\u65e5\u304b\u3089\u6765\u3089\u308c\u306a\u3044\u300d\u3068\u7a81\u7136\u8a00\u3063\u3066\u304d\u305f\u3002\u3069\u3046\u3059\u308c\u3070\u3088\u3044\u304b\uff1f\nA: \u307e\u305a\u51b7\u9759\u306b\u8a71\u3092\u805e\u304d\u3001\u7406\u7531\u3092\u78ba\u8a8d\u3059\u308b\u3002\u8eab\u4f53\u30fb\u7cbe\u795e\u7684\u306a\u7406\u7531\u3067\u3042\u308c\u3070\u4f11\u8077\u5236\u5ea6\u3092\u6848\u5185\u3059\u308b\u3002\u9000\u8077\u306e\u610f\u601d\u304c\u56fa\u3044\u5834\u5408\u306f\u3001\u5c31\u696d\u898f\u5247\u3067\u306f3\u30f6\u6708\u524d\u306e\u7533\u3057\u51fa\u304c\u5fc5\u8981\u3060\u304c\u3001\u5f15\u304d\u7d99\u304e\u671f\u9593\u3092\u8a71\u3057\u5408\u3044\u3067\u6c7a\u3081\u308b\u3002\u696d\u52d9\u306b\u652f\u969c\u304c\u51fa\u306a\u3044\u3088\u3046\u3001\u5373\u65e5\u5bfe\u5fdc\u306e\u4ee3\u66ff\u8981\u54e1\u78ba\u4fdd\u3092\u512a\u5148\u3059\u308b\u3002\n\nQ: \u4fdd\u8b77\u8005\u304b\u3089\u300c\u5148\u751f\u304c\u5b50\u3069\u3082\u306b\u66b4\u8a00\u3092\u5410\u3044\u305f\u300d\u3068\u30af\u30ec\u30fc\u30e0\u304c\u6765\u305f\u3002\nA: \u307e\u305a\u4fdd\u8b77\u8005\u306e\u8a71\u3092\u50be\u8074\u3057\u8b1d\u610f\u3092\u793a\u3059\u3002\u5f53\u8a72\u8077\u54e1\u30fb\u76ee\u6483\u3057\u305f\u4ed6\u306e\u8077\u54e1\u304b\u3089\u500b\u5225\u306b\u4e8b\u5b9f\u78ba\u8a8d\u3092\u884c\u3046\u3002\u4e8b\u5b9f\u3067\u3042\u308c\u3070\u901f\u3084\u304b\u306b\u8b1d\u7f6a\u3057\u3001\u518d\u767a\u9632\u6b62\u7b56\u3092\u4f1d\u3048\u308b\u3002\u8650\u5f85\u306b\u8a72\u5f53\u3059\u308b\u53ef\u80fd\u6027\u304c\u3042\u308c\u3070\u884c\u653f\u3078\u306e\u5831\u544a\u7fa9\u52d9\u304c\u751f\u3058\u308b\u3002\u96a0\u853d\u306f\u7d76\u5bfe\u306b\u3057\u306a\u3044\u3002\n\nQ: \u8077\u54e1\u540c\u58eb\u306e\u4ef2\u304c\u60aa\u304f\u3001\u8077\u5834\u306e\u96f0\u56f2\u6c17\u304c\u60aa\u3044\u3002\nA: \u500b\u5225\u306b\u8a71\u3092\u805e\u304d\u3001\u53cc\u65b9\u306e\u8a00\u3044\u5206\u3092\u628a\u63e1\u3059\u308b\u3002\u611f\u60c5\u7684\u306a\u5bfe\u7acb\u306e\u5834\u5408\u306f\u30b7\u30d5\u30c8\u3084\u62c5\u5f53\u30af\u30e9\u30b9\u3092\u8abf\u6574\u3057\u3066\u7269\u7406\u7684\u306a\u8ddd\u96e2\u3092\u7f6e\u304f\u3002\u5b9a\u671f\u7684\u306a\u8077\u54e1\u4f1a\u8b70\u30fb\u9762\u8ac7\u3067\u610f\u898b\u3092\u8a00\u3048\u308b\u5834\u3092\u4f5c\u308b\u3002\u30cf\u30e9\u30b9\u30e1\u30f3\u30c8\u306b\u8a72\u5f53\u3059\u308b\u5834\u5408\u306f\u5c31\u696d\u898f\u5247\u306b\u57fa\u3065\u304d\u5bfe\u5fdc\u3059\u308b\u3002\n\nQ: \u5b50\u3069\u3082\u306b\u602a\u6211\u3092\u3055\u305b\u3066\u3057\u307e\u3063\u305f\u3002\u4fdd\u8b77\u8005\u306b\u3069\u3046\u8aac\u660e\u3059\u308c\u3070\u3088\u3044\u304b\uff1f\nA: \u96fb\u8a71\u3067\u306f\u306a\u304f\u76f4\u63a5\u4f1a\u3063\u3066\u8aac\u660e\u3059\u308b\u3053\u3068\u304c\u539f\u5247\u3002\u4e8b\u5b9f\u3092\u6b63\u76f4\u306b\u4f1d\u3048\u3001\u96a0\u853d\u30fb\u904e\u5c0f\u5831\u544a\u306f\u3057\u306a\u3044\u3002\u300c\u7533\u3057\u8a33\u3054\u3056\u3044\u307e\u305b\u3093\u300d\u3068\u8b1d\u7f6a\u3057\u3001\u6cbb\u7642\u8cbb\u306e\u8ca0\u62c5\u306b\u3064\u3044\u3066\u3082\u8aa0\u5b9f\u306b\u5bfe\u5fdc\u3059\u308b\u3002\u518d\u767a\u9632\u6b62\u7b56\u3092\u5177\u4f53\u7684\u306b\u4f1d\u3048\u308b\u3002\u91cd\u50b7\u306e\u5834\u5408\u306f\u884c\u653f\u3078\u306e\u5831\u544a\u304c\u5fc5\u8981\u3002\n\nQ: \u4fdd\u80b2\u58eb\u304c\u598a\u5a20\u3092\u5831\u544a\u3057\u3066\u304d\u305f\u3002\u3069\u3046\u5bfe\u5fdc\u3059\u308c\u3070\u3088\u3044\u304b\uff1f\nA: \u307e\u305a\u304a\u3081\u3067\u3068\u3046\u3068\u4f1d\u3048\u3001\u4f53\u8abf\u3092\u7b2c\u4e00\u306b\u8003\u3048\u305f\u52e4\u52d9\u8abf\u6574\u3092\u884c\u3046\u3002\u7523\u524d6\u9031\u524d\u304b\u3089\u7523\u4f11\u53d6\u5f97\u53ef\u80fd\u3067\u3042\u308b\u3053\u3068\u3092\u6848\u5185\u3059\u308b\u3002\u91cd\u3044\u7269\u306e\u6301\u3061\u904b\u3073\u3084\u611f\u67d3\u30ea\u30b9\u30af\u306e\u9ad8\u3044\u696d\u52d9\u304b\u3089\u5916\u3059\u7b49\u306e\u914d\u616e\u7fa9\u52d9\u304c\u3042\u308b\u3002\u80b2\u5150\u4f11\u696d\u306b\u3064\u3044\u3066\u3082\u60c5\u5831\u63d0\u4f9b\u3059\u308b\u3002\n\nQ: \u9577\u671f\u4f11\u6687\u660e\u3051\u306b\u8077\u54e1\u304c\u51fa\u52e4\u3057\u3066\u3053\u306a\u3044\u3002\nA: \u5f53\u65e5\u4e2d\u306b\u96fb\u8a71\u30fb\u30e1\u30fc\u30eb\u3067\u9023\u7d61\u3092\u8a66\u307f\u308b\u3002\u7e4b\u304c\u3089\u306a\u3044\u5834\u5408\u306f\u7dca\u6025\u9023\u7d61\u5148\u306b\u9023\u7d61\u3059\u308b\u30023\u65e5\u4ee5\u4e0a\u9023\u7d61\u304c\u53d6\u308c\u306a\u3044\u5834\u5408\u306f\u6587\u66f8\uff08\u5185\u5bb9\u8a3c\u660e\uff09\u3067\u51fa\u52e4\u7763\u4fc3\u3092\u691c\u8a0e\u3059\u308b\u3002\u30e1\u30f3\u30bf\u30eb\u30d8\u30eb\u30b9\u306e\u554f\u984c\u304c\u7591\u308f\u308c\u308b\u5834\u5408\u306f\u7523\u696d\u533b\u30fb\u5c02\u9580\u5bb6\u3078\u306e\u76f8\u8ac7\u3092\u4fc3\u3059\u3002\n\nQ: \u4fdd\u8b77\u8005\u304b\u3089\u300cSNS\u306b\u5712\u306e\u60aa\u53e3\u3092\u66f8\u304b\u308c\u305f\u300d\u3068\u8a00\u308f\u308c\u305f\u3002\nA: \u4e8b\u5b9f\u78ba\u8a8d\u3092\u884c\u3044\u3001\u554f\u984c\u306e\u3042\u308b\u6295\u7a3f\u3067\u3042\u308c\u3070\u524a\u9664\u4f9d\u983c\u30fb\u6cd5\u7684\u5bfe\u5fdc\u3092\u691c\u8a0e\u3059\u308b\u3002\u5712\u5074\u306b\u975e\u304c\u3042\u308b\u5834\u5408\u306f\u8aa0\u5b9f\u306b\u5bfe\u5fdc\u3057\u6539\u5584\u3092\u7d04\u675f\u3059\u308b\u3002\u98a8\u8a55\u88ab\u5bb3\u304c\u5e83\u304c\u308b\u524d\u306b\u6b63\u78ba\u306a\u60c5\u5831\u767a\u4fe1\u3092\u5fc3\u304c\u3051\u308b\u3002\n\nQ: \u88dc\u52a9\u91d1\u306e\u7533\u8acb\u671f\u9650\u304c\u8feb\u3063\u3066\u3044\u308b\u304c\u66f8\u985e\u304c\u63c3\u308f\u306a\u3044\u3002\nA: \u6240\u7ba1\u306e\u5e02\u533a\u753a\u6751\u30fb\u90fd\u9053\u5e9c\u770c\u306b\u76f8\u8ac7\u3057\u3001\u671f\u9650\u5ef6\u9577\u306e\u53ef\u5426\u3092\u78ba\u8a8d\u3059\u308b\u3002\u5fc5\u8981\u66f8\u985e\u306e\u30ea\u30b9\u30c8\u3092\u518d\u78ba\u8a8d\u3057\u3001\u512a\u5148\u9806\u4f4d\u3092\u3064\u3051\u3066\u5bfe\u5fdc\u3059\u308b\u3002\u9867\u554f\u306e\u793e\u52b4\u58eb\u30fb\u884c\u653f\u66f8\u58eb\u306b\u76f8\u8ac7\u3059\u308b\u3053\u3068\u3082\u6709\u52b9\u3002\n\nQ: \u8077\u54e1\u304c\u300c\u6709\u7d66\u3092\u5168\u90e8\u307e\u3068\u3081\u3066\u53d6\u308a\u305f\u3044\u300d\u3068\u8a00\u3063\u3066\u304d\u305f\u3002\nA: \u6709\u7d66\u4f11\u6687\u306f\u52b4\u50cd\u8005\u306e\u6a29\u5229\u3067\u3042\u308a\u3001\u539f\u5247\u3068\u3057\u3066\u62d2\u5426\u3067\u304d\u306a\u3044\u3002\u305f\u3060\u3057\u300c\u4e8b\u696d\u306e\u6b63\u5e38\u306a\u904b\u55b6\u3092\u59a8\u3052\u308b\u5834\u5408\u300d\u306f\u6642\u5b63\u5909\u66f4\u6a29\u3092\u884c\u4f7f\u3067\u304d\u308b\u3002\u4ee3\u66ff\u8981\u54e1\u306e\u78ba\u4fdd\u3084\u5f15\u304d\u7d99\u304e\u3092\u6761\u4ef6\u306b\u8abf\u6574\u3092\u4f9d\u983c\u3059\u308b\u3002\u5e745\u65e5\u306e\u6642\u5b63\u6307\u5b9a\u53d6\u5f97\u7fa9\u52d9\u3082\u5ff5\u982d\u306b\u7f6e\u304f\u3002\n\nQ: \u8077\u54e1\u304c\u300c\u30d1\u30ef\u30cf\u30e9\u3092\u53d7\u3051\u305f\u300d\u3068\u76f8\u8ac7\u3057\u3066\u304d\u305f\u3002\nA: \u307e\u305a\u76f8\u8ac7\u8005\u306e\u8a71\u3092\u50be\u8074\u3057\u3001\u8a18\u9332\u3059\u308b\u3002\u76f8\u8ac7\u8005\u3092\u5b64\u7acb\u3055\u305b\u305a\u3001\u79d8\u5bc6\u3092\u5b88\u308b\u65e8\u3092\u4f1d\u3048\u308b\u3002\u884c\u70ba\u8005\u304b\u3089\u500b\u5225\u306b\u4e8b\u5b9f\u78ba\u8a8d\u3092\u884c\u3046\u3002\u4e8b\u5b9f\u78ba\u8a8d\u5f8c\u3001\u5c31\u696d\u898f\u5247\u306b\u57fa\u3065\u304f\u5bfe\u5fdc\u3092\u691c\u8a0e\u3059\u308b\u3002\u76f8\u8ac7\u8005\u304c\u4e0d\u5229\u76ca\u3092\u53d7\u3051\u306a\u3044\u3088\u3046\u914d\u616e\u3059\u308b\u3002\u5916\u90e8\u306e\u76f8\u8ac7\u7a93\u53e3\uff08\u793e\u52b4\u58eb\u30fb\u52b4\u50cd\u5c40\uff09\u306e\u6d3b\u7528\u3082\u691c\u8a0e\u3059\u308b\u3002\n";

let history = [];

window.onload = function() {
  appendBotMsg('こんにちは！園長アシスタントのどめです。\n\n保護者対応・職員の労務・事故・感染症・法令対応など、園長として判断に迷うことを何でもご相談ください。\n\nよくあるご相談はボタンからも選べます。', []);
};

inpEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
inpEl.addEventListener('input', () => { inpEl.style.height = '38px'; inpEl.style.height = Math.min(inpEl.scrollHeight, 90) + 'px'; });
function ask(q) { inpEl.value = q; send(); }
function now() { return new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function appendBotMsg(text, citations) {
  const row = document.createElement('div'); row.className = 'row bot';
  const av = document.createElement('div'); av.className = 'av';
  av.innerHTML = '<img src="' + DOME + '" alt="どめ">';
  const bub = document.createElement('div'); bub.className = 'bubble'; bub.textContent = text;
  const ts = document.createElement('div'); ts.className = 'ts'; ts.textContent = now();
  row.appendChild(av); row.appendChild(bub); row.appendChild(ts);
  msgsEl.appendChild(row);
  if (citations && citations.length) {
    citations.forEach(c => {
      const cite = document.createElement('div'); cite.className = 'cite';
      cite.innerHTML = '<div class="cite-lbl">📌 根拠・参考</div><div class="cite-txt">' + esc(c.text) + '</div><div class="cite-src">' + esc(c.source||'') + '</div>';
      msgsEl.appendChild(cite);
    });
  }
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function appendUserMsg(text) {
  const row = document.createElement('div'); row.className = 'row user';
  const bub = document.createElement('div'); bub.className = 'bubble'; bub.textContent = text;
  const ts = document.createElement('div'); ts.className = 'ts'; ts.textContent = now();
  row.appendChild(ts); row.appendChild(bub);
  msgsEl.appendChild(row); msgsEl.scrollTop = msgsEl.scrollHeight;
}

function showTyping() {
  const row = document.createElement('div'); row.className = 'typing-row'; row.id = 'typing';
  const av = document.createElement('div'); av.className = 'av';
  av.innerHTML = '<img src="' + DOME + '" alt="どめ">';
  const bub = document.createElement('div'); bub.className = 'typing-bub';
  bub.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  row.appendChild(av); row.appendChild(bub);
  msgsEl.appendChild(row); msgsEl.scrollTop = msgsEl.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

async function send() {
  const q = inpEl.value.trim(); if (!q) return;
  inpEl.value = ''; inpEl.style.height = '38px';
  appendUserMsg(q); history.push({ role: 'user', content: q }); showTyping();

  const sys = `あなたは保育園・認定こども園の園長を支援する専門アシスタントです。
以下の知識データベースを参照して、園長の困りごとに対して具体的・実践的に答えてください。

${KNOWLEDGE}

回答ルール：
1. 園長の立場に立って、今すぐ実践できる具体的な手順・対応を示すこと
2. 根拠となる法令・規則・ガイドライン等があれば必ず引用すること
3. 深刻な問題（虐待・重大事故・刑事事件等）は必ず専門家・行政への相談を促すこと
4. 文体は「です・ます」調で統一すること
5. 必ず以下のJSONのみで回答（前後にテキスト不可）：
{"answer":"回答本文（改行は\nで表現）","citations":[{"text":"根拠・参考となる内容","source":"参照元（就業規則・労働基準法・内閣府ガイドライン等）"}]}`;

  try {
    const resp = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1500, system: sys, messages: history })
    });
    const data = await resp.json(); removeTyping();
    if (data.error) { appendBotMsg('エラーが発生しました：' + data.error.message, []); return; }
    const raw = (data.content||[]).map(b=>b.text||'').join('');
    const clean = raw.replace(/^```json\s*/,'').replace(/\s*```$/,'').trim();
    let parsed; try { parsed = JSON.parse(clean); } catch(e) { parsed = {answer:raw,citations:[]}; }
    const ans = parsed.answer || raw;
    appendBotMsg(ans, parsed.citations||[]); history.push({ role: 'assistant', content: ans });
  } catch(err) {
    removeTyping(); appendBotMsg('エラーが発生しました。\n' + err.message, []);
  }
}
</script>
</body>
</html>
